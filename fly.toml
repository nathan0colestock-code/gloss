# App name is a placeholder; user will rename before `fly deploy`.
app = "foxed-CHANGEME"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3747"

[http_service]
  internal_port = 3747
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[mounts]]
  source = "foxed_data"
  destination = "/app/data"

[[vm]]
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 1
