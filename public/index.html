  scanZone.appendChild(seg);
  const streamHost = h('div');
  scanZone.appendChild(streamHost);
  grid.appendChild(scanZone);

  // URL or file
  const urlZone = h('div', { class: 'cap-zone' });
  urlZone.appendChild(h('h3', null, 'URL or file'));
  urlZone.appendChild(h('div', { class: 'sub' }, 'Paste a Google Docs/Drive URL or upload a file. Default: reference (something to consult). Toggle to artifact for completed outputs.'));
  const kindRefArt = { value: 'reference' };
  const refSeg = h('div', { class: 'seg' });
  ['reference', 'artifact'].forEach(k => {
    const b = h('button', { class: k === 'reference' ? 'active' : '' }, k);
    b.addEventListener('click', () => {
      refSeg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      kindRefArt.value = k;
    });
    refSeg.appendChild(b);
  });
  const title = h('input', { class: 'input', placeholder: 'Title', style: { marginTop: '12px' } });
  const url = h('input', { class: 'input', placeholder: 'https://docs.google.com/…', style: { marginTop: '8px' } });
  const fileIn = h('input', { type: 'file', style: { marginTop: '8px' } });
  const urlSubmit = h('button', { class: 'btn primary', style: { marginTop: '12px' } }, 'Save');
  urlSubmit.addEventListener('click', async () => {
    const t = title.value.trim();
    if (!t) { toast('Title required', 'err'); return; }
    const endpoint = kindRefArt.value === 'artifact' ? '/api/artifacts' : '/api/references';
    try {
      if (fileIn.files?.[0]) {
        const fd = new FormData();
        fd.append('file', fileIn.files[0]);
        fd.append('title', t);
        if (url.value.trim()) fd.append('external_url', url.value.trim());
        const res = await fetch(endpoint, { method: 'POST', body: fd });
        if (!res.ok) throw new Error((await res.json()).error || 'upload failed');
      } else {
        await api(endpoint, 'POST', { title: t, external_url: url.value.trim() || null });
      }
      toast(`${kindRefArt.value} saved`, 'ok');
      title.value = ''; url.value = ''; fileIn.value = '';
    } catch (err) { toast(err.message, 'err'); }
  });
  urlZone.append(
    h('div', { class: 'lbl-mono', style: { marginBottom: '4px' } }, 'Kind'),
    refSeg, title, url, fileIn, urlSubmit,
  );
  grid.appendChild(urlZone);

  // Voice
  const voiceZone = h('div', { class: 'cap-zone' });
  voiceZone.appendChild(h('h3', null, 'Voice memo'));
  voiceZone.appendChild(h('div', { class: 'sub' }, 'Paste a transcript. Parsed into pointer-summaries and filed to the day.'));
  const vDate = h('input', { type: 'date', class: 'input', value: todayIso(), style: { maxWidth: '180px' } });
  const vText = h('textarea', { class: 'input', rows: 6, placeholder: '"Met with Jake this morning — he asked about the sermon series on sabbath. I pointed him to…"', style: { marginTop: '10px' } });
  const vBtn = h('button', { class: 'btn primary', style: { marginTop: '12px' } }, 'File voice memo');
  vBtn.addEventListener('click', async () => {
    const t = vText.value.trim();
    if (!t) { toast('Nothing to file', 'err'); return; }
    try {
      vBtn.disabled = true;
      await api('/api/ingest/voice', 'POST', { transcript: t, date: vDate.value });
      toast(`Filed to ${vDate.value}`, 'ok');
      vText.value = '';
      await loadBacklog(streamHost);
    } catch (err) { toast(err.message, 'err'); }
    finally { vBtn.disabled = false; }
  });
  voiceZone.append(
    h('div', { style: { display: 'flex', gap: '10px', alignItems: 'center' } },
      h('span', { class: 'lbl-mono' }, 'Date'),
      vDate,
    ),
    vText, vBtn,
  );
  grid.appendChild(voiceZone);
}

async function startScanIngest(file, kindHint, host) {
  host.innerHTML = '';
  const stream = h('div', { class: 'ingest-stream' });
  const progress = h('div', { class: 'ingest-progress' }, `Uploading ${file.name}…`);
  const tiles = h('div');
  stream.append(progress, tiles);
  host.appendChild(stream);

  try {
    const fd = new FormData();
    fd.append('file', file);
    if (kindHint && kindHint !== 'page') fd.append('kind', kindHint);
    const res = await fetch('/api/ingest/stream', { method: 'POST', body: fd });
    if (!res.ok) throw new Error('upload failed');
    let total = 1, count = 0;
    for await (const evt of ndjson(res)) {
      if (evt.type === 'start') {
        total = evt.page_count || 1;
        progress.textContent = total > 1 ? `0 of ${total} pages…` : 'parsing…';
      } else if (evt.type === 'page') {
        count++;
        const p = evt.page || evt;
        const tile = h('div', { class: 'ingest-tile' },
          h('img', { src: p.id ? `/api/pages/${p.id}/scan` : '' }),
          h('div', { class: 'meta' },
            h('div', { class: 'vp' }, `${p.volume ? 'v.' + p.volume + ' ' : ''}${p.page_number ? 'p.' + p.page_number : ''}`),
            h('div', { class: 'sum' }, p.summary || '(no summary)'),
          ),
        );
        tile.addEventListener('click', () => navigate('page', p.id));
        tiles.appendChild(tile);
        progress.textContent = total > 1 ? `${count} of ${total} pages…` : `${count} parsed`;
      } else if (evt.type === 'done') {
        progress.textContent = `Done · ${count} page${count > 1 ? 's' : ''} parsed.`;
        await loadBacklog(host);
      } else if (evt.type === 'error') {
        progress.textContent = `Error: ${evt.error || 'parse failed'}`;
      }
    }
  } catch (err) {
    progress.textContent = `Error: ${err.message}`;
  }
}

async function loadBacklog(host) {
  try {
    const res = await api('/api/backlog');
    const items = res.items || res;
    const pending = items.filter(b => b.status === 'pending' || b.status === 'open');
    if (!pending.length) return;
    const zone = h('div', { class: 'ingest-stream' });
    zone.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, `Backlog · ${pending.length} question${pending.length > 1 ? 's' : ''}`));
    backlogState = { queue: pending, idx: 0, container: zone };
    showBacklogCard();
    host.appendChild(zone);
  } catch {}
}

function showBacklogCard() {
  const { queue, idx, container } = backlogState;
  if (!container) return;
  container.querySelectorAll('.backlog-card').forEach(c => c.remove());
  if (idx >= queue.length) {
    container.appendChild(h('div', { class: 'soft mono', style: { fontSize: '11.5px' } }, 'All caught up.'));
    return;
  }
  const b = queue[idx];
  const card = h('div', { class: 'backlog-card' });
  card.append(
    h('div', { class: 'ctx' }, `${idx + 1} of ${queue.length}${b.kind ? ' · ' + b.kind : ''}`),
    h('div', { class: 'q' }, b.question || b.subject || 'Question'),
  );
  let inputEl;
  const fmt = b.answer_format || 'short';
  let selectedOption = null;
  if (fmt === 'choice') {
    const opts = b.answer_options || [];
    const list = h('div', { class: 'radio-list' });
    opts.forEach((opt, i) => {
      list.appendChild(h('label', null,
        h('input', { type: 'radio', name: `b-${b.id}`, value: opt, onchange: () => selectedOption = opt }),
        opt,
      ));
    });
    card.appendChild(list);
    inputEl = { get value() { return selectedOption; } };
  } else if (fmt === 'long') {
    inputEl = h('textarea', { class: 'input', rows: 3, placeholder: 'Answer…' });
    card.appendChild(inputEl);
  } else {
    inputEl = h('input', { class: 'input', placeholder: 'Answer…' });
    card.appendChild(inputEl);
  }
  const actions = h('div', { class: 'backlog-actions' });
  const submit = h('button', { class: 'btn primary' }, 'Answer');
  const skip = h('button', { class: 'btn ghost' }, 'Skip');
  submit.addEventListener('click', async () => {
    const v = (inputEl.value || '').trim();
    if (!v) { toast('Answer required', 'err'); return; }
    try {
      await api(`/api/backlog/${b.id}`, 'PATCH', { status: 'answered', answer: v });
      toast('saved', 'ok');
      backlogState.idx++;
      showBacklogCard();
    } catch (err) { toast(err.message, 'err'); }
  });
  skip.addEventListener('click', () => { backlogState.idx++; showBacklogCard(); });
  actions.append(submit, skip);
  card.appendChild(actions);
  container.appendChild(card);
}

// ─── INDEX ─────────────────────────────────
// Two sections: "Contents" (front-of-book — collections & artifacts, grouped
// by heading when one is set) and "Indexes" (back-of-book, alphabetical).
// Headings themselves don't get their own tab: they act like sub-sections
// inside the Collections and Artifacts tabs, same way a notebook's TOC just
// indents items under a heading rather than storing headings separately.
const KIND_ORDER = [
  // Front-of-book (Table of Contents):
  ['collection', 'Collections'],
  ['artifact', 'Artifacts'],
  // Back-of-book (Indexes):
  ['person', 'People'],
  ['topic', 'Topics'],
  ['scripture', 'Scripture'],
  ['book', 'Books'],
  ['reference', 'References'],
  ['user_index', 'Indexes'],
];
const TOC_KINDS = new Set(['collection', 'artifact']);

// Canonical order of the books of the Bible (Protestant canon). Scripture rows
// carry a `meta.book` field (e.g. "Nehemiah", "1 Corinthians"); auto-headings
// in the Scripture index group rows by book, ordered by this list.
const BIBLE_BOOK_ORDER = [
  'Genesis','Exodus','Leviticus','Numbers','Deuteronomy',
  'Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings',
  '1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther',
  'Job','Psalms','Psalm','Proverbs','Ecclesiastes','Song of Solomon','Song of Songs',
  'Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel',
  'Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi',
  'Matthew','Mark','Luke','John','Acts',
  'Romans','1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians','Colossians',
  '1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy','Titus','Philemon',
  'Hebrews','James','1 Peter','2 Peter','1 John','2 John','3 John','Jude','Revelation',
];
const BIBLE_BOOK_INDEX = new Map(BIBLE_BOOK_ORDER.map((b, i) => [b.toLowerCase(), i]));

// Derive the book name for a scripture row. Prefer the server-provided
// `meta.book`; fall back to parsing the leading words of the canonical label
// (everything before the first chapter/verse digit).
function scriptureBookOf(node) {
  const m = node.meta?.book;
  if (m && m.trim()) return m.trim();
  const label = node.label || '';
  const match = label.match(/^([1-3]\s+)?[A-Za-z][A-Za-z\s]*?(?=\s+\d)/);
  return (match ? match[0] : label).trim() || 'Unknown';
}

const indexNodeRefs = new Map(); // `${kind}:${id}` -> { row, expand }
let activeIndexKind = null;
let cachedIndexTree = null;

async function renderIndex(focusKind, focusId) {
  indexNodeRefs.clear();

  mainInner.appendChild(h('div', { class: 'surface-head' },
    h('h1', { class: 'surface-title' }, 'Index'),
  ));

  // Fetch tree once; cache so tab-switches don't re-fetch
  if (!cachedIndexTree) {
    try { cachedIndexTree = await api('/api/index/tree'); }
    catch (err) { mainInner.appendChild(h('div', { class: 'empty' }, `Couldn't load: ${err.message}`)); return; }
  }
  const byKind = {};
  for (const group of (cachedIndexTree.kinds || [])) byKind[group.kind] = group.active || [];

  // Build available tabs
  const availableTabs = KIND_ORDER.filter(([kind]) => (byKind[kind] || []).length > 0);
  if (!availableTabs.length) { mainInner.appendChild(h('div', { class: 'empty' }, 'Nothing indexed yet.')); return; }

  if (!activeIndexKind || !availableTabs.find(([k]) => k === activeIndexKind)) {
    activeIndexKind = availableTabs[0][0];
  }
  if (focusKind && availableTabs.find(([k]) => k === focusKind)) activeIndexKind = focusKind;

  // Tabs
  const tabsEl = h('div', { class: 'kind-tabs' });
  mainInner.appendChild(tabsEl);
  const host = h('div', { class: 'index-kinds' });
  mainInner.appendChild(host);

  const renderTab = (kind) => {
    indexNodeRefs.clear();
    host.innerHTML = '';
    activeIndexKind = kind;
    tabsEl.querySelectorAll('.kind-tab').forEach(t => t.classList.toggle('active', t.dataset.kind === kind));

    // Per-tab toolbar: collections / artifacts get "+ New heading" so the user
    // can drop a new TOC heading inline without leaving the tab.
    const toolbar = h('div', { style: { display: 'flex', gap: '6px', margin: '4px 0 6px' } });
    if (TOC_KINDS.has(kind)) {
      const btn = h('button', { class: 'btn sm' }, '+ New heading');
      btn.addEventListener('click', async () => {
        const label = prompt('Heading label?');
        if (!label || !label.trim()) return;
        try {
          await api('/api/headings', 'POST', { label: label.trim() });
          invalidateIndexCache();
          mainInner.innerHTML = '';
          renderIndex(kind);
        } catch (err) { toast(err.message, 'err'); }
      });
      toolbar.appendChild(btn);
    }
    if (toolbar.children.length) host.appendChild(toolbar);

    // TOC rendering (collections / artifacts): headings become indented sub-
    // sections at the top of the tab, each with its own children beneath. Any
    // row without a heading parent falls back into the "Unfiled" list below —
    // so every collection/artifact is reachable in one place, and grouping
    // feels like indenting a notebook TOC, not like switching tabs.
    if (TOC_KINDS.has(kind)) {
      const rows = byKind[kind] || [];
      const headings = (byKind['heading'] || cachedIndexTree.kinds.find(k => k.kind === 'heading')?.active || []);

      const inHeading = new Set();
      let anyHeadingRendered = false;
      for (const heading of headings) {
        // From the heading tree, take only children matching the current kind.
        const kids = (heading.children || []).filter(c => c.kind === kind);
        kids.forEach(c => inHeading.add(c.id));
        if (!kids.length && heading.archivedAt) continue;
        anyHeadingRendered = true;
        renderHeadingGroup(host, heading, kind, kids);
      }

      // Unfiled — collections / artifacts that don't live under any heading.
      const unfiled = rows.filter(r => !inHeading.has(r.id));
      if (unfiled.length) {
        if (anyHeadingRendered) {
          host.appendChild(h('div', { class: 'tree-heading-row' },
            h('span', null, ''),
            h('span', { class: 'tree-heading-label', style: { cursor: 'default' } }, 'Unfiled'),
            h('span', null, ''),
          ));
        }
        for (const node of unfiled) host.appendChild(renderTreeRow(kind, node, 0));
      }
      if (!anyHeadingRendered && !unfiled.length) {
        host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.'));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    // Back-of-book kinds render alphabetically, flat.
    const roots = byKind[kind] || [];
    const topLevel = roots.filter(r => !r.parents || r.parents.length === 0);
    let display = topLevel.length ? topLevel : roots;

    // Scripture → auto-group by Bible book in canonical order, rows within
    // each book ordered by chapter, then verse_start.
    if (kind === 'scripture') {
      if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
      const byBook = new Map();
      for (const node of display) {
        const book = scriptureBookOf(node);
        if (!byBook.has(book)) byBook.set(book, []);
        byBook.get(book).push(node);
      }
      const sortedBooks = [...byBook.keys()].sort((a, b) => {
        const ai = BIBLE_BOOK_INDEX.get(a.toLowerCase());
        const bi = BIBLE_BOOK_INDEX.get(b.toLowerCase());
        if (ai != null && bi != null) return ai - bi;
        if (ai != null) return -1;
        if (bi != null) return 1;
        return a.localeCompare(b, undefined, { sensitivity: 'base' });
      });
      for (const book of sortedBooks) {
        renderAutoHeadingGroup(host, book, kind, byBook.get(book).sort((a, b) => {
          const ac = a.meta?.chapter ?? 0, bc = b.meta?.chapter ?? 0;
          if (ac !== bc) return ac - bc;
          const av = a.meta?.verse_start ?? 0, bv = b.meta?.verse_start ?? 0;
          return av - bv;
        }));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    // Books → auto-group by author (alphabetical by author, alphabetical by
    // title within). Books without an author land in "Unknown author".
    if (kind === 'book') {
      if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
      const byAuthor = new Map();
      for (const node of display) {
        const author = (node.meta?.author_label || '').trim() || 'Unknown author';
        if (!byAuthor.has(author)) byAuthor.set(author, []);
        byAuthor.get(author).push(node);
      }
      const sortedAuthors = [...byAuthor.keys()].sort((a, b) => {
        if (a === 'Unknown author') return 1;
        if (b === 'Unknown author') return -1;
        return a.localeCompare(b, undefined, { sensitivity: 'base' });
      });
      for (const author of sortedAuthors) {
        renderAutoHeadingGroup(host, author, kind, byAuthor.get(author).sort((a, b) =>
          (a.label || '').localeCompare(b.label || '', undefined, { sensitivity: 'base' })
        ));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    display = [...display].sort((a, b) =>
      (a.label || a.title || a.canonical || '').localeCompare(b.label || b.title || b.canonical || '', undefined, { sensitivity: 'base' })
    );
    if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
    for (const node of display) host.appendChild(renderTreeRow(kind, node, 0));

    if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
  };

  // Auto-generated heading (scripture → Bible book, book → author). Reuses the
  // .tree-heading-row styling from the TOC headings, minus the row-level edit
  // actions (the heading is derived, not a user-editable entity).
  function renderAutoHeadingGroup(host, label, kind, kids) {
    const row = h('div', { class: 'tree-heading-row' });
    row.appendChild(h('span', null, ''));
    row.appendChild(h('span', { class: 'tree-heading-label', style: { cursor: 'default' } }, label));
    row.appendChild(h('span', null, ''));
    host.appendChild(row);
    const kidsHost = h('div', { class: 'tree-heading-children' });
    for (const c of kids) kidsHost.appendChild(renderTreeRow(kind, c, 1));
    host.appendChild(kidsHost);
  }

  // Renders one heading as a section label with its children (of the current
  // kind) indented beneath. Heading label itself has inline rename/merge/delete
  // actions that appear on hover.
  function renderHeadingGroup(host, heading, kind, kids) {
    const label = heading.label || '(untitled)';
    const row = h('div', { class: 'tree-heading-row' });
    row.appendChild(h('span', null, ''));
    const labelEl = h('span', { class: 'tree-heading-label' }, label);
    labelEl.addEventListener('click', () => openEntityDetail('heading', heading));
    row.appendChild(labelEl);

    const actions = h('div', { class: 'tree-actions' });
    actions.appendChild(buildActionBtn('Rename', () => renameNode('heading', heading)));
    actions.appendChild(buildActionBtn('Merge',  () => mergeNode('heading', heading)));
    actions.appendChild(buildActionBtn('×',      () => archiveOrDeleteHeading(heading)));
    row.appendChild(actions);
    host.appendChild(row);

    const kidsHost = h('div', { class: 'tree-heading-children' });
    if (!kids.length) {
      kidsHost.appendChild(h('div', { class: 'tree-heading-empty' }, 'empty'));
    } else {
      // Alphabetical inside the heading, matching notebook TOC convention.
      const sorted = [...kids].sort((a, b) =>
        (a.label || '').localeCompare(b.label || '', undefined, { sensitivity: 'base' })
      );
      for (const c of sorted) kidsHost.appendChild(renderTreeRow(kind, c, 1));
    }
    host.appendChild(kidsHost);
  }

  async function archiveOrDeleteHeading(heading) {
    if (!confirm(`Delete heading "${heading.label}"? Items filed under it keep their other parents and fall back to Unfiled.`)) return;
    try {
      await api(`/api/index/heading/${heading.id}/delete`, 'POST', {});
      toast('deleted', 'ok');
      invalidateIndexCache();
      mainInner.innerHTML = '';
      renderIndex(activeIndexKind);
    } catch (err) { toast(err.message, 'err'); }
  }

  for (const [kind, label] of availableTabs) {
    const count = (byKind[kind] || []).length;
    const tab = h('button', { class: 'kind-tab' + (kind === activeIndexKind ? ' active' : ''), dataset: { kind } },
      label,
      h('span', { class: 'tab-count' }, String(count)),
    );
    tab.addEventListener('click', () => renderTab(kind));
    tabsEl.appendChild(tab);
  }

  renderTab(activeIndexKind);
}

function renderTreeRow(kind, node, depth) {
  const wrap = h('div');
  const chevron = h('div', { class: 'tree-chevron' }, '▸');
  const labelEl = h('div', { class: 'tree-label' + (node._repeat ? ' repeat' : '') }, node.label || node.title || node.canonical || '(untitled)');
  const totalP = node.totalPageCount ?? node.total_pages ?? node.directPageCount ?? node.page_count ?? null;
  const counts = h('div', { class: 'tree-counts' }, totalP != null ? String(totalP) : '');

  const actions = h('div', { class: 'tree-actions' });
  if (!node._repeat) {
    const renameBtn = buildActionBtn('Rename', () => renameNode(kind, node));
    const mergeBtn = buildActionBtn('Merge', () => mergeNode(kind, node));
    const parentBtn = buildActionBtn('↑ Parent', () => setParent(kind, node, parentBtn));
    actions.append(renameBtn, mergeBtn, parentBtn);
    if (kind === 'collection' || kind === 'artifact') {
      // TOC heading assignment — distinct from the topic-parent ↑ above.
      const headingBtn = buildActionBtn('↑ Heading', () => setHeadingForNode(kind, node));
      actions.append(headingBtn);
    }
    if (kind === 'collection' || kind === 'artifact' || kind === 'person') {
      actions.appendChild(buildActionBtn('Archive', () => archiveNode(kind, node)));
    }
  }

  const row = h('div', { class: 'tree-row' }, chevron, labelEl, counts, actions);
  const panel = h('div', { class: 'tree-panel', style: { display: 'none' } });
  const kids = h('div', { class: 'tree-children', style: { display: 'none' } });

  let loaded = false;
  const setOpen = async (force) => {
    const open = force != null ? force : !chevron.classList.contains('open');
    chevron.classList.toggle('open', open);
    row.classList.toggle('expanded', open);
    panel.style.display = open ? 'block' : 'none';
    kids.style.display = open ? 'block' : 'none';
    if (open && !loaded && !node._repeat) {
      loaded = true;
      panel.innerHTML = '<div class="soft" style="font-size:12px">loading…</div>';
      try {
        const conn = await api(`/api/index/${kind}/${node.id}/connections`);
        renderConnectionsPanel(panel, kind, node, conn);
      } catch (err) {
        panel.innerHTML = '';
        panel.appendChild(h('div', { class: 'soft' }, `Couldn't load: ${err.message}`));
      }
      if (node.children?.length) {
        for (const c of node.children) kids.appendChild(renderTreeRow(kind, c, depth + 1));
      }
    }
  };
  chevron.addEventListener('click', (e) => { e.stopPropagation(); setOpen(); });
  // label click → open entity pages in right pane; chevron only toggles inline metadata
  labelEl.addEventListener('click', (e) => { e.stopPropagation(); openEntityDetail(kind, node); });

  indexNodeRefs.set(`${kind}:${node.id}`, { row, expand: () => setOpen(true) });

  wrap.append(row, panel, kids);
  return wrap;
}

function buildActionBtn(label, onClick) {
  const b = h('button', { class: 'btn sm' }, label);
  b.addEventListener('click', (e) => { e.stopPropagation(); onClick(b); });
  return b;
}

function renderConnectionsPanel(panel, kind, node, conn) {
  panel.innerHTML = '';

  // Metadata editors
  const meta = h('div', { class: 'meta-form' });
  if (kind === 'person') {
    meta.append(
      h('label', null, 'growth'),
      (() => {
        const el = h('textarea', { class: 'input', rows: 2, value: node.growthNote || node.growth_note || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { growth_note: el.value }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'household'),
      (() => {
        const el = h('input', { class: 'input', value: node.household || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { household: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'priority'),
      (() => {
        const el = h('input', { type: 'number', class: 'input', value: node.priority ?? '', min: 0, max: 3 });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { priority: el.value === '' ? null : Number(el.value) }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'book') {
    meta.append(
      h('label', null, 'author'),
      (() => {
        const el = h('input', { class: 'input', value: node.author || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/books/${node.id}`, 'PATCH', { author: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'year'),
      (() => {
        const el = h('input', { type: 'number', class: 'input', value: node.year || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/books/${node.id}`, 'PATCH', { year: el.value ? Number(el.value) : null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'collection') {
    meta.append(
      h('label', null, 'description'),
      (() => {
        const el = h('textarea', { class: 'input', rows: 2, value: node.description || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/collections/${node.id}`, 'PATCH', { description: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'artifact' || kind === 'reference') {
    meta.append(
      h('label', null, 'URL'),
      (() => {
        const el = h('input', { class: 'input', value: node.externalUrl || node.external_url || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/${kind}s/${node.id}`, 'PATCH', { external_url: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  }
  if (meta.children.length) panel.appendChild(meta);

  // Pages link (as a button that navigates)
  if (conn.pages_count > 0) {
    const pagesLink = h('button', { class: 'pages-link' },
      `${conn.pages_count} page${conn.pages_count > 1 ? 's' : ''}`,
    );
    pagesLink.addEventListener('click', (e) => {
      e.stopPropagation();
      // TODO: open pages context view; for now, nothing
      toast(`Opening pages for "${node.label}" — coming soon`, 'ok');
    });
    panel.appendChild(h('div', { style: { marginBottom: '10px' } }, pagesLink));
  }

  // Connection lists
  const secs = [
    ['daily_logs', 'Days', 'daily_log'],
    ['collections', 'Collections', 'collection'],
    ['artifacts', 'Artifacts', 'artifact'],
    ['references', 'References', 'reference'],
  ];
  let hasAny = false;
  for (const [key, label, chipKind] of secs) {
    const items = conn[key] || [];
    if (!items.length) continue;
    hasAny = true;
    panel.appendChild(h('div', { class: 'section-label' }, label));
    const list = h('div', { class: 'conn-list' });
    for (const it of items) {
      const text = chipKind === 'daily_log'
        ? (it.date + (it.summary ? ` — ${it.summary.slice(0, 48)}` : ''))
        : (it.title || it.label || '(untitled)');
      const chip = h('span', { class: `chip kind-${chipKind}` }, text);
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        if (chipKind === 'daily_log') navigate('day', it.id);
        else jumpToIndexNode(chipKind, it.id);
      });
      list.appendChild(chip);
    }
    panel.appendChild(list);
  }

  if (!hasAny && !conn.pages_count) {
    panel.appendChild(h('div', { class: 'soft', style: { fontSize: '11.5px', marginTop: '6px' } }, 'No connections yet.'));
  }

  // Cross-kind "Find related" — only for rows that can be the FROM side of a
  // cross-kind link (collection / artifact / reference / daily_log).
  if (['collection', 'artifact', 'reference', 'daily_log'].includes(kind)) {
    const btn = h('button', { class: 'btn sm' }, 'Find related');
    btn.addEventListener('click', (e) => { e.stopPropagation(); findRelatedForNode(kind, node.id, btn); });
    const when = node.links_classified_at ? `last run ${new Date(node.links_classified_at).toLocaleString()}` : 'never run';
    panel.appendChild(h('div', { style: { marginTop: '12px', display: 'flex', alignItems: 'center', gap: '8px' } },
      btn,
      h('span', { class: 'soft', style: { fontSize: '11px' } }, when),
    ));
  }

  // Per-user_index noise filter (Hidden / Forced in / Rebuild).
  if (kind === 'user_index') {
    panel.appendChild(h('div', { class: 'section-label', style: { marginTop: '12px' } }, 'Noise filter'));
    const host = h('div');
    panel.appendChild(host);
    renderUserIndexFiltersInto(host, node.id);
  }
}

// ── Entity detail (right pane, pages view) ──
async function openEntityDetail(kind, node) {
  detailBackContext = null;
  detailInner.innerHTML = '';
  detailInner.appendChild(h('div', { class: 'soft', style: { padding: '24px' } }, 'Loading…'));
  openDetail();

  let conn;
  try { conn = await api(`/api/index/${kind}/${node.id}/connections`); }
  catch (err) { detailInner.innerHTML = ''; detailInner.appendChild(h('div', { class: 'empty' }, err.message)); return; }

  renderEntityDetail(kind, node, conn);
}

function renderEntityDetail(kind, node, conn) {
  detailInner.innerHTML = '';
  const label = node.label || node.title || node.canonical || '(untitled)';
  const kindLabel = KIND_ORDER.find(([k]) => k === kind)?.[1] || kind;

  const convertBtn = ['artifact', 'reference', 'collection'].includes(kind)
    ? h('button', { class: 'btn-ghost', onclick: () => convertEntityDetail(kind, node) }, 'Convert to…')
    : null;

  detailInner.append(
    h('div', { class: 'detail-head' },
      h('div', null,
        h('div', { class: 'sub' }, kindLabel),
        h('div', { class: 'title' }, label),
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
        convertBtn,
        h('button', { class: 'icon-btn', onclick: () => closeDetail(), title: 'Close' }, '×'),
      ),
    ),
  );

  const body = h('div', { style: { padding: '20px 4px' } });

  // Pages
  const pages = conn.pages || [];
  if (!pages.length) {
    body.appendChild(h('div', { class: 'empty' }, 'No pages linked yet.'));
  } else {
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, `${pages.length} page${pages.length !== 1 ? 's' : ''}`));

    // Group by scan_path for spread support
    const groups = new Map();
    for (const p of pages) {
      const key = p.scan_path || `p:${p.id}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(p);
    }

    for (const [, group] of groups) {
      const first = group[0];
      const isVoice = first.source_kind === 'voice_memo' || (first.scan_path || '').startsWith('voice:');
      const thumb = isVoice
        ? h('div', { class: 'thumb voice' }, '♪')
        : h('div', { class: 'thumb' }, h('img', { src: `/api/pages/${first.id}/scan`, alt: '', loading: 'lazy' }));
      const caps = group.map(p => p.summary || '').filter(Boolean).join(' · ') || '(no summary)';
      const meta = group.map(p => p.volume && p.page_number ? `v.${p.volume} p.${p.page_number}` : '').filter(Boolean).join(' · ');

      // Context badges: source (voice, date, collection, artifact, reference)
      const ctxBadges = [];
      if (isVoice) ctxBadges.push(h('span', { class: 'ctx-badge voice' }, '♪ voice memo'));
      const dlDate = first.daily_log_date;
      if (dlDate) {
        const [y, mo, d] = dlDate.split('-');
        const dateStr = new Date(+y, +mo - 1, +d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const badge = h('span', { class: 'ctx-badge date' }, dateStr);
        badge.addEventListener('click', e => { e.stopPropagation(); navigate('day', first.daily_log_id); });
        ctxBadges.push(badge);
      }
      if (first.collection_titles) {
        ctxBadges.push(h('span', { class: 'ctx-badge coll' }, first.collection_titles));
      }
      if (first.artifact_title) {
        ctxBadges.push(h('span', { class: 'ctx-badge artifact' }, `artifact: ${first.artifact_title}`));
      }
      if (first.reference_title) {
        ctxBadges.push(h('span', { class: 'ctx-badge reference' }, `ref: ${first.reference_title}`));
      }

      const tile = h('div', { class: 'day-tile' },
        thumb,
        h('div', { class: 'tile-body' },
          ctxBadges.length ? h('div', { class: 'ctx-badges' }, ...ctxBadges) : null,
          h('div', { class: 'captions' }, caps),
          h('div', { class: 'tile-meta' }, `${group.length} page${group.length > 1 ? 's' : ''}${meta ? ' · ' + meta : ''}`),
        ),
      );
      tile.addEventListener('click', () => {
        detailBackContext = {
          label,
          action: () => renderEntityDetail(kind, node, conn),
        };
        openPageDetail(first.id);
      });
      body.appendChild(tile);
    }
  }

  // Connection chips (days, collections, etc.)
  const connSecs = [
    ['daily_logs', 'Days', 'daily_log'],
    ['collections', 'Collections', 'collection'],
    ['artifacts', 'Artifacts', 'artifact'],
    ['references', 'References', 'reference'],
  ];
  let hasConns = false;
  const connHost = h('div', { class: 'links-section' });
  for (const [key, secLabel, chipKind] of connSecs) {
    const items = conn[key] || [];
    if (!items.length) continue;
    hasConns = true;
    const row = h('div', { class: 'links-group' },
      h('div', { class: 'links-group-lbl' }, secLabel),
      h('div', { class: 'links-row' },
        ...items.map(it => {
          const text = chipKind === 'daily_log'
            ? it.date + (it.summary ? ` — ${it.summary.slice(0, 40)}` : '')
            : (it.title || it.label || '(untitled)');
          const chip = h('span', { class: `chip kind-${chipKind}` }, text);
          chip.addEventListener('click', () => chipKind === 'daily_log' ? navigate('day', it.id) : jumpToIndexNode(chipKind, it.id));
          return chip;
        }),
      ),
    );
    connHost.appendChild(row);
  }
  if (hasConns) body.appendChild(connHost);

  detailInner.appendChild(body);
}

function invalidateIndexCache() { cachedIndexTree = null; }

async function renameNode(kind, node) {
  const next = prompt(`Rename "${node.label}":`, node.label);
  if (!next || next === node.label) return;
  try {
    await api(`/api/index/${kind}/${node.id}/rename`, 'POST', { label: next });
    toast('renamed', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

async function mergeNode(kind, node) {
  const targetLabel = prompt(`Merge "${node.label}" into (type exact label):`);
  if (!targetLabel) return;
  try {
    const search = await api(`/api/index/search?q=${encodeURIComponent(targetLabel.replace(/['"*]/g, ' '))}`);
    const match = (search.results || []).find(r => r.kind === kind && r.label.toLowerCase() === targetLabel.toLowerCase());
    if (!match) { toast('No exact match found', 'err'); return; }
    if (match.id === node.id) { toast('Cannot merge into self', 'err'); return; }
    if (!confirm(`Merge "${node.label}" into "${match.label}"? This is irreversible.`)) return;
    await api(`/api/index/${kind}/${node.id}/merge`, 'POST', { into_id: match.id });
    toast('merged', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

function convertEntityDetail(kind, node) {
  const TARGETS = {
    artifact:   ['reference', 'collection'],
    reference:  ['artifact',  'collection'],
    collection: ['artifact',  'reference'],
  };
  const targets = TARGETS[kind];
  if (!targets) return;

  const anchorBtn = [...document.querySelectorAll('#detail button')].find(b => b.textContent.trim() === 'Convert to…');
  const rect = anchorBtn ? anchorBtn.getBoundingClientRect() : { left: 200, bottom: 220 };

  const pop = h('div', { class: 'typeahead-pop', style: { minWidth: '160px' } });
  const list = h('div', { class: 'typeahead-list' });
  pop.appendChild(list);
  document.body.appendChild(pop);
  const rightOffset = Math.max(4, window.innerWidth - (anchorBtn ? anchorBtn.getBoundingClientRect().right : window.innerWidth - 4));
  Object.assign(pop.style, {
    position: 'fixed',
    top: `${Math.min(rect.bottom + 4, window.innerHeight - 120)}px`,
    right: `${rightOffset}px`,
    left: 'auto',
  });

  const close = () => { pop.remove(); document.removeEventListener('mousedown', away); };
  const away = (e) => { if (!pop.contains(e.target)) close(); };
  setTimeout(() => document.addEventListener('mousedown', away), 0);

  for (const toKind of targets) {
    const label = toKind.charAt(0).toUpperCase() + toKind.slice(1);
    const row = h('div', { class: 'typeahead-row' }, h('span', null, label));
    row.addEventListener('click', async () => {
      close();
      if (!confirm(`Convert to ${label}? All linked pages and connections will be preserved.`)) return;
      try {
        const r = await api(`/api/index/${kind}/${node.id}/convert`, 'POST', { to_kind: toKind });
        toast(`Converted to ${label}`, 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
        openEntityDetail(toKind, { id: r.id, label: r.label });
      } catch (err) { toast(err.message, 'err'); }
    });
    list.appendChild(row);
  }
}

async function archiveNode(kind, node) {
  if (!confirm(`Archive "${node.label}"?`)) return;
  try {
    await api(`/api/index/${kind}/${node.id}/archive`, 'POST', { archived: true });
    toast('archived', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

function setParent(kind, node, anchorBtn) {
  openTypeahead({
    anchor: anchorBtn || null,
    placeholder: 'Find a parent…',
    onPick: async (r) => {
      try {
        await api(`/api/index/${kind}/${node.id}/parent`, 'POST', { parent_kind: r.kind, parent_id: r.id });
        toast('parent set', 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
      } catch (err) { toast(err.message, 'err'); }
    },
  });
}

// Attach a collection or artifact to a heading. Multi-parent is allowed, so
// the API call is additive; remove-from-heading is a separate chip click in
// the connections panel. Uses the same typeahead as other parent pickers, but
// restricted to the heading kind; if the user types a label not in the list
// and accepts, we create a new heading and attach to it.
async function setHeadingForNode(kind, node) {
  openTypeahead({
    anchor: null,
    kinds: ['heading'],
    placeholder: 'Find or create a heading…',
    allowCreate: true,
    createLabel: 'New heading',
    onPick: async (r) => {
      try {
        let headingId = r.id;
        if (r._create) {
          const created = await api('/api/headings', 'POST', { label: r.label });
          headingId = created.id;
        }
        await api(`/api/index/${kind}/${node.id}/parent`, 'POST', {
          parent_kind: 'heading', parent_id: headingId,
        });
        toast('filed under heading', 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
      } catch (err) { toast(err.message, 'err'); }
    },
  });
}

// Cross-kind "Find related": bypass hash-skip, classify now, toast the counts.
async function findRelatedForNode(kind, id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Finding…'; }
  try {
    const r = await api(`/api/index/${kind}/${id}/find-related`, 'POST', {});
    toast(`+${r.linked || 0} links, ${r.proposals || 0} proposals`, 'ok');
    invalidateIndexCache();
  } catch (err) { toast(err.message, 'err'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Find related'; } }
}

// Load & render the noise-filter UI for a user_index: hidden (excluded) entries
// with a reason badge + a force-include button; forced entries with remove
// buttons. Mounts into a host div the caller provides.
async function renderUserIndexFiltersInto(host, id) {
  host.innerHTML = '<div class="soft" style="font-size:12px">loading…</div>';
  let data;
  try { data = await api(`/api/user-indexes/${id}/exclusions`); }
  catch (err) { host.innerHTML = ''; host.appendChild(h('div', { class: 'soft' }, err.message)); return; }
  host.innerHTML = '';

  const rebuildBtn = h('button', { class: 'btn sm' }, 'Rebuild index');
  rebuildBtn.addEventListener('click', async () => {
    rebuildBtn.disabled = true; rebuildBtn.textContent = 'Rebuilding…';
    try {
      const r = await api(`/api/user-indexes/${id}/rebuild`, 'POST', {});
      toast(`rebuilt — ${r.entries_count || 0} entries, ${r.excluded_count || 0} hidden`, 'ok');
      renderUserIndexFiltersInto(host, id);
    } catch (err) { toast(err.message, 'err'); }
    finally { rebuildBtn.disabled = false; rebuildBtn.textContent = 'Rebuild index'; }
  });
  host.appendChild(h('div', { style: { marginBottom: '8px' } }, rebuildBtn));

  const section = (title, rows, actionLabel, onAction) => {
    if (!rows.length) return;
    host.appendChild(h('div', { class: 'section-label' }, title));
    const list = h('div', { class: 'conn-list' });
    for (const row of rows) {
      const text = `${row.label || row.entity_id}` + (row.reason ? ` · ${row.reason.replace('_', ' ')}` : '');
      const chip = h('span', { class: `chip kind-${row.entity_kind}` }, text);
      const btn = h('button', { class: 'btn-ghost', style: { marginLeft: '4px', fontSize: '10px' } }, actionLabel);
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try { await onAction(row); renderUserIndexFiltersInto(host, id); }
        catch (err) { toast(err.message, 'err'); }
      });
      const wrap = h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '2px' } }, chip, btn);
      list.appendChild(wrap);
    }
    host.appendChild(list);
  };

  section('Hidden (auto)', data.auto || [], 'Include', (row) =>
    api(`/api/user-indexes/${id}/inclusions`, 'POST', { entity_kind: row.entity_kind, entity_id: row.entity_id })
  );
  section('Hidden (blocked by you)', data.user || [], 'Unblock', (row) =>
    api(`/api/user-indexes/${id}/exclusions/${row.id}`, 'DELETE')
  );
  section('Forced in', data.inclusions || [], '×', (row) =>
    api(`/api/user-indexes/${id}/inclusions/${row.id}`, 'DELETE')
  );

  if (!(data.auto || []).length && !(data.user || []).length && !(data.inclusions || []).length) {
    host.appendChild(h('div', { class: 'soft', style: { fontSize: '11.5px', marginTop: '6px' } }, 'No filter rules yet. Rebuild the index to populate.'));
  }
}

async function jumpToIndexNode(kind, id, alreadyOnIndex = false) {
  if (!alreadyOnIndex) {
    // Navigate to index with the target kind+id in the hash so renderIndex
    // switches to the right tab and calls jumpToIndexNode(kind, id, true) itself.
    currentLeftHash = `#/index/${kind}/${id}`;
    location.hash = `#/index/${kind}/${id}`;
    return;
  }
  // Already on the right tab — scroll to the row.
  const key = `${kind}:${id}`;
  const tries = [0, 80, 200, 450];
  for (const t of tries) {
    await new Promise(r => setTimeout(r, t));
    const ref = indexNodeRefs.get(key);
    if (ref) {
      ref.expand();
      ref.row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      ref.row.style.transition = 'background 600ms';
      ref.row.style.background = 'var(--accent-soft)';
      setTimeout(() => { ref.row.style.background = ''; }, 1200);
      return;
    }
  }
  toast(`Couldn't find ${kind} in index`, 'err');
}

// ─── Cmd+K palette ─────────────────────────
const cmdkEl = document.getElementById('cmdk');
const cmdkInput = document.getElementById('cmdk-input');
const cmdkList = document.getElementById('cmdk-list');
let cmdkActive = 0;
let cmdkRows = [];
let cmdkTimer = null;

function openCmdk() {
  cmdkEl.classList.add('open');
  cmdkInput.value = '';
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  cmdkInput.focus();
  // Seed with recent daily logs (current month)
  api(`/api/logs/month/${ymNow()}`).then(res => {
    if (cmdkInput.value) return; // user already typed
    const hasDays = (res.days || []).filter(d => d.daily_log_id);
    cmdkRenderSeed(hasDays);
  }).catch(() => {});
}
function closeCmdk() {
  cmdkEl.classList.remove('open');
  cmdkInput.blur();
}
document.getElementById('cmdk-backdrop').addEventListener('click', closeCmdk);

function cmdkRenderSeed(days) {
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  if (!days.length) return;
  const sec = h('div', { class: 'cmdk-section' });
  sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, 'Recent days'));
  for (const d of days.slice(-10).reverse()) {
    const row = h('div', { class: 'cmdk-row' },
      h('span', { class: 'cmdk-lbl' }, d.date),
      d.preview ? h('span', { class: 'cmdk-sub' }, d.preview.slice(0, 60)) : null,
      h('span', { class: 'cmdk-kind' }, 'day'),
    );
    row.addEventListener('click', () => { closeCmdk(); navigate('day', d.daily_log_id); });
    sec.appendChild(row);
    cmdkRows.push({ el: row, action: () => { closeCmdk(); navigate('day', d.daily_log_id); } });
  }
  cmdkList.appendChild(sec);
  cmdkHighlight();
}

async function cmdkQuery(q) {
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  if (!q) return;

  // Date shorthand: "apr 3", "3 apr", "2026-04-03", "apr", YYYY-MM
  const dateMatch = tryParseDate(q);
  if (dateMatch) {
    const row = h('div', { class: 'cmdk-row' },
      h('span', { class: 'cmdk-lbl' }, dateMatch.label),
      h('span', { class: 'cmdk-kind' }, 'day'),
    );
    const go = async () => {
      closeCmdk();
      const res = await api(`/api/logs/month/${dateMatch.ym}`);
      const day = (res.days || []).find(d => d.date === dateMatch.date);
      if (day?.daily_log_id) navigate('day', day.daily_log_id);
      else navigate('log', dateMatch.ym);
    };
    row.addEventListener('click', go);
    const sec = h('div', { class: 'cmdk-section' });
    sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, 'Date'));
    sec.appendChild(row);
    cmdkList.appendChild(sec);
    cmdkRows.push({ el: row, action: go });
    cmdkHighlight();
    return;
  }

  try {
    const safe = q.replace(/['"*]/g, ' ').trim();
    const res = await api(`/api/index/search?q=${encodeURIComponent(safe)}`);
    const results = res.results || [];
    if (!results.length) {
      cmdkList.appendChild(h('div', { class: 'cmdk-empty' }, 'No results.'));
      return;
    }
    // Group by kind
    const grouped = new Map();
    for (const r of results.slice(0, 30)) {
      const k = r.kind;
      if (!grouped.has(k)) grouped.set(k, []);
      grouped.get(k).push(r);
    }
    for (const [kind, items] of grouped) {
      const sec = h('div', { class: 'cmdk-section' });
      const kindLabel = { collection: 'Collections', person: 'People', topic: 'Topics', book: 'Books', artifact: 'Artifacts', reference: 'References', scripture: 'Scripture', user_index: 'Custom' }[kind] || kind;
      sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, kindLabel));
      for (const r of items.slice(0, 8)) {
        const row = h('div', { class: 'cmdk-row' },
          h('span', { class: 'cmdk-lbl' }, r.label),
          h('span', { class: 'cmdk-kind' }, kind.replace('_', ' ')),
        );
        const go = () => { closeCmdk(); jumpToIndexNode(kind, r.id); };
        row.addEventListener('click', go);
        sec.appendChild(row);
        cmdkRows.push({ el: row, action: go });
      }
      cmdkList.appendChild(sec);
    }
    cmdkHighlight();
  } catch {}
}

function tryParseDate(q) {
  q = q.trim().toLowerCase();
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const fullMonths = ['january','february','march','april','may','june','july','august','september','october','november','december'];

  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(q)) {
    return { date: q, ym: q.slice(0,7), label: q };
  }
  // YYYY-MM
  if (/^\d{4}-\d{2}$/.test(q)) {
    const [y, m] = q.split('-').map(Number);
    const d = new Date(y, m-1, 1);
    return { date: q + '-01', ym: q, label: d.toLocaleString('en-US',{month:'long',year:'numeric'}) };
  }
  // "apr 3" or "3 apr" or "april 3" etc.
  const parts = q.split(/[\s,]+/).filter(Boolean);
  const now = new Date();
  if (parts.length === 2) {
    let monthIdx = -1, day = 0;
    for (const p of parts) {
      const mi = months.indexOf(p.slice(0,3));
      if (mi >= 0) { monthIdx = mi; continue; }
      const fi = fullMonths.indexOf(p);
      if (fi >= 0) { monthIdx = fi; continue; }
      if (/^\d{1,2}$/.test(p)) day = Number(p);
    }
    if (monthIdx >= 0 && day > 0) {
      const y = now.getFullYear();
      const date = `${y}-${String(monthIdx+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const ym = date.slice(0,7);
      const label = new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'});
      return { date, ym, label };
    }
  }
  // single month name → go to that month in current year
  if (parts.length === 1) {
    const mi = months.indexOf(parts[0].slice(0,3));
    const fi = fullMonths.indexOf(parts[0]);
    const idx = mi >= 0 ? mi : fi;
    if (idx >= 0) {
      const y = now.getFullYear();
      const ym = `${y}-${String(idx+1).padStart(2,'0')}`;
      const label = new Date(y, idx, 1).toLocaleString('en-US',{month:'long',year:'numeric'});
      return { date: ym+'-01', ym, label };
    }
  }
  return null;
}

function cmdkHighlight() {
  cmdkRows.forEach((r, i) => r.el.classList.toggle('active', i === cmdkActive));
}

cmdkInput.addEventListener('input', () => {
  clearTimeout(cmdkTimer);
  cmdkTimer = setTimeout(() => cmdkQuery(cmdkInput.value.trim()), 160);
});
cmdkInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCmdk(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdkActive = Math.min(cmdkActive+1, cmdkRows.length-1); cmdkHighlight(); cmdkRows[cmdkActive]?.el.scrollIntoView({block:'nearest'}); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); cmdkActive = Math.max(cmdkActive-1, 0); cmdkHighlight(); cmdkRows[cmdkActive]?.el.scrollIntoView({block:'nearest'}); }
  if (e.key === 'Enter') { cmdkRows[cmdkActive]?.action(); }
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    cmdkEl.classList.contains('open') ? closeCmdk() : openCmdk();
  }
});

// ─── boot ──────────────────────────────────
if (!location.hash || location.hash === '#') location.hash = '#/log/' + ymNow();
route();
</script>
