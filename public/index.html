<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gloss</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C9A97A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Gloss">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="/fonts/foxed.css">
<style>
:root {
  --paper:       #F9F8F6;
  --paper-2:     #F2F0EC;
  --paper-3:     #E9E6E0;
  --paper-edge:  #E2DED8;
  --surface:     #FFFFFF;
  --ink:         #1C1917;
  --ink-soft:    #57534E;
  --ink-faint:   #A8A29E;
  --rule:        #E7E5E0;
  --rule-soft:   #F0EDE8;
  --accent:      #C2410C;
  --accent-dim:  #9A3412;
  --accent-soft: #FFEDD5;
  --danger:      #DC2626;
  --ok:          #16A34A;
  --ink-2:       #78716C;
  --ink-3:       #A8A29E;
  --ink-4:       #C7C0BA;
  --border:      #E7E5E0;

  --font-sans:   "Inter", system-ui, -apple-system, sans-serif;
  --font-serif:  ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, "URW Palladio L", P052, "Book Antiqua", Georgia, serif;
  --font-mono:   "JetBrains Mono", ui-monospace, Menlo, monospace;

  --r-sm: 4px;
  --r:    6px;
  --r-lg: 10px;
  --shadow-sm:   0 1px 2px rgba(0,0,0,.06);
  --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lift: 0 8px 24px rgba(0,0,0,.10), 0 3px 8px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-focus: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);

  /* Motion system — one canonical easing + a couple of durations.
     Use var(--t) for most UI transitions, --t-fast for hover states,
     --t-slow for panel/surface-level transitions. */
  --ease:        cubic-bezier(0.2, 0.7, 0.2, 1);
  --ease-decel:  cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --t-fast: 120ms var(--ease);
  --t:      180ms var(--ease);
  --t-slow: 280ms var(--ease-decel);

  --rail-w: 220px;
  --detail-w: 0px;

  /* Suite-shared tokens (vocabulary aligned with comms/black/scribe/maestro).
   * Gloss keeps its flagship foxed-sans + custom focus treatment; the tokens
   * live here for cross-app consistency but are not applied to body/focus. */
  --suite-focus: #6b9bd1;
  --suite-touch-min: 44px;
  --suite-font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}

/* ── Dark mode ─────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --paper:       #1C1917;
    --paper-2:     #242019;
    --paper-3:     #2E2924;
    --paper-edge:  #3A342E;
    --surface:     #201C18;
    --ink:         #F5F2EE;
    --ink-soft:    #B4ACA5;
    --ink-faint:   #6B6560;
    --ink-2:       #8C8681;
    --ink-3:       #6B6560;
    --ink-4:       #504A47;
    --border:      #353028;
    --rule:        #353028;
    --rule-soft:   #2A2620;
    --accent:      #EA580C;
    --accent-dim:  #C2410C;
    --accent-soft: #431407;
    --danger:      #EF4444;
    --ok:          #22C55E;
    --shadow-sm:   0 1px 2px rgba(0,0,0,.30);
    --shadow-card: 0 1px 3px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
    --shadow-lift: 0 8px 24px rgba(0,0,0,.50), 0 3px 8px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.25);
  }
}
html[data-theme="dark"] {
  --paper:       #1C1917;
  --paper-2:     #242019;
  --paper-3:     #2E2924;
  --paper-edge:  #3A342E;
  --surface:     #201C18;
  --ink:         #F5F2EE;
  --ink-soft:    #B4ACA5;
  --ink-faint:   #6B6560;
  --ink-2:       #8C8681;
  --ink-3:       #6B6560;
  --ink-4:       #504A47;
  --border:      #353028;
  --rule:        #353028;
  --rule-soft:   #2A2620;
  --accent:      #EA580C;
  --accent-dim:  #C2410C;
  --accent-soft: #431407;
  --danger:      #EF4444;
  --ok:          #22C55E;
  --shadow-sm:   0 1px 2px rgba(0,0,0,.30);
  --shadow-card: 0 1px 3px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
  --shadow-lift: 0 8px 24px rgba(0,0,0,.50), 0 3px 8px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.25);
}
html[data-theme="light"] {
  --paper:       #F9F8F6;
  --paper-2:     #F2F0EC;
  --paper-3:     #E9E6E0;
  --paper-edge:  #E2DED8;
  --surface:     #FFFFFF;
  --ink:         #1C1917;
  --ink-soft:    #57534E;
  --ink-faint:   #A8A29E;
  --ink-2:       #78716C;
  --ink-3:       #A8A29E;
  --ink-4:       #C7C0BA;
  --border:      #E7E5E0;
  --rule:        #E7E5E0;
  --rule-soft:   #F0EDE8;
  --accent:      #C2410C;
  --accent-dim:  #9A3412;
  --accent-soft: #FFEDD5;
  --danger:      #DC2626;
  --ok:          #16A34A;
  --shadow-sm:   0 1px 2px rgba(0,0,0,.06);
  --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lift: 0 8px 24px rgba(0,0,0,.10), 0 3px 8px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background-color 200ms ease, color 200ms ease;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-dim); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }

/* ── Shell (split-pane) ────────────────── */
#shell { display: flex; min-height: 100vh; align-items: stretch; }

#rail {
  flex: 0 0 var(--rail-w);
  transition: flex-basis 240ms var(--ease-decel);
  background: var(--paper-2);
  border-right: 1px solid var(--rule);
  padding: 18px 14px;
  display: flex; flex-direction: column; gap: 2px;
  position: sticky; top: 0; align-self: flex-start;
  height: 100vh;
  overflow: hidden;
}
body.rail-collapsed { --rail-w: 58px; }
body.rail-collapsed #rail { padding: 18px 8px; }

.rail-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  padding: 2px 6px;
}
#brand {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0;
  white-space: nowrap;
  transition: opacity 160ms;
}
#brand .dot { color: var(--accent); }
body.rail-collapsed #brand { opacity: 0; width: 0; overflow: hidden; }
#rail-toggle {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  color: var(--ink-faint);
  transition: all var(--t);
  flex-shrink: 0;
}
#rail-toggle:hover { color: var(--ink); background: var(--paper-3); }
body.rail-collapsed #rail-toggle { transform: rotate(180deg); margin: 0 auto; }

.nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border-radius: var(--r);
  color: var(--ink-soft);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0;
  transition: color var(--t), background var(--t), border-color var(--t);
  text-align: left;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
}
.nav-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 2px;
  background: transparent;
  border-radius: 2px;
  transition: background var(--t);
}
.nav-btn:hover { color: var(--ink); background: var(--paper-3); }
.nav-btn.active { color: var(--ink); background: var(--paper); }
.nav-btn.active::before { background: var(--accent); }
.nav-btn .ico { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
.nav-btn.active .ico { opacity: 1; color: var(--accent); }
.nav-btn .lbl { transition: opacity 140ms; }
body.rail-collapsed .nav-btn { justify-content: center; padding: 8px 0; gap: 0; }
body.rail-collapsed .nav-btn .lbl { display: none; }

#rail-footer {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  padding: 8px 10px;
  text-transform: uppercase;
  transition: opacity 160ms;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
body.rail-collapsed #rail-footer { opacity: 0; }

#comms-pill {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: none;
  color: var(--ink-faint);
  cursor: pointer;
  border-radius: var(--r-sm);
  padding: 2px 4px;
  border: none;
  background: none;
  user-select: none;
}
#comms-pill:hover { background: var(--paper-3); color: var(--ink-soft); }
#comms-pill.syncing { opacity: 0.6; pointer-events: none; }
#comms-pill.shown { display: inline-flex; }
#comms-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink-faint);
  flex-shrink: 0;
}
#comms-pill.ok      .dot { background: var(--ok); }
#comms-pill.stale   .dot { background: #d97706; }
#comms-pill.failed  .dot { background: var(--danger); }

#theme-toggle {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border-radius: var(--r);
  color: var(--ink-faint);
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 13px;
  width: 100%;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  margin-top: auto;
  transition: color var(--t), background var(--t);
}
#theme-toggle:hover { color: var(--ink-soft); background: var(--paper-3); }
#theme-toggle .ico { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
#theme-toggle:hover .ico { opacity: 1; }
#theme-toggle .lbl { transition: opacity 140ms; }
body.rail-collapsed #theme-toggle { justify-content: center; padding: 8px 0; gap: 0; }
body.rail-collapsed #theme-toggle .lbl { display: none; }

/* Main */
#main { flex: 1; min-width: 0; }
#main-inner {
  max-width: 920px;
  margin: 0 auto;
  padding: 44px 48px 80px;
}
body.has-detail #main-inner {
  max-width: none;
  margin: 0;
  padding: 36px 32px 60px;
}

/* Detail pane — fast slide; perceived-speed beats prettiness on open */
#detail {
  flex: 0 0 var(--detail-w);
  transition: flex-basis 200ms var(--ease-decel);
  overflow: hidden;
  border-left: 1px solid var(--rule);
  background: var(--paper);
  position: sticky; top: 0; align-self: flex-start;
  max-height: 100vh;
}
#detail-inner { animation: detail-in 180ms var(--ease-decel); }
@keyframes detail-in {
  from { opacity: 0; transform: translateX(6px); }
  to   { opacity: 1; transform: none; }
}
body.has-detail { --detail-w: min(58vw, 900px); }
#detail-scroll { height: 100vh; overflow-y: auto; }
#detail-inner { padding: 20px 32px 60px; }

/* ── Shared primitives ───────────────── */
.surface-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
.surface-title {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.025em;
  margin: 0;
  color: var(--ink);
}
.surface-sub { color: var(--ink-soft); font-size: 13px; }
.mono { font-family: var(--font-mono); }
.faint { color: var(--ink-faint); }
.soft  { color: var(--ink-soft); }
.lbl-mono {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-soft);
  transition: all var(--t);
  line-height: 1.4;
  cursor: pointer;
}
.chip:hover { border-color: var(--ink-faint); color: var(--ink); background: var(--paper-3); }
.chip.accent { background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 30%, transparent); color: var(--accent-dim); }
.chip .x { margin-left: 2px; opacity: 0.5; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 50%; }
.chip .x:hover { opacity: 1; color: var(--danger); background: rgba(220,38,38,0.10); }
.chip.kind-scripture { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  background: var(--paper);
  color: var(--ink);
  font-size: 12.5px;
  font-weight: 500;
  transition: all var(--t);
}
.btn:hover { border-color: var(--ink-faint); background: var(--paper-2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.btn.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn.ghost { border-color: transparent; background: transparent; color: var(--ink-soft); }
.btn.ghost:hover { color: var(--ink); background: var(--paper-2); }
.btn.sm { padding: 2px 7px; font-size: 11.5px; }

.icon-btn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  color: var(--ink-soft);
  transition: all var(--t);
}
.icon-btn:hover { background: var(--paper-2); color: var(--ink); }

.input, textarea.input, select.input {
  width: 100%;
  padding: 7px 10px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  transition: border-color var(--t), box-shadow var(--t);
  font-size: 13px;
}
.input:focus, textarea.input:focus, select.input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.input.mono { font-family: var(--font-mono); font-size: 12px; }

hr.rule { border: 0; border-top: 1px solid var(--rule); margin: 16px 0; }

.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
  border: 1px dashed var(--rule);
  border-radius: var(--r);
  font-size: 13px;
}

/* ── LOG — month spine ───────────────── */
.log-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.log-nav { display: flex; align-items: center; gap: 4px; color: var(--ink-soft); }
.log-nav button { padding: 4px 10px; border-radius: var(--r); transition: all var(--t); font-size: 14px; }
.log-nav button:hover { background: var(--paper-2); color: var(--ink); }
.log-month-label {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.015em;
  color: var(--ink);
  padding: 0 10px;
  line-height: 1;
}

.spine { border-top: 1px solid var(--rule); }
.spine-row {
  display: grid;
  grid-template-columns: 28px 42px 1fr auto;
  align-items: baseline;
  gap: 14px;
  padding: 11px 10px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background var(--t);
}
.spine-row:hover { background: var(--paper-2); }
.spine-row:active { transform: translateX(1px); }
.spine-row.today { background: linear-gradient(to right, var(--accent-soft) 0, var(--paper) 160px); }
.spine-row.today:hover { background: linear-gradient(to right, var(--accent-soft) 0, var(--paper-2) 160px); }
.spine-row.weekend .spine-dom, .spine-row.weekend .spine-wd { color: var(--ink-faint); }
.spine-dom {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-soft);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.spine-row.today .spine-dom { color: var(--accent); font-weight: 600; }
.spine-wd {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
}
.spine-sum {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--ink);
  min-height: 22px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.5;
}
.spine-sum.empty-dot { color: var(--ink-faint); font-family: var(--font-mono); font-size: 13px; }
.spine-sum.synth { color: var(--ink-soft); }
.spine-pc {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  padding: 2px 7px;
  background: var(--paper-2);
  border-radius: 999px;
  letter-spacing: 0.02em;
}
.spine-row.today .spine-pc { background: var(--accent-soft); color: var(--accent-dim); }

/* ── CAPTURE ─────────────────────────── */
.cap-grid { display: flex; flex-direction: column; gap: 18px; }
.cap-zone {
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 22px 24px;
  background: var(--surface);
  box-shadow: var(--shadow-card);
  transition: box-shadow var(--t), border-color var(--t);
}
.cap-zone:hover { box-shadow: var(--shadow-lift); }
.cap-zone h3 {
  margin: 0 0 4px;
  font-family: var(--font-sans);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.cap-zone .sub { color: var(--ink-soft); font-size: 12.5px; margin-bottom: 14px; }
.md-draft-list { margin-top: 12px; }
.day-tile.draft-tile { grid-template-columns: 1fr; }
.draft-tile-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.draft-tile-preview { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.md-draft-empty { color: var(--ink-faint); font-size: 12.5px; font-family: var(--font-mono); padding: 8px 0; }
.draft-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.draft-detail-header .spacer { flex: 1; }
.draft-detail-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.gc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--rule); }
.gc-row:last-child { border-bottom: none; }
.gc-row .gc-title { flex: 1; font-size: 13px; color: var(--ink); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gc-row .gc-type { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.gc-row .gc-type.doc  { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
.gc-row .gc-type.sheet { background: color-mix(in srgb, var(--ok) 14%, transparent); color: var(--ok); }

.drop-zone {
  border: 1.5px dashed var(--rule);
  border-radius: var(--r-lg);
  padding: 30px 20px;
  text-align: center;
  color: var(--ink-faint);
  transition: all var(--t);
  cursor: pointer;
}
.drop-zone:hover, .drop-zone.drag {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 4%, var(--paper-2));
  color: var(--ink-soft);
}
.drop-zone.drag {
  transform: scale(1.01);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
}
.drop-zone .big { font-size: 14px; color: var(--ink-soft); font-weight: 500; }
.drop-zone .kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: var(--r-sm);
}

.seg {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--paper-2);
}
.seg button {
  padding: 5px 12px;
  font-size: 11.5px;
  color: var(--ink-soft);
  font-weight: 500;
  transition: all var(--t);
  letter-spacing: 0.02em;
}
.seg button.active { background: var(--paper); color: var(--ink); box-shadow: inset 0 -1px 0 var(--accent); }
.seg button:hover:not(.active) { color: var(--ink); }
.cap-type-bar { display: flex; width: 100%; }
.cap-type-bar button { flex: 1; text-align: center; }

.ingest-stream { margin-top: 16px; border-top: 1px solid var(--rule); padding-top: 16px; }
.ingest-progress {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  margin-bottom: 12px;
  letter-spacing: 0.02em;
}
.ingest-tile {
  display: flex;
  gap: 14px;
  padding: 12px;
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  margin-bottom: 8px;
  animation: fadeIn 220ms ease-out;
  background: var(--surface);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--t), border-color var(--t);
}
.ingest-tile:hover { border-color: var(--ink-faint); box-shadow: var(--shadow-card); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.ingest-tile img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--r-sm); background: var(--paper-3); }
.ingest-tile .meta { flex: 1; min-width: 0; }
.ingest-tile .vp { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.02em; }
.ingest-tile .sum { font-size: 13.5px; color: var(--ink); margin-top: 4px; line-height: 1.45; }

.backlog-card {
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
}
.backlog-card .q { font-size: 14.5px; color: var(--ink); margin-bottom: 10px; font-weight: 500; }
.backlog-card .ctx { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
.backlog-actions { display: flex; gap: 8px; margin-top: 10px; }
.radio-list { display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
.radio-list label { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: var(--r-sm); cursor: pointer; }
.radio-list label:hover { background: var(--paper-2); }

/* ── INDEX ───────────────────────────── */
.index-kinds { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--rule); }
.tree-heading-row {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) auto;
  gap: 6px;
  align-items: center;
  padding: 4px 8px 2px;
  margin-top: 10px;
  border-bottom: 1px dashed var(--rule);
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-2);
  position: relative;
}
.tree-heading-row:first-child { margin-top: 0; }
.tree-heading-row .tree-heading-label { cursor: pointer; }
.tree-heading-row .tree-heading-label:hover { color: var(--accent); }
.tree-heading-row .tree-actions { opacity: 0; pointer-events: none; transition: opacity var(--t); }
.tree-heading-row:hover .tree-actions { opacity: 1; pointer-events: auto; }
.tree-heading-children { margin-left: 10px; padding-left: 6px; border-left: 1px solid var(--rule); }
.tree-heading-empty { font-style: italic; color: var(--ink-faint); padding: 1px 8px; font-size: 11px; }
.kind-block h3 {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin: 0 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; gap: 10px;
  font-weight: 500;
}
.kind-block h3 .count { color: var(--ink-faint); font-weight: 400; }

.tree-row {
  padding: 11px 10px;
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 14px;
  border-bottom: 1px solid var(--rule-soft);
  transition: background var(--t);
  overflow: hidden;
}
.tree-row:hover { background: var(--paper-2); }
.tree-row.expanded { background: var(--paper-2); }
.tree-chevron {
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint);
  transition: transform var(--t), color var(--t);
  cursor: pointer;
  font-size: 9px;
  line-height: 1;
}
.tree-chevron.open { transform: rotate(90deg); color: var(--accent); }
.tree-label {
  cursor: pointer;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tree-label:hover { color: var(--accent); }
.tree-label.repeat { color: var(--ink-faint); font-style: italic; }
.tree-counts {
  font-family: var(--font-mono);
  font-size: 10px;
  line-height: 1;
  color: var(--ink-faint);
  letter-spacing: 0.02em;
}
.tree-panel-actions { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.tree-panel-actions .btn { padding: 2px 7px; font-size: 11px; border-color: transparent; color: var(--ink-soft); }
.tree-panel-actions .btn:hover { border-color: var(--rule); color: var(--ink); }
.tree-row.no-expand .tree-chevron { visibility: hidden; pointer-events: none; }
.tree-row-actions { opacity: 0; pointer-events: none; transition: opacity var(--t); display: flex; gap: 4px; flex-shrink: 0; }
.tree-row:hover .tree-row-actions { opacity: 1; pointer-events: auto; }
.tree-row-actions .btn { padding: 1px 6px; font-size: 11px; border-color: transparent; color: var(--ink-soft); }
.tree-row-actions .btn:hover { border-color: var(--rule); color: var(--ink); }
/* When the detail pane is open, the tree is narrow — collapse the inline
   action strip so labels get full width. The same actions live in the
   right-pane detail header, so nothing is lost, just de-duplicated. */
body.has-detail .tree-row-actions { display: none; }

.tree-children {
  margin-left: 10px;
  padding-left: 6px;
  border-left: 1px solid var(--rule);
}

.tree-panel {
  margin: 2px 0 8px 22px;
  padding: 8px 12px;
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  font-size: 13px;
}
.tree-panel .section-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin: 10px 0 6px;
  font-weight: 500;
}
.tree-panel .section-label:first-child { margin-top: 0; }
.tree-panel .conn-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tree-panel .meta-form { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; align-items: center; margin-top: 4px; margin-bottom: 8px; }
.tree-panel .meta-form > label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.tree-panel .pages-link {
  display: inline-flex;
  gap: 4px;
  padding: 4px 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  font-size: 12px;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--t);
}
.tree-panel .pages-link:hover { border-color: var(--accent); color: var(--accent); }

/* ── Index kind tabs ─────────────────── */
.kind-tabs {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 22px;
}
.kind-tab {
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color var(--t), border-color var(--t);
  font-weight: 500;
}
.kind-tab:hover { color: var(--ink-soft); }
.kind-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.kind-tab .tab-count { margin-left: 5px; opacity: 0.6; font-size: 9.5px; }

/* ── Detail pane ─────────────────────── */
.detail-head {
  position: sticky; top: 0;
  padding: 14px 28px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 2;
}
.detail-head .title {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.detail-head .sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.detail-head .sub .sub-sep { opacity: 0.5; }
.detail-head .sub .sub-link {
  color: var(--ink-soft);
  border-bottom: 1px dotted var(--ink-faint);
  cursor: pointer;
  transition: color var(--t), border-color var(--t);
  letter-spacing: 0.04em;
}
.detail-head .sub .sub-link:hover { color: var(--accent); border-color: var(--accent); text-decoration: none; }
.detail-head .sub .sub-day { display: inline-flex; align-items: center; gap: 4px; }
.detail-head .sub .sub-edit-btn {
  padding: 0 4px;
  font-size: 11px;
  color: var(--ink-faint);
  opacity: 0;
  border-radius: 3px;
  transition: opacity var(--t), color var(--t), background var(--t);
}
.detail-head .sub .sub-day:hover .sub-edit-btn { opacity: 1; }
.detail-head .sub .sub-edit-btn:hover { color: var(--accent); background: var(--paper-2); }
.detail-head .sub .sub-date-input {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 2px 4px;
  width: auto;
  letter-spacing: 0.04em;
}
.detail-head .sub .sub-link-add {
  color: var(--ink-faint);
  border-bottom: 1px dashed var(--ink-faint);
  padding: 0 3px;
  cursor: pointer;
}
.detail-head .sub .sub-link-add:hover { color: var(--accent); border-color: var(--accent); }
.detail-head .title .editable {
  font-family: inherit;
  letter-spacing: inherit;
  padding: 0 3px;
  border-bottom: 1px dashed transparent;
  cursor: text;
  transition: border-color var(--t), color var(--t);
}
.detail-head .title .editable:hover { border-color: var(--ink-faint); color: var(--accent); }
.detail-head .title input.input { font: inherit; padding: 0 4px; min-width: 1.5ch; }

.scan-frame {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--paper-3);
  position: relative;
  box-shadow: var(--shadow-card);
  max-width: 100%;
}
.scan-frame img {
  display: block; width: 100%; height: auto; cursor: zoom-in;
  transition: transform var(--t), opacity 320ms var(--ease-decel);
}
.scan-frame img:not([src]), .scan-frame img[src=""] { opacity: 0; }
.scan-frame img[data-loaded="0"] { opacity: 0; }
.scan-frame img[data-loaded="1"] { opacity: 1; }
.scan-frame .rot-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(249, 248, 246, 0.92);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 4px 10px;
  font-size: 11px;
  color: var(--ink-soft);
  backdrop-filter: blur(6px);
  letter-spacing: 0.02em;
}
.scan-frame .rot-btn:hover { color: var(--accent); border-color: var(--accent); }

.voice-frame {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 14px 18px;
  background: var(--paper-2);
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.6;
  white-space: pre-wrap;
}
.voice-frame .voice-lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

/* Markdown page body — retro terminal-ish look: monospace, slightly muted paper,
   soft scanline-free but with a subtle inset border so it reads as "rendered text"
   the way the scan frame reads as "rendered image". */
.md-frame {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 20px 24px;
  background: var(--paper-2);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  box-shadow: inset 0 0 0 1px var(--paper);
  letter-spacing: 0.01em;
  overflow-wrap: break-word;
}
.md-frame h1, .md-frame h2, .md-frame h3 {
  font-family: var(--font-mono);
  margin: 1.2em 0 0.4em;
  letter-spacing: 0.04em;
  color: var(--ink);
}
.md-frame h1:first-child, .md-frame h2:first-child, .md-frame h3:first-child { margin-top: 0; }
.md-frame h1 { font-size: 17px; text-transform: uppercase; border-bottom: 1px dashed var(--rule); padding-bottom: 6px; }
.md-frame h2 { font-size: 15px; }
.md-frame h3 { font-size: 13.5px; color: var(--ink-soft); }
.md-frame p { margin: 0.7em 0; }
.md-frame ul, .md-frame ol { margin: 0.5em 0; padding-left: 1.6em; }
.md-frame li { margin: 0.15em 0; }
.md-frame li.md-task { list-style: none; margin-left: -1.4em; }
.md-frame li.md-task .md-box { display: inline-block; width: 1.4em; color: var(--accent); }
.md-frame li.md-task.done { color: var(--ink-faint); text-decoration: line-through; }
.md-frame blockquote {
  margin: 0.8em 0;
  padding: 2px 14px;
  border-left: 2px solid var(--accent);
  color: var(--ink-soft);
  font-style: normal;
}
.md-frame code {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 1px 5px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 3px;
}
.md-frame pre {
  margin: 0.8em 0;
  padding: 12px 14px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 3px;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.5;
}
.md-frame pre code { border: none; padding: 0; background: transparent; }
.md-frame a { color: var(--accent); text-decoration: underline; }
.md-frame hr { border: none; border-top: 1px dashed var(--rule); margin: 1.2em 0; }
.md-frame strong { font-weight: 600; }
.md-frame em { font-style: italic; }

/* Markdown draft editor. Desktop uses compact 12.5px mono; mobile bumps to
 * 16px in the media query below so iOS doesn't auto-zoom the viewport on
 * focus (it zooms whenever focused input font-size resolves < 16px). */
textarea.md-editor { font-size: 12.5px; }

/* Sticky formatting toolbar. Visible only on mobile AND only while the
 * associated md-editor has focus (JS toggles `.md-toolbar-show` on <body>).
 * Lives above the keyboard on iOS via position:sticky + the bottom
 * safe-area inset. Hidden on desktop entirely. */
.md-toolbar {
  display: none;
  position: sticky;
  bottom: 0;
  left: 0; right: 0;
  z-index: 50;
  gap: 4px;
  padding: 6px 8px calc(6px + env(safe-area-inset-bottom)) 8px;
  background: var(--paper);
  border-top: 1px solid var(--rule);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.md-toolbar button {
  flex: 0 0 auto;
  min-width: 40px;
  min-height: 36px;
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  color: var(--ink);
}
.md-toolbar button:active { background: var(--paper-3); }
.day-tile .thumb.md {
  font-family: var(--font-mono);
  font-size: 20px;
  color: var(--ink-faint);
  background: var(--paper-2);
}

.meta-row {
  display: flex; align-items: center; gap: 18px;
  margin: 16px 0;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  flex-wrap: wrap;
  letter-spacing: 0.02em;
}
.meta-row .k { color: var(--ink-faint); margin-right: 5px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
.meta-row .editable { cursor: pointer; border-bottom: 1px dotted var(--ink-faint); padding: 0 2px; transition: color var(--t), border-color var(--t); }
.meta-row .editable:hover { color: var(--accent); border-color: var(--accent); }

.editable-text {
  display: block;
  padding: 8px 10px;
  border: 1px solid transparent;
  border-radius: var(--r);
  cursor: text;
  min-height: 32px;
  transition: border-color var(--t), background var(--t);
  line-height: 1.55;
}
.editable-text:hover { border-color: var(--rule); background: var(--paper-2); }
.editable-text.editing { border-color: var(--ink); background: var(--paper); }
.editable-text.summary { font-size: 14.5px; color: var(--ink); }

.links-section { margin-top: 26px; }
.links-group { margin-bottom: 14px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
.links-group-lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  font-weight: 500;
  min-width: 80px;
  padding-top: 4px;
}
.links-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1; }

.day-tile {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 14px;
  padding: 12px;
  border: 1px solid transparent;
  border-radius: var(--r-lg);
  margin-bottom: 10px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: all var(--t);
  cursor: pointer;
}
.day-tile:hover { border-color: var(--rule); box-shadow: var(--shadow-card); transform: translateY(-1px); }
.day-tile .thumb {
  width: 100px; height: 100px;
  background: var(--paper-3);
  border-radius: var(--r-sm);
  overflow: hidden;
  border: 1px solid var(--rule);
}
.day-tile .thumb img { width: 100%; height: 100%; object-fit: cover; }
.day-tile .thumb.voice {
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  color: var(--ink-faint);
  font-size: 18px;
}
.day-tile .tile-body { display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
.day-tile .captions { font-size: 13.5px; color: var(--ink); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.day-tile .tile-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 6px; letter-spacing: 0.02em; }
.tile-del-btn { align-self: start; background: none; border: none; padding: 2px 4px; cursor: pointer; color: var(--ink-faint); font-size: 14px; line-height: 1; border-radius: var(--r); opacity: 0; transition: opacity var(--t), color var(--t); }
.day-tile:hover .tile-del-btn { opacity: 1; }
.tile-del-btn:hover { color: var(--danger, #c0392b); }
.ctx-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.ctx-badge { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.ctx-badge.voice { background: color-mix(in srgb, var(--ink-soft) 12%, transparent); color: var(--ink-soft); }
.ctx-badge.md { background: color-mix(in srgb, var(--ink-soft) 12%, transparent); color: var(--ink-soft); font-family: var(--font-mono); letter-spacing: 0.04em; }
.ctx-badge.date { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); cursor: pointer; }
.ctx-badge.date:hover { background: color-mix(in srgb, var(--accent) 20%, transparent); }
.ctx-badge.coll { background: color-mix(in srgb, var(--ink) 8%, transparent); color: var(--ink-soft); }
.ctx-badge.artifact { background: color-mix(in srgb, var(--ok, #5C7A4D) 12%, transparent); color: var(--ok, #5C7A4D); }
.ctx-badge.reference { background: color-mix(in srgb, var(--ink-soft) 15%, transparent); color: var(--ink-soft); }

/* ── Artifact metadata preview ──────── */
.artifact-meta-block { display: flex; flex-direction: column; gap: 12px; padding: 14px 24px 16px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.artifact-url-card { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.artifact-url-link { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600; }
.artifact-url-link:hover { text-decoration: underline; }
.artifact-url-icon { font-size: 15px; line-height: 1; }
.artifact-url-host { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.artifact-url-fetched { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); }
.artifact-url-error { font-family: var(--font-mono); font-size: 10px; color: var(--danger, #b91c1c); }
.artifact-filing { display: flex; align-items: baseline; gap: 8px; }
.artifact-filing-lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); white-space: nowrap; }
.artifact-filing-path { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
.artifact-versions { display: flex; flex-direction: column; gap: 4px; }
.artifact-versions-lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px; }
.artifact-version-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.artifact-linked { display: flex; flex-direction: column; gap: 6px; }

/* ── Typeahead popover ──────────────── */
.typeahead-pop {
  position: fixed;
  z-index: 100;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lift);
  width: 340px;
  max-height: 380px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.typeahead-pop input { border: 0; border-bottom: 1px solid var(--rule); border-radius: 0; padding: 10px 12px; font-size: 13px; }
.typeahead-pop input:focus { box-shadow: none; border-color: transparent; border-bottom-color: var(--rule); }
.typeahead-list { overflow-y: auto; max-height: 300px; }
.typeahead-row {
  padding: 7px 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid var(--rule-soft);
}
.typeahead-row:last-child { border-bottom: 0; }
.typeahead-row:hover, .typeahead-row.active { background: var(--paper-2); }
.typeahead-row .kind {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-left: auto;
}

/* ── Lightbox (scan zoom) ─────────────
 * The lightbox itself is a scrollable container. When zoomed, the image
 * grows beyond the viewport and overflow:auto gives native one-finger pan.
 * touch-action: pinch-zoom on the container lets the browser pinch-zoom the
 * image further for free, without fighting a JS transform. Rotation is kept
 * as a CSS transform on the img (doesn't conflict with overflow scroll). */
#lightbox {
  position: fixed; inset: 0;
  background: rgba(15, 12, 9, 0.92);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pinch-zoom;
}
#lightbox.open { display: flex; animation: lb-in 220ms var(--ease-decel); }
#lightbox.open img { animation: lb-img-in 280ms var(--ease-decel); }
@keyframes lb-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes lb-img-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
#lightbox img {
  max-width: 96vw;
  max-height: 96vh;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  cursor: zoom-in;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
  touch-action: manipulation;  /* remove 300ms tap delay */
}
/* When zoomed: let the image grow past the viewport so overflow:auto on the
 * container kicks in and gives natural pan. Browser pinch still works on top. */
#lightbox.zoomed img {
  cursor: grab;
  max-width: none;
  max-height: none;
  width: 200%;
  height: auto;
}
#lightbox .lb-close {
  position: fixed; top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  backdrop-filter: blur(4px);
}
#lightbox .lb-close:hover { background: rgba(255,255,255,0.2); }
#lightbox .lb-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.05em;
}

/* ── Toast ────────────────────────────── */
#toast-stack {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 300;
}
.toast {
  padding: 9px 16px;
  border-radius: var(--r-lg);
  background: var(--ink);
  color: var(--paper);
  font-size: 12.5px;
  box-shadow: var(--shadow-lift);
  animation: slideIn 180ms ease-out;
  letter-spacing: 0.01em;
}
.toast.err { background: var(--danger); }
.toast.ok  { background: var(--ok); }
@keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: none; } }

/* ── Cmd+K palette ───────────────────── */
#cmdk { position: fixed; inset: 0; z-index: 400; display: none; align-items: flex-start; justify-content: center; padding-top: 14vh; }
#cmdk.open { display: flex; animation: cmdk-backdrop-fade 180ms var(--ease-decel); }
#cmdk-backdrop {
  position: absolute; inset: 0;
  background: rgba(15,12,9,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  cursor: default;
}
@keyframes cmdk-backdrop-fade { from { opacity: 0; } to { opacity: 1; } }
#cmdk-panel {
  position: relative;
  width: min(640px, 92vw);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lift);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: cmdk-panel-in 220ms var(--ease-decel);
}
@keyframes cmdk-panel-in {
  from { opacity: 0; transform: translateY(-8px) scale(0.98); }
  to   { opacity: 1; transform: none; }
}
#cmdk-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--rule);
}
#cmdk-icon { flex-shrink: 0; color: var(--ink-faint); }
#cmdk-input {
  flex: 1;
  border: 0; background: transparent; outline: none;
  font-size: 15px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-weight: 500;
}
#cmdk-input::placeholder { color: var(--ink-faint); }
#cmdk-esc {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 2px 6px;
  border-radius: var(--r-sm);
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}
#cmdk-list { max-height: 400px; overflow-y: auto; }
.cmdk-section {
  padding: 6px 0 2px;
}
.cmdk-section-lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  padding: 4px 14px;
  font-weight: 500;
}
.cmdk-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background var(--t);
}
.cmdk-row:hover, .cmdk-row.active { background: var(--paper-2); }
.cmdk-row .cmdk-lbl { flex: 1; font-size: 13.5px; color: var(--ink); font-weight: 500; }
.cmdk-row .cmdk-sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.02em; }
.cmdk-row .cmdk-kind {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 1px 6px;
  border-radius: var(--r-sm);
}
.cmdk-row.active .cmdk-kind { background: var(--paper-3); }
.cmdk-empty {
  padding: 28px 14px;
  text-align: center;
  color: var(--ink-faint);
  font-size: 13px;
  font-family: var(--font-mono);
}
#cmdk-footer {
  border-top: 1px solid var(--rule);
  padding: 8px 14px;
  display: flex; gap: 16px;
  background: var(--paper-2);
}
.cmdk-hint { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); display: flex; align-items: center; gap: 4px; }
.cmdk-hint kbd {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--r-sm);
  padding: 1px 5px;
  font-family: inherit;
  font-size: 9.5px;
}

*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 999px; border: 2px solid var(--paper); }
*::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
html { scroll-behavior: smooth; }

/* ── Focus rings — accessible, only on keyboard navigation ───── */
:focus { outline: none; }
:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
  border-radius: var(--r-sm);
}
button:focus-visible, .btn:focus-visible, .chip:focus-visible,
.nav-btn:focus-visible, .icon-btn:focus-visible, .seg button:focus-visible {
  box-shadow: var(--shadow-focus);
}
a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; box-shadow: none; }
.input:focus-visible, textarea.input:focus-visible, select.input:focus-visible {
  border-color: var(--accent);
  box-shadow: var(--shadow-focus);
}

/* ── Tactile press on buttons (skipped under reduced motion) ─── */
.btn, .icon-btn, .nav-btn, .chip, .seg button { will-change: transform; }
.btn:active:not([disabled]),
.chip:active,
.pill:active { transform: scale(0.97); }
.nav-btn:active { background: var(--paper-3); }
.btn[disabled] { opacity: 0.55; cursor: not-allowed; pointer-events: none; }

/* ── App splash + fade-in on boot ────── */
html.booting body > * { opacity: 0; }
html.booting #boot-splash { opacity: 1; }
#boot-splash {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--paper);
  z-index: 9999;
  transition: opacity 320ms var(--ease-decel);
  pointer-events: none;
}
#boot-splash.done { opacity: 0; }
#boot-splash .boot-brand {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--ink);
  opacity: 0.92;
  animation: pulse 1.4s ease-in-out infinite;
}
#boot-splash .boot-brand .dot { color: var(--accent); }
@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
body > *:not(#boot-splash) { transition: opacity 240ms var(--ease-decel); }

/* ── Top progress bar (shows during API calls) ──────── */
#nprog {
  position: fixed; top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  z-index: 9998;
  pointer-events: none;
  overflow: hidden;
}
#nprog::before {
  content: '';
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent));
  box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 60%, transparent);
  border-radius: 2px;
  transition: width 220ms var(--ease-decel), opacity 200ms ease-out;
  opacity: 0;
}
#nprog.active::before { opacity: 1; }
#nprog.done::before { width: 100% !important; opacity: 0; }

/* ── Skeleton shimmer ────────────────── */
.sk {
  background: linear-gradient(
    90deg,
    var(--paper-2) 0%,
    color-mix(in srgb, var(--paper-3) 70%, transparent) 50%,
    var(--paper-2) 100%
  );
  background-size: 200% 100%;
  animation: sk-shimmer 1.4s ease-in-out infinite;
  border-radius: var(--r-sm);
  color: transparent !important;
}
@keyframes sk-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.sk-text { height: 12px; margin: 6px 0; border-radius: 3px; }
.sk-title { height: 20px; width: 40%; margin-bottom: 16px; border-radius: 4px; }
.sk-block { height: 80px; border-radius: var(--r); margin-bottom: 10px; }
.sk-thumb { width: 100px; height: 100px; border-radius: var(--r-sm); flex-shrink: 0; }
.sk-chip  { display: inline-block; height: 22px; width: 80px; border-radius: 999px; margin: 0 6px 6px 0; vertical-align: middle; }
.sk-spine-row {
  display: grid;
  grid-template-columns: 28px 42px 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 11px 10px;
  border-bottom: 1px solid var(--rule-soft);
}
.sk-spine-row .sk { height: 14px; border-radius: 3px; }
.sk-spine-row .sk.w1 { width: 100%; max-width: 70%; }
.sk-spine-row .sk.w2 { width: 24px; height: 18px; border-radius: 999px; margin-left: auto; }
.sk-day-tile {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 14px;
  padding: 12px;
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  margin-bottom: 10px;
  background: var(--surface);
}
.sk-tree-row {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) 40px;
  gap: 14px;
  padding: 11px 10px;
  border-bottom: 1px solid var(--rule-soft);
  align-items: center;
}
.sk-tree-row .sk { height: 14px; border-radius: 3px; }

/* ── Section/route transitions ───────── */
#main-inner, #detail-inner {
  transition: opacity 180ms var(--ease-decel);
}
#main-inner.is-swapping,
#detail-inner.is-swapping { opacity: 0; }

/* ── Reduced motion — honor user preference ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  html { scroll-behavior: auto; }
  .sk { animation: none; }
  .btn:active:not([disabled]),
  .chip:active, .pill:active { transform: none; }
  .stagger-in > * { animation: none !important; opacity: 1 !important; }
}

/* ── Serif content — strategic, only on page body content ──
   Same pattern Claude uses: the "reading" body gets serif; every piece of UI
   chrome (labels, buttons, nav, meta, tile captions, section titles) stays
   sans. In Gloss that's just the page-detail summary and the voice
   transcript — the two places where you're reading the notebook's content,
   not scanning a list. */
.editable-text.summary,
.voice-frame {
  font-family: var(--font-serif);
  font-feature-settings: "kern", "liga";
  letter-spacing: normal;
}
.editable-text.summary {
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink);
}
.voice-frame { font-size: 14.5px; line-height: 1.7; }

/* ── Staggered list reveal ──────────────────────────────────────────
   Apply .stagger-in to a container; children fade-up with a 32-40ms
   cascade. First child enters instantly, the rest flow in behind it. */
.stagger-in > * {
  animation: fade-up 360ms var(--ease-decel) both;
}
.stagger-in > *:nth-child(1)  { animation-delay:  0ms; }
.stagger-in > *:nth-child(2)  { animation-delay: 24ms; }
.stagger-in > *:nth-child(3)  { animation-delay: 48ms; }
.stagger-in > *:nth-child(4)  { animation-delay: 72ms; }
.stagger-in > *:nth-child(5)  { animation-delay: 96ms; }
.stagger-in > *:nth-child(6)  { animation-delay: 120ms; }
.stagger-in > *:nth-child(7)  { animation-delay: 140ms; }
.stagger-in > *:nth-child(8)  { animation-delay: 160ms; }
.stagger-in > *:nth-child(9)  { animation-delay: 180ms; }
.stagger-in > *:nth-child(10) { animation-delay: 200ms; }
.stagger-in > *:nth-child(n+11) { animation-delay: 220ms; }
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ── Detail-pane inner stagger — when opening a page/day, body blocks
   (scan, meta, summary, links) cascade into place instead of all arriving
   at once. Tight timings so the pane feels built, not plopped. */
#detail-inner.cascade > * {
  animation: fade-up 240ms var(--ease-decel) both;
}
#detail-inner.cascade > *:nth-child(1) { animation-delay: 0ms; }
#detail-inner.cascade > *:nth-child(2) { animation-delay: 30ms; }
#detail-inner.cascade > *:nth-child(3) { animation-delay: 60ms; }
#detail-inner.cascade > *:nth-child(4) { animation-delay: 85ms; }
#detail-inner.cascade > *:nth-child(n+5) { animation-delay: 100ms; }

/* ── View Transitions API ───────────────────────────────────────────
   Chrome, Edge, Safari 18+. Gives us free cross-fade + morph between
   route changes. We customize the default fade to feel like a quick
   card-replace rather than a crossfade-and-settle. */
@supports (view-transition-name: a) {
  ::view-transition-old(root) {
    animation: vt-out 160ms var(--ease) both;
  }
  ::view-transition-new(root) {
    animation: vt-in 260ms var(--ease-decel) both;
  }
  @keyframes vt-out {
    from { opacity: 1; transform: none; }
    to   { opacity: 0; transform: translateY(-4px); }
  }
  @keyframes vt-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  /* Detail pane transitions as its own layer so it slides independently
     of the main surface when navigating page↔day. */
  #detail { view-transition-name: detail; }
  ::view-transition-old(detail),
  ::view-transition-new(detail) {
    animation-duration: 220ms;
  }
}

/* ── Richer hover + press ─────────────────────────────────────────── */
.day-tile, .ingest-tile {
  transition: transform 220ms var(--ease-decel),
              box-shadow 220ms var(--ease-decel),
              border-color 180ms var(--ease);
}
.day-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); border-color: var(--rule); }
.day-tile:active { transform: translateY(0); transition-duration: 80ms; }
.ingest-tile:hover { transform: translateY(-1px); }
.scan-frame { transition: box-shadow 240ms var(--ease-decel), transform 240ms var(--ease-decel); }
.scan-frame:hover { box-shadow: var(--shadow-lift); }
.chip:active { transform: scale(0.96); transition-duration: 80ms; }

/* Primary button gets a slightly fancier press — spring back on release */
.btn {
  transition: background var(--t-fast),
              border-color var(--t-fast),
              color var(--t-fast),
              box-shadow var(--t-fast),
              transform 220ms var(--ease-spring);
}
.btn:active:not([disabled]) {
  transform: scale(0.96);
  transition-duration: 80ms;
}

/* ── Empty state polish ───────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.empty .empty-ico {
  width: 44px; height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.empty .empty-title { color: var(--ink-soft); font-weight: 500; font-size: 13.5px; }
.empty .empty-sub { font-size: 12px; color: var(--ink-faint); }

/* ── Toast polish — click to dismiss, progress bar ───── */
.toast {
  position: relative;
  cursor: pointer;
  overflow: hidden;
  max-width: 360px;
  padding-right: 20px;
}
.toast::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  background: rgba(255,255,255,0.35);
  width: 100%;
  transform-origin: left;
  animation: toast-timer var(--toast-dur, 2600ms) linear forwards;
}
@keyframes toast-timer { to { transform: scaleX(0); } }
.toast:hover::after { animation-play-state: paused; }
.toast.leaving { animation: toast-out 200ms var(--ease) forwards; }
@keyframes toast-out { to { opacity: 0; transform: translateX(20px); } }

/* ── Responsive ──────────────────────── */
@media (max-width: 880px) {
  body { --rail-w: 58px; }
  body.rail-collapsed { --rail-w: 58px; }
  body:not(.rail-collapsed) #brand { opacity: 0; width: 0; }
  body:not(.rail-collapsed) .nav-btn { justify-content: center; padding: 8px 0; gap: 0; }
  body:not(.rail-collapsed) .nav-btn .lbl { display: none; }
  body:not(.rail-collapsed) #rail-footer { opacity: 0; }
  body.has-detail #main { display: none; }
  body.has-detail { --detail-w: calc(100vw - 58px); }
}

/* ── Bottom tab bar (phone only, hidden by default) ─ */
#bottom-tabs { display: none; }
#mobile-header { display: none; }
.detail-back-btn { display: none; }

/* ── Tablet (481–1024px) ───────────── */
@media (min-width: 481px) and (max-width: 1024px) {
  body { --rail-w: 56px; }
  body.rail-collapsed { --rail-w: 56px; }
  #rail { padding: 18px 6px; }
  body:not(.rail-collapsed) #brand { opacity: 0; width: 0; }
  body:not(.rail-collapsed) .nav-btn { justify-content: center; padding: 10px 0; gap: 0; }
  body:not(.rail-collapsed) .nav-btn .lbl { display: none; }
  body:not(.rail-collapsed) #rail-footer { opacity: 0; }
  body:not(.rail-collapsed) #theme-toggle { justify-content: center; padding: 10px 0; gap: 0; }
  body:not(.rail-collapsed) #theme-toggle .lbl { display: none; }
  /* Touch-friendly padding on buttons */
  .btn { padding: 7px 12px; }
  .btn.sm { padding: 4px 9px; }
  .chip { padding: 4px 11px; }
  /* Stack detail under main when open instead of the fixed 58px side-by-side */
  body.has-detail { --detail-w: min(55vw, 640px); }
  #main-inner { padding: 32px 24px 80px; }
  body.has-detail #main-inner { padding: 28px 20px 60px; }
  #detail-inner { padding: 20px 20px 60px; }
}

/* ── Phone (≤480px) ────────────────── */
@media (max-width: 480px) {
  /* Hide the desktop rail entirely; bottom tabs take over */
  #rail { display: none; }
  #shell { display: block; min-height: 100vh; }

  /* Slim top header with brand mark — translucent blur on iOS */
  #mobile-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;

<script>
// Runs before module script to avoid flash of wrong theme
(function(){
  // Mark booting so body children stay hidden until the module removes it.
  document.documentElement.classList.add('booting');
  var t = localStorage.getItem('foxed.theme');
  if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else if (t === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>
<script type="module">
// ─── util ──────────────────────────────────
function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const k of Object.keys(attrs)) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'class' || k === 'className') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k === 'html') el.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'dataset') Object.assign(el.dataset, v);
      else if (k in el && typeof el[k] !== 'object') el[k] = v;
      else el.setAttribute(k, v);
    }
  }
  for (const kid of kids.flat(Infinity)) {
    if (kid == null || kid === false) continue;
    el.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return el;
}
const mainInner = document.getElementById('main-inner');
const detail = document.getElementById('detail');
const detailInner = document.getElementById('detail-inner');
const detailScroll = document.getElementById('detail-scroll');

// ─── theme ─────────────────────────────────
function _isDark() {
  const t = document.documentElement.getAttribute('data-theme');
  if (t === 'dark') return true;
  if (t === 'light') return false;
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function renderThemeBtn() {
  const ico = document.getElementById('theme-ico');
  const lbl = document.getElementById('theme-lbl');
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const dark = _isDark();
  if (ico) ico.innerHTML = dark
    // sun icon when dark (click to go light)
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    // moon icon when light (click to go dark)
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  if (lbl) lbl.textContent = dark ? 'Light mode' : 'Dark mode';
  btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
}
function toggleTheme() {
  const next = _isDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('foxed.theme', next);
  renderThemeBtn();
}
// Keep button in sync if the OS flips (only when user hasn't manually overridden)
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (!localStorage.getItem('foxed.theme')) renderThemeBtn();
});
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
document.getElementById('mobile-theme-btn')?.addEventListener('click', toggleTheme);
document.getElementById('detail-back-btn')?.addEventListener('click', () => closeDetail());
renderThemeBtn();

// ── Comms push health pill ──────────────────────────────────────────────
// Pulls /api/comms/status on a cadence. When push is disabled, the pill stays
// hidden; when enabled, it shows "comms ✓" / "comms · 2h" / "comms · failed"
// with a colored dot. Tooltip carries the detail.
async function refreshCommsPill() {
  const pill = document.getElementById('comms-pill');
  if (!pill) return;
  try {
    const s = await fetch('/api/comms/status').then(r => r.ok ? r.json() : null);
    if (!s || !s.enabled) { pill.classList.remove('shown'); return; }
    pill.classList.add('shown');
    pill.classList.remove('ok', 'stale', 'failed');

    const lbl = pill.querySelector('.lbl');
    const outcome = s.last_outcome;
    if (outcome === 'ok') {
      const ageMs = s.last_success_at ? Date.now() - new Date(s.last_success_at).getTime() : null;
      const ageLabel = !ageMs ? 'ok'
        : ageMs < 90 * 60 * 1000  ? 'ok'
        : ageMs < 24 * 3600 * 1000 ? `${Math.round(ageMs / 3600_000)}h`
                                   : `${Math.round(ageMs / 86400_000)}d`;
      const stale = ageMs && ageMs > 60 * 60 * 1000;
      pill.classList.add(stale ? 'stale' : 'ok');
      lbl.textContent = `comms · ${ageLabel}`;
      pill.title = `Comms push: last success ${s.last_success_at || '—'} (${s.last_count} contacts)`;
    } else if (outcome === 'failed') {
      pill.classList.add('failed');
      lbl.textContent = 'comms · failed';
      pill.title = `Comms push failed: ${s.last_error || 'unknown error'}`;
    } else if (outcome === 'skipped') {
      lbl.textContent = 'comms · idle';
      pill.title = `Comms push skipped: ${s.last_skipped_reason || ''}`;
    } else {
      lbl.textContent = 'comms · …';
      pill.title = 'Comms push not yet run';
    }
  } catch { /* silent */ }
}
refreshCommsPill();
setInterval(refreshCommsPill, 60_000);

// Click the pill → sync now (only when shown).
document.getElementById('comms-pill')?.addEventListener('click', async () => {
  const pill = document.getElementById('comms-pill');
  if (!pill.classList.contains('shown')) return;
  pill.classList.add('syncing');
  pill.querySelector('.lbl').textContent = 'comms · syncing…';
  try {
    const r = await fetch('/api/comms/sync', { method: 'POST' }).then(x => x.json());
    if (r.ok)              toast(`Comms: pushed ${r.pushed} contacts`, 'ok');
    else if (r.skipped)    toast(`Comms: ${r.reason}`);
    else                   toast(`Comms sync failed: ${r.error || 'unknown'}`, 'err');
  } catch (e) {
    toast('Comms sync failed: ' + e.message, 'err');
  } finally {
    pill.classList.remove('syncing');
    refreshCommsPill();
  }
});

function toast(msg, kind = '') {
  // Errors linger slightly longer; all toasts dismiss on click.
  const dur = kind === 'err' ? 4200 : 2600;
  const t = h('div', { class: `toast ${kind}`, title: 'Click to dismiss' }, msg);
  // Match the ::after progress-bar duration to the toast duration.
  t.style.setProperty('--toast-dur', dur + 'ms');
  const id = 'toast-' + Math.random().toString(36).slice(2, 9);
  t.dataset.id = id;
  const style = document.createElement('style');
  style.textContent = `.toast[data-id="${id}"]::after { animation-duration: ${dur}ms; }`;
  document.head.appendChild(style);
  document.getElementById('toast-stack').appendChild(t);
  let removed = false;
  const dismiss = () => {
    if (removed) return; removed = true;
    t.classList.add('leaving');

// Tiny markdown → HTML renderer for rendering user-authored .md pages in the
// page viewer. Supports the common subset: headings, bold, italic, code (inline
// + fenced), links, blockquotes, unordered + ordered lists, task lists ([ ]/[x]),
// horizontal rules, paragraphs. All text is escaped before inline formatting is
// applied; no raw HTML passthrough.
function renderMarkdown(src) {
  const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const inline = (s) => {
    let out = esc(s);
    // Inline code first so its content isn't mangled by the other rules.
    const codeStash = [];
    out = out.replace(/`([^`\n]+)`/g, (_, c) => { codeStash.push(c); return `${codeStash.length - 1}`; });
    // Links [text](url) — url only allows http(s)/mailto to avoid javascript: etc.
    out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, text, href) => {
      const safe = /^(https?:|mailto:|\/|#)/i.test(href) ? href : '#';
      return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    });
    out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    out = out.replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');
    out = out.replace(/(\d+)/g, (_, i) => `<code>${codeStash[+i]}</code>`);
    return out;
  };

  const lines = String(src || '').replace(/\r\n?/g, '\n').split('\n');
  const out = [];
  let i = 0;
  const flushPara = (buf) => {
    if (!buf.length) return;
    out.push(`<p>${inline(buf.join(' '))}</p>`);
  };

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    const fence = line.match(/^```(\w+)?\s*$/);
    if (fence) {
      i++;
      const code = [];
      while (i < lines.length && !/^```\s*$/.test(lines[i])) { code.push(lines[i]); i++; }
      if (i < lines.length) i++;
      out.push(`<pre><code>${esc(code.join('\n'))}</code></pre>`);
      continue;
    }

    // Horizontal rule
    if (/^(-\s*){3,}$/.test(line.trim()) || /^(\*\s*){3,}$/.test(line.trim())) {
      out.push('<hr>'); i++; continue;
    }

    // Heading
    const hm = line.match(/^(#{1,6})\s+(.*)$/);
    if (hm) {
      const level = Math.min(hm[1].length, 3);
      out.push(`<h${level}>${inline(hm[2])}</h${level}>`);
      i++; continue;
    }

    // Blockquote (contiguous `> `)
    if (/^>\s?/.test(line)) {
      const quoted = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        quoted.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      out.push(`<blockquote>${inline(quoted.join(' '))}</blockquote>`);
      continue;
    }

    // Unordered list (including task lists)
    if (/^[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s+/.test(lines[i])) {
        const body = lines[i].replace(/^[-*+]\s+/, '');
        const taskUnchecked = body.match(/^\[\s\]\s+(.*)$/);
        const taskChecked   = body.match(/^\[[xX]\]\s+(.*)$/);
        if (taskChecked)        items.push(`<li class="md-task done"><span class="md-box">☑</span>${inline(taskChecked[1])}</li>`);
        else if (taskUnchecked) items.push(`<li class="md-task"><span class="md-box">☐</span>${inline(taskUnchecked[1])}</li>`);
        else                    items.push(`<li>${inline(body)}</li>`);
        i++;
      }
      out.push(`<ul>${items.join('')}</ul>`);
      continue;
    }

    // Ordered list
    if (/^\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        items.push(`<li>${inline(lines[i].replace(/^\d+\.\s+/, ''))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join('')}</ol>`);
      continue;
    }

    // Blank line
    if (!line.trim()) { i++; continue; }

    // Paragraph: gather contiguous non-blank, non-special lines.
    const buf = [];
    while (
      i < lines.length && lines[i].trim() &&
      !/^(#{1,6})\s+/.test(lines[i]) &&
      !/^```/.test(lines[i]) &&
      !/^>\s?/.test(lines[i]) &&
      !/^[-*+]\s+/.test(lines[i]) &&
      !/^\d+\.\s+/.test(lines[i]) &&
      !/^(-\s*){3,}$/.test(lines[i].trim())

  }

  return out.join('\n');
}

// ─── Top progress bar ─────────────────────
// Lightweight NProgress-style bar. Shown when any API call is pending so the
// UI feels responsive even before content arrives. Grows in ticks while
// inflight > 0, then fills and fades when the last call completes.
// Plumb width into the #nprog::before fill via a CSS variable on the bar.

  const el = document.getElementById('nprog');

  const apply = () => { if (el) el.style.setProperty('--w', pct + '%'); };
  function _show() {
    pct = 8; apply();
    el.classList.remove('done');
    el.classList.add('active');

    tick = setInterval(() => {
      if (pct < 92) { pct += Math.max(0.6, (94 - pct) * 0.08); apply(); }
    }, 220);

// ─── api ────────────────────────────────────
// In-flight dedup: if the same GET is already running, await the existing
// promise rather than firing a duplicate. Short-lived GET cache (800ms)
// smooths over quick back-to-back requests (e.g. route → detail → back).
const _inflight = new Map();
const _getCache = new Map();
const GET_CACHE_TTL = 3000;

async function api(path, method = 'GET', body) {
  const isGet = method === 'GET';
  const key = _cacheKey(path);
  if (isGet) {
    const hit = _getCache.get(key);
    if (hit && Date.now() - hit.at < GET_CACHE_TTL) return hit.v;
    const running = _inflight.get(key);
    if (running) return running;
  }

  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }

  _nprog.start();
  const run = (async () => {
    try {
      const res = await fetch(path, opts);
      if (!res.ok) {
        let msg; try { const j = await res.json(); msg = j.detail ? `${j.error}: ${j.detail}` : j.error; } catch {}
        throw new Error(msg || `${res.status} ${res.statusText}`);

      const data = res.status === 204 ? null : await res.json();
      if (isGet) _getCache.set(key, { v: data, at: Date.now() });
      // Non-GET invalidates the cache — any mutation likely affects reads.
      if (!isGet) _getCache.clear();
      return data;
    } finally {
      _nprog.stop();
      if (isGet) _inflight.delete(key);
    }
  })();
  if (isGet) _inflight.set(key, run);
  return run;
}

async function* ndjson(response) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.trim()) continue;
      try { yield JSON.parse(line); } catch {}
    }
  }
  if (buf.trim()) { try { yield JSON.parse(buf); } catch {} }
}

let _firstRouteDone = false;

  const { nav, args } = parseHash();

  // Kicks off the view's async work but does NOT await it, so the
  // View Transition can snapshot the skeleton state before the API returns.
  let viewPromise;
  const doSync = () => {
    if (nav === 'page') {
      const id = args[0];
      if (id) viewPromise = openPageDetail(id);
      return;
    }
    if (nav === 'day') {
      const id = args[0];
      if (id) viewPromise = openDayDetail(id);
      return;
    }
    closeDetail(true);
    currentLeftHash = location.hash;
    for (const btn of document.querySelectorAll('.nav-btn')) {
      btn.classList.toggle('active', btn.dataset.nav === nav);
    }
    const view = routes[nav] || routes.log;
    mainInner.innerHTML = '';
    window.scrollTo(0, 0);
    try { viewPromise = view(...args); }
    catch (err) {
      mainInner.appendChild(emptyState({ title: "Couldn't load.", sub: err.message }));
    }

  // The CSS ::view-transition-* rules upgrade the default cross-fade to a
  // card-swap motion. Falls back to opacity on browsers without support.

    if (_firstRouteDone) {

// ─── navigate with View Transitions when available ────────────────
// startViewTransition captures the before/after DOM states and cross-fades
// between them natively. Falls back to a plain hash change where unsupported
// (Firefox, older Safari). The CSS ::view-transition-* rules in the
// stylesheet customize the motion into a card-replace feel.

  const target = '#/' + [nav, ...args].filter(x => x !== '').join('/');
  if (target === location.hash) return;
  if (!document.startViewTransition) { location.hash = target; return; }
  document.startViewTransition(() => new Promise(resolve => {
    const onHash = () => { window.removeEventListener('hashchange', onHash); resolve(); };
    window.addEventListener('hashchange', onHash, { once: true });
    location.hash = target;
    // Hashchange fires synchronously in most browsers, but guard with a
    // timeout so the VT never hangs if something goes wrong.
    setTimeout(resolve, 400);
  }));
}
