    } catch (err) { toast(err.message, 'err'); }
  }

  for (const [kind, label] of availableTabs) {
    const count = (byKind[kind] || []).length;
    const tab = h('button', { class: 'kind-tab' + (kind === activeIndexKind ? ' active' : ''), dataset: { kind } },
      label,
      h('span', { class: 'tab-count' }, String(count)),
    );
    tab.addEventListener('click', () => renderTab(kind));
    tabsEl.appendChild(tab);
  }

  renderTab(activeIndexKind);
}

// Leaf index kinds — no hierarchy, no editable metadata worth a panel.
// These rows skip the expand chevron and show actions inline on hover.
// Details live in the right-pane entity view (click the label to open).
const FLAT_LEAF_KINDS = new Set(['person', 'scripture', 'book']);

// Action strip for a given row — shared by the inline hover row and the
// right-pane detail view so the vocabulary stays identical.
function rowActionsFor(kind, node, opts = {}) {
  const btns = [];
  btns.push(buildActionBtn('Rename', () => renameNode(kind, node)));
  btns.push(buildActionBtn('Merge',  () => mergeNode(kind, node)));
  if (kind === 'collection' || kind === 'topic' || kind === 'person' || kind === 'artifact') {
    const parentBtn = buildActionBtn('↑ Parent', () => setParent(kind, node, parentBtn));
    btns.push(parentBtn);
  }
  if (kind === 'collection' || kind === 'artifact') {
    btns.push(buildActionBtn('↑ Heading', () => setHeadingForNode(kind, node)));
  }
  if (kind === 'collection' || kind === 'artifact' || kind === 'person') {
    btns.push(buildActionBtn('Archive', () => archiveNode(kind, node)));
  }
  return btns;
}

function renderTreeRow(kind, node, depth) {
  const wrap = h('div');
  const chevron = h('div', { class: 'tree-chevron' }, '▸');
  const labelEl = h('div', { class: 'tree-label' + (node._repeat ? ' repeat' : '') }, node.label || node.title || node.canonical || '(untitled)');
  const totalP = node.totalPageCount ?? node.total_pages ?? node.directPageCount ?? node.page_count ?? null;
  const counts = h('div', { class: 'tree-counts' }, totalP != null ? String(totalP) : '');
  const isLeaf = FLAT_LEAF_KINDS.has(kind);

  let thirdCol;
  if (isLeaf) {
    thirdCol = h('div', { class: 'tree-row-actions' });
    for (const b of rowActionsFor(kind, node)) thirdCol.appendChild(b);
  } else {
    thirdCol = counts;
  }
  const row = h('div', { class: 'tree-row' + (isLeaf ? ' no-expand' : '') }, chevron, labelEl, thirdCol);
  const panel = h('div', { class: 'tree-panel', style: { display: 'none' } });
  const kids = h('div', { class: 'tree-children', style: { display: 'none' } });

  let loaded = false;
  const setOpen = async (force) => {
    const open = force != null ? force : !chevron.classList.contains('open');
    chevron.classList.toggle('open', open);
    row.classList.toggle('expanded', open);
    panel.style.display = open ? 'block' : 'none';
    kids.style.display = open ? 'block' : 'none';
    if (open && !loaded && !node._repeat) {
      loaded = true;
      panel.innerHTML = '<div class="soft" style="font-size:12px">loading…</div>';
      try {
        const conn = await api(`/api/index/${kind}/${node.id}/connections`);
        renderConnectionsPanel(panel, kind, node, conn);
      } catch (err) {
        panel.innerHTML = '';
        panel.appendChild(h('div', { class: 'soft' }, `Couldn't load: ${err.message}`));
      }
      if (node.children?.length) {
        for (const c of node.children) kids.appendChild(renderTreeRow(kind, c, depth + 1));
      }
    }
  };
  if (!isLeaf) chevron.addEventListener('click', (e) => { e.stopPropagation(); setOpen(); });
  // label click → open entity pages in right pane; chevron only toggles inline metadata
  labelEl.addEventListener('click', (e) => { e.stopPropagation(); openEntityDetail(kind, node); });

  indexNodeRefs.set(`${kind}:${node.id}`, { row, expand: () => setOpen(true) });

  wrap.append(row, panel, kids);
  return wrap;
}

function buildActionBtn(label, onClick) {
  const b = h('button', { class: 'btn sm' }, label);
  b.addEventListener('click', (e) => { e.stopPropagation(); onClick(b); });
  return b;
}

function renderConnectionsPanel(panel, kind, node, conn) {
  panel.innerHTML = '';

  // Action strip — same vocabulary as the inline hover actions + detail pane
  const actionsRow = h('div', { class: 'tree-panel-actions' });
  for (const b of rowActionsFor(kind, node)) actionsRow.appendChild(b);
  panel.appendChild(actionsRow);

  // Metadata editors
  const meta = h('div', { class: 'meta-form' });
  if (kind === 'person') {
    meta.append(
      h('label', null, 'growth'),
      (() => {
        const el = h('textarea', { class: 'input', rows: 2, value: node.growthNote || node.growth_note || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { growth_note: el.value }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'household'),
      (() => {
        const el = h('input', { class: 'input', value: node.household || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { household: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'priority'),
      (() => {
        const el = h('input', { type: 'number', class: 'input', value: node.priority ?? '', min: 0, max: 3 });
        el.addEventListener('blur', async () => {
          try { await api(`/api/people/${node.id}`, 'PATCH', { priority: el.value === '' ? null : Number(el.value) }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
    // Cross-app link: jump to this person's Comms profile. Only appears for
    // people with priority >= 1 (those are the ones actually pushed to Comms
    // — the sync filter in comms.js:buildContactsPayload) and when we know
    // the Comms origin from /api/suite-config.
    if (SUITE_CONFIG.comms_url && (node.priority ?? 0) >= 1) {
      const commsHref = `${SUITE_CONFIG.comms_url}/#/contacts/${encodeURIComponent(node.label || '')}`;
      meta.append(
        h('label', null, ''),
        h('a', {
          href: commsHref, target: '_blank', rel: 'noopener',
          class: 'btn-ghost',
          style: { display: 'inline-flex', alignItems: 'center', gap: '6px', justifyContent: 'center' },
          title: 'Open this person in Comms',
        }, '↗ View in Comms'),
      );
    }
  } else if (kind === 'book') {
    meta.append(
      h('label', null, 'author'),
      (() => {
        const el = h('input', { class: 'input', value: node.author || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/books/${node.id}`, 'PATCH', { author: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'year'),
      (() => {
        const el = h('input', { type: 'number', class: 'input', value: node.year || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/books/${node.id}`, 'PATCH', { year: el.value ? Number(el.value) : null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'collection') {
    meta.append(
      h('label', null, 'description'),
      (() => {
        const el = h('textarea', { class: 'input', rows: 2, value: node.description || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/collections/${node.id}`, 'PATCH', { description: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'artifact') {
    meta.append(
      h('label', null, 'notes'),
      (() => {
        const el = h('textarea', { class: 'input', rows: 2, value: node.meta?.notes || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/artifacts/${node.id}`, 'PATCH', { notes: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
      h('label', null, 'URL'),
      (() => {
        const el = h('input', { class: 'input', value: node.externalUrl || node.external_url || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/artifacts/${node.id}`, 'PATCH', { external_url: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  } else if (kind === 'reference') {
    meta.append(
      h('label', null, 'URL'),
      (() => {
        const el = h('input', { class: 'input', value: node.externalUrl || node.external_url || '' });
        el.addEventListener('blur', async () => {
          try { await api(`/api/references/${node.id}`, 'PATCH', { external_url: el.value || null }); toast('saved', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        return el;
      })(),
    );
  }
  if (meta.children.length) panel.appendChild(meta);

  // Pages link (as a button that navigates)
  if (conn.pages_count > 0) {
    const pagesLink = h('button', { class: 'pages-link' },
      `${conn.pages_count} page${conn.pages_count > 1 ? 's' : ''}`,
    );
    pagesLink.addEventListener('click', (e) => {
      e.stopPropagation();
      // TODO: open pages context view; for now, nothing
      toast(`Opening pages for "${node.label}" — coming soon`, 'ok');
    });
    panel.appendChild(h('div', { style: { marginBottom: '10px' } }, pagesLink));
  }

  // Connection lists
  const secs = [
    ['daily_logs', 'Days', 'daily_log'],
    ['collections', 'Collections', 'collection'],
    ['artifacts', 'Artifacts', 'artifact'],
    ['references', 'References', 'reference'],
  ];
  let hasAny = false;
  for (const [key, label, chipKind] of secs) {
    const items = conn[key] || [];
    if (!items.length) continue;
    hasAny = true;
    panel.appendChild(h('div', { class: 'section-label' }, label));
    const list = h('div', { class: 'conn-list' });
    for (const it of items) {
      const text = chipKind === 'daily_log'
        ? (it.date + (it.summary ? ` — ${it.summary.slice(0, 48)}` : ''))
        : (it.title || it.label || '(untitled)');
      const chip = h('span', { class: `chip kind-${chipKind}` }, text);
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        if (chipKind === 'daily_log') navigate('day', it.id);
        else jumpToIndexNode(chipKind, it.id);
      });
      list.appendChild(chip);
    }
    panel.appendChild(list);
  }

  if (!hasAny && !conn.pages_count) {
    panel.appendChild(h('div', { class: 'soft', style: { fontSize: '11.5px', marginTop: '6px' } }, 'No connections yet.'));
  }

  // Cross-kind "Find related" — only for rows that can be the FROM side of a
  // cross-kind link (collection / artifact / reference / daily_log).
  if (['collection', 'artifact', 'reference', 'daily_log'].includes(kind)) {
    const btn = h('button', { class: 'btn sm' }, 'Find related');
    btn.addEventListener('click', (e) => { e.stopPropagation(); findRelatedForNode(kind, node.id, btn); });
    const when = node.links_classified_at ? `last run ${new Date(node.links_classified_at).toLocaleString()}` : 'never run';
    panel.appendChild(h('div', { style: { marginTop: '12px', display: 'flex', alignItems: 'center', gap: '8px' } },
      btn,
      h('span', { class: 'soft', style: { fontSize: '11px' } }, when),
    ));
  }

  // Per-user_index noise filter (Hidden / Forced in / Rebuild).
  if (kind === 'user_index') {
    panel.appendChild(h('div', { class: 'section-label', style: { marginTop: '12px' } }, 'Noise filter'));
    const host = h('div');
    panel.appendChild(host);
    renderUserIndexFiltersInto(host, node.id);
  }
}

// ── Entity detail (right pane, pages view) ──
async function openEntityDetail(kind, node, { skipRedirect = false } = {}) {
  detailBackContext = null;
  detailInner.innerHTML = '';
  detailInner.appendChild(skPageDetail());
  openDetail();

  let conn;
  try { conn = await api(`/api/index/${kind}/${node.id}/connections`); }
  catch (err) {
    detailInner.innerHTML = '';
    detailInner.appendChild(emptyState({ title: "Couldn't load.", sub: err.message }));
    return;
  }

  if (kind === 'artifact') {
    try { conn.meta = await api(`/api/artifacts/${node.id}`); } catch {}
  }

  const _connPages = conn.pages || [];
  const _connGroups = new Map();
  for (const p of _connPages) {
    const key = p.scan_path || `p:${p.id}`;
    if (!_connGroups.has(key)) _connGroups.set(key, []);
    _connGroups.get(key).push(p);
  }
  if (_connGroups.size === 1 && !skipRedirect) {
    const first = _connGroups.values().next().value[0];
    const label = node.label || node.title || node.canonical || '(untitled)';
    detailBackContext = { label, action: () => openEntityDetail(kind, node, { skipRedirect: true }) };
    openPageDetail(first.id);
    return;
  }

  renderEntityDetail(kind, node, conn);
}

function renderEntityDetail(kind, node, conn) {
  const label = node.label || node.title || node.canonical || '(untitled)';
  const kindLabel = KIND_ORDER.find(([k]) => k === kind)?.[1] || kind;

  const convertBtn = ['artifact', 'reference', 'collection'].includes(kind)
    ? h('button', { class: 'btn-ghost', onclick: () => convertEntityDetail(kind, node) }, 'Convert to…')
    : null;

  const detailActionsRow = h('div', { class: 'tree-panel-actions', style: { padding: '10px 28px 2px' } },
    ...rowActionsFor(kind, node),
  );

  // Build off-tree; atomic swap at end via swapDetailPane (below).
  const newHead = h('div', { class: 'detail-head' },
    h('div', null,
      h('div', { class: 'sub' }, kindLabel),
      h('div', { class: 'title' }, label),
    ),
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
      convertBtn,
      h('button', { class: 'icon-btn', onclick: () => closeDetail(), title: 'Close' }, '×'),
    ),
  );

  const body = h('div', { style: { padding: '20px 4px' } });

  // Artifact metadata preview
  if (kind === 'artifact' && conn.meta) {
    const meta = conn.meta;
    const previewBlock = h('div', { class: 'artifact-meta-block' });

    // Notes summary
    if (meta.notes) {
      previewBlock.appendChild(h('div', { class: 'artifact-filing' },
        h('span', { class: 'artifact-filing-lbl' }, 'Notes'),
        h('span', { class: 'artifact-filing-path', style: { fontFamily: 'var(--font-sans)', fontWeight: 'normal', color: 'var(--ink-2)' } }, meta.notes),
      ));
    }

    // External URL card
    if (meta.external_url) {
      const isGoogle = /docs\.google\.com|drive\.google\.com/.test(meta.external_url);
      const icon = isGoogle ? '↗ ' : '↗ ';
      const label = isGoogle ? 'Open in Google Docs' : 'Open link';
      const urlCard = h('div', { class: 'artifact-url-card' },
        h('a', { href: meta.external_url, target: '_blank', rel: 'noopener', class: 'artifact-url-link' },
          h('span', { class: 'artifact-url-icon' }, isGoogle ? '⎆' : '🔗'),
          h('span', null, label),
        ),
        h('span', { class: 'artifact-url-host', title: meta.external_url },
          (() => { try { return new URL(meta.external_url).hostname; } catch { return meta.external_url; } })()
        ),
        meta.fetched_at ? h('span', { class: 'artifact-url-fetched' }, `synced ${new Date(meta.fetched_at).toLocaleDateString()}`) : null,
        meta.fetched_error ? h('span', { class: 'artifact-url-error' }, meta.fetched_error) : null,
      );
      previewBlock.appendChild(urlCard);
    }

    // Filing location
    const filingParts = [meta.drawer, meta.hanging_folder, meta.manila_folder].filter(Boolean);
    if (filingParts.length) {
      previewBlock.appendChild(h('div', { class: 'artifact-filing' },
        h('span', { class: 'artifact-filing-lbl' }, 'Filing'),
        h('span', { class: 'artifact-filing-path' }, filingParts.join(' › ')),
      ));
    }

    // File versions
    if (meta.versions && meta.versions.length) {
      const versionsEl = h('div', { class: 'artifact-versions' },
        h('div', { class: 'artifact-versions-lbl' }, `${meta.versions.length} file version${meta.versions.length !== 1 ? 's' : ''}`),
        ...meta.versions.map(v => h('div', { class: 'artifact-version-row' },
          h('span', { class: 'lbl-mono' }, `v${v.version}`),
          v.note ? h('span', { style: { color: 'var(--ink-2)' } }, v.note) : null,
          v.file_path ? h('a', { href: v.file_path, target: '_blank', rel: 'noopener', class: 'btn-ghost', style: { marginLeft: 'auto' } }, 'Open') : null,
        )),
      );
      previewBlock.appendChild(versionsEl);
    }

    // Linked collections and indexes
    const linkedItems = [...(meta.linked_collections || []), ...(meta.linked_indexes || [])];
    if (linkedItems.length) {
      const linkedEl = h('div', { class: 'artifact-linked' },
        h('span', { class: 'artifact-filing-lbl' }, 'Linked to'),
        h('div', { class: 'links-row', style: { marginTop: '6px' } },
          ...(meta.linked_collections || []).map(c => {
            const chip = h('span', { class: 'chip' }, c.title);
            chip.addEventListener('click', () => jumpToIndexNode('collection', c.id));
            return chip;
          }),
          ...(meta.linked_indexes || []).map(u => {
            const chip = h('span', { class: 'chip' }, u.title);
            chip.addEventListener('click', () => jumpToIndexNode('user_index', u.id));
            return chip;
          }),
        ),
      );
      previewBlock.appendChild(linkedEl);
    }

    if (previewBlock.children.length) body.appendChild(previewBlock);
  }

  // Pages
  const pages = conn.pages || [];
  if (!pages.length) {
    body.appendChild(h('div', { class: 'empty' }, 'No pages linked yet.'));
  } else {
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, `${pages.length} page${pages.length !== 1 ? 's' : ''}`));

    // Group by scan_path for spread support
    const groups = new Map();
    for (const p of pages) {
      const key = p.scan_path || `p:${p.id}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(p);
    }

    let _tileIdx = 0;
    for (const [, group] of groups) {
      const first = group[0];
      const isVoice = first.source_kind === 'voice_memo' || (first.scan_path || '').startsWith('voice:');
      const isMarkdown = first.source_kind === 'markdown' || (first.scan_path || '').startsWith('markdown:');
      const imgLoading = _tileIdx++ < 4 ? 'eager' : 'lazy';
      const thumb = isVoice
        ? h('div', { class: 'thumb voice' }, '♪')
        : isMarkdown
          ? h('div', { class: 'thumb md' }, '{ }')
          : h('div', { class: 'thumb' }, h('img', { src: `/api/pages/${first.id}/scan`, alt: '', loading: imgLoading, decoding: 'async', fetchpriority: imgLoading === 'eager' ? 'high' : 'auto' }));
      const caps = group.map(p => p.summary || '').filter(Boolean).join(' · ') || '(no summary)';
      const meta = group.map(p => p.volume && p.page_number ? `v.${p.volume} p.${p.page_number}` : '').filter(Boolean).join(' · ');

      // Context badges: source (voice, markdown, date, collection, artifact, reference)
      const ctxBadges = [];
      if (isVoice) ctxBadges.push(h('span', { class: 'ctx-badge voice' }, '♪ voice memo'));
      if (isMarkdown) ctxBadges.push(h('span', { class: 'ctx-badge md' }, '{ } markdown'));
      const dlDate = first.daily_log_date;
      if (dlDate) {
        const [y, mo, d] = dlDate.split('-');
        const dateStr = new Date(+y, +mo - 1, +d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const badge = h('span', { class: 'ctx-badge date' }, dateStr);
        badge.addEventListener('click', e => { e.stopPropagation(); navigate('day', first.daily_log_id); });
        ctxBadges.push(badge);
      }
      if (first.collection_titles) {
        ctxBadges.push(h('span', { class: 'ctx-badge coll' }, first.collection_titles));
      }
      if (first.artifact_title) {
        ctxBadges.push(h('span', { class: 'ctx-badge artifact' }, `artifact: ${first.artifact_title}`));
      }
      if (first.reference_title) {
        ctxBadges.push(h('span', { class: 'ctx-badge reference' }, `ref: ${first.reference_title}`));
      }

      const tile = h('div', { class: 'day-tile' },
        thumb,
        h('div', { class: 'tile-body' },
          ctxBadges.length ? h('div', { class: 'ctx-badges' }, ...ctxBadges) : null,
          h('div', { class: 'captions' }, caps),
          h('div', { class: 'tile-meta' }, `${group.length} page${group.length > 1 ? 's' : ''}${meta ? ' · ' + meta : ''}`),
        ),
      );
      tile.addEventListener('click', () => {
        detailBackContext = {
          label,
          action: () => renderEntityDetail(kind, node, conn),
        };
        openPageDetail(first.id);
      });
      body.appendChild(tile);
    }
  }

  // Connection chips (days, collections, etc.)
  const connSecs = [
    ['daily_logs', 'Days', 'daily_log'],
    ['collections', 'Collections', 'collection'],
    ['artifacts', 'Artifacts', 'artifact'],
    ['references', 'References', 'reference'],
  ];
  let hasConns = false;
  const connHost = h('div', { class: 'links-section' });
  for (const [key, secLabel, chipKind] of connSecs) {
    const items = conn[key] || [];
    if (!items.length) continue;
    hasConns = true;
    const row = h('div', { class: 'links-group' },
      h('div', { class: 'links-group-lbl' }, secLabel),
      h('div', { class: 'links-row' },
        ...items.map(it => {
          const text = chipKind === 'daily_log'
            ? it.date + (it.summary ? ` — ${it.summary.slice(0, 40)}` : '')
            : (it.title || it.label || '(untitled)');
          const chip = h('span', { class: `chip kind-${chipKind}` }, text);
          chip.addEventListener('click', () => chipKind === 'daily_log' ? navigate('day', it.id) : jumpToIndexNode(chipKind, it.id));
          return chip;
        }),
      ),
    );
    connHost.appendChild(row);
  }
  if (hasConns) body.appendChild(connHost);

  // Atomic swap so the skeleton crossfades to real content in one motion.
  swapDetailPane(() => {
    detailInner.innerHTML = '';
    detailInner.append(newHead, detailActionsRow, body);
  });
}

function invalidateIndexCache() { cachedIndexTree = null; }

async function renameNode(kind, node) {
  const next = prompt(`Rename "${node.label}":`, node.label);
  if (!next || next === node.label) return;
  try {
    await api(`/api/index/${kind}/${node.id}/rename`, 'POST', { label: next });
    toast('renamed', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

async function mergeNode(kind, node) {
  const targetLabel = prompt(`Merge "${node.label}" into (type exact label):`);
  if (!targetLabel) return;
  try {
    const search = await api(`/api/index/search?q=${encodeURIComponent(targetLabel.replace(/['"*]/g, ' '))}`);
    const match = (search.results || []).find(r => r.kind === kind && r.label.toLowerCase() === targetLabel.toLowerCase());
    if (!match) { toast('No exact match found', 'err'); return; }
    if (match.id === node.id) { toast('Cannot merge into self', 'err'); return; }
    if (!confirm(`Merge "${node.label}" into "${match.label}"? This is irreversible.`)) return;
    await api(`/api/index/${kind}/${node.id}/merge`, 'POST', { into_id: match.id });
    toast('merged', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

function convertEntityDetail(kind, node) {
  const TARGETS = {
    artifact:   ['reference', 'collection'],
    reference:  ['artifact',  'collection'],
    collection: ['artifact',  'reference'],
  };
  const targets = TARGETS[kind];
  if (!targets) return;

  const anchorBtn = [...document.querySelectorAll('#detail button')].find(b => b.textContent.trim() === 'Convert to…');
  const rect = anchorBtn ? anchorBtn.getBoundingClientRect() : { left: 200, bottom: 220 };

  const pop = h('div', { class: 'typeahead-pop', style: { minWidth: '160px' } });
  const list = h('div', { class: 'typeahead-list' });
  pop.appendChild(list);
  document.body.appendChild(pop);
  const rightOffset = Math.max(4, window.innerWidth - (anchorBtn ? anchorBtn.getBoundingClientRect().right : window.innerWidth - 4));
  Object.assign(pop.style, {
    position: 'fixed',
    top: `${Math.min(rect.bottom + 4, window.innerHeight - 120)}px`,
    right: `${rightOffset}px`,
    left: 'auto',
  });

  const close = () => { pop.remove(); document.removeEventListener('mousedown', away); };
  const away = (e) => { if (!pop.contains(e.target)) close(); };
  setTimeout(() => document.addEventListener('mousedown', away), 0);

  for (const toKind of targets) {
    const label = toKind.charAt(0).toUpperCase() + toKind.slice(1);
    const row = h('div', { class: 'typeahead-row' }, h('span', null, label));
    row.addEventListener('click', async () => {
      close();
      if (!confirm(`Convert to ${label}? All linked pages and connections will be preserved.`)) return;
      try {
        const r = await api(`/api/index/${kind}/${node.id}/convert`, 'POST', { to_kind: toKind });
        toast(`Converted to ${label}`, 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
        openEntityDetail(toKind, { id: r.id, label: r.label });
      } catch (err) { toast(err.message, 'err'); }
    });
    list.appendChild(row);
  }
}

async function archiveNode(kind, node) {
  if (!confirm(`Archive "${node.label}"?`)) return;
  try {
    await api(`/api/index/${kind}/${node.id}/archive`, 'POST', { archived: true });
    toast('archived', 'ok');
    invalidateIndexCache();
    mainInner.innerHTML = '';
    renderIndex();
  } catch (err) { toast(err.message, 'err'); }
}

function setParent(kind, node, anchorBtn) {
  openTypeahead({
    anchor: anchorBtn || null,
    placeholder: 'Find a parent…',
    onPick: async (r) => {
      try {
        await api(`/api/index/${kind}/${node.id}/parent`, 'POST', { parent_kind: r.kind, parent_id: r.id });
        toast('parent set', 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
      } catch (err) { toast(err.message, 'err'); }
    },
  });
}

// Attach a collection or artifact to a heading. Multi-parent is allowed, so
// the API call is additive; remove-from-heading is a separate chip click in
// the connections panel. Uses the same typeahead as other parent pickers, but
// restricted to the heading kind; if the user types a label not in the list
// and accepts, we create a new heading and attach to it.
async function setHeadingForNode(kind, node) {
  openTypeahead({
    anchor: null,
    kinds: ['heading'],
    placeholder: 'Find or create a heading…',
    allowCreate: true,
    createLabel: 'New heading',
    onPick: async (r) => {
      try {
        let headingId = r.id;
        if (r._create) {
          const created = await api('/api/headings', 'POST', { label: r.label });
          headingId = created.id;
        }
        await api(`/api/index/${kind}/${node.id}/parent`, 'POST', {
          parent_kind: 'heading', parent_id: headingId,
        });
        toast('filed under heading', 'ok');
        invalidateIndexCache();
        mainInner.innerHTML = '';
        renderIndex();
      } catch (err) { toast(err.message, 'err'); }
    },
  });
}

// Cross-kind "Find related": bypass hash-skip, classify now, toast the counts.
async function findRelatedForNode(kind, id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Finding…'; }
  try {
    const r = await api(`/api/index/${kind}/${id}/find-related`, 'POST', {});
    toast(`+${r.linked || 0} links, ${r.proposals || 0} proposals`, 'ok');
    invalidateIndexCache();
  } catch (err) { toast(err.message, 'err'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Find related'; } }
}

// Load & render the noise-filter UI for a user_index: hidden (excluded) entries
// with a reason badge + a force-include button; forced entries with remove
// buttons. Mounts into a host div the caller provides.
async function renderUserIndexFiltersInto(host, id) {
  host.innerHTML = '<div class="soft" style="font-size:12px">loading…</div>';
  let data;
  try { data = await api(`/api/user-indexes/${id}/exclusions`); }
  catch (err) { host.innerHTML = ''; host.appendChild(h('div', { class: 'soft' }, err.message)); return; }
  host.innerHTML = '';

  const rebuildBtn = h('button', { class: 'btn sm' }, 'Rebuild index');
  rebuildBtn.addEventListener('click', async () => {
    rebuildBtn.disabled = true; rebuildBtn.textContent = 'Rebuilding…';
    try {
      const r = await api(`/api/user-indexes/${id}/rebuild`, 'POST', {});
      toast(`rebuilt — ${r.entries_count || 0} entries, ${r.excluded_count || 0} hidden`, 'ok');
      renderUserIndexFiltersInto(host, id);
    } catch (err) { toast(err.message, 'err'); }
    finally { rebuildBtn.disabled = false; rebuildBtn.textContent = 'Rebuild index'; }
  });
  host.appendChild(h('div', { style: { marginBottom: '8px' } }, rebuildBtn));

  const section = (title, rows, actionLabel, onAction) => {
    if (!rows.length) return;
    host.appendChild(h('div', { class: 'section-label' }, title));
    const list = h('div', { class: 'conn-list' });
    for (const row of rows) {
      const text = `${row.label || row.entity_id}` + (row.reason ? ` · ${row.reason.replace('_', ' ')}` : '');
      const chip = h('span', { class: `chip kind-${row.entity_kind}` }, text);
      const btn = h('button', { class: 'btn-ghost', style: { marginLeft: '4px', fontSize: '10px' } }, actionLabel);
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try { await onAction(row); renderUserIndexFiltersInto(host, id); }
        catch (err) { toast(err.message, 'err'); }
      });
      const wrap = h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '2px' } }, chip, btn);
      list.appendChild(wrap);
    }
    host.appendChild(list);
  };

  section('Hidden (auto)', data.auto || [], 'Include', (row) =>
    api(`/api/user-indexes/${id}/inclusions`, 'POST', { entity_kind: row.entity_kind, entity_id: row.entity_id })
  );
  section('Hidden (blocked by you)', data.user || [], 'Unblock', (row) =>
    api(`/api/user-indexes/${id}/exclusions/${row.id}`, 'DELETE')
  );
  section('Forced in', data.inclusions || [], '×', (row) =>
    api(`/api/user-indexes/${id}/inclusions/${row.id}`, 'DELETE')
  );

  if (!(data.auto || []).length && !(data.user || []).length && !(data.inclusions || []).length) {
    host.appendChild(h('div', { class: 'soft', style: { fontSize: '11.5px', marginTop: '6px' } }, 'No filter rules yet. Rebuild the index to populate.'));
  }
}

async function jumpToIndexNode(kind, id, alreadyOnIndex = false) {
  if (!alreadyOnIndex) {
    // Navigate to index with the target kind+id in the hash so renderIndex
    // switches to the right tab and calls jumpToIndexNode(kind, id, true) itself.
    currentLeftHash = `#/index/${kind}/${id}`;
    location.hash = `#/index/${kind}/${id}`;
    return;
  }
  // Already on the right tab — scroll to the row.
  const key = `${kind}:${id}`;
  const tries = [0, 80, 200, 450];
  for (const t of tries) {
    await new Promise(r => setTimeout(r, t));
    const ref = indexNodeRefs.get(key);
    if (ref) {
      ref.expand();
      ref.row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      ref.row.style.transition = 'background 600ms';
      ref.row.style.background = 'var(--accent-soft)';
      setTimeout(() => { ref.row.style.background = ''; }, 1200);
      return;
    }
  }
  toast(`Couldn't find ${kind} in index`, 'err');
}

// ─── Cmd+K palette ─────────────────────────
const cmdkEl = document.getElementById('cmdk');
const cmdkInput = document.getElementById('cmdk-input');
const cmdkList = document.getElementById('cmdk-list');
let cmdkActive = 0;
let cmdkRows = [];
let cmdkTimer = null;

function openCmdk() {
  cmdkEl.classList.add('open');
  cmdkInput.value = '';
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  cmdkInput.focus();
  // Seed with recent daily logs (current month)
  api(`/api/logs/month/${ymNow()}`).then(res => {
    if (cmdkInput.value) return; // user already typed
    const hasDays = (res.days || []).filter(d => d.daily_log_id);
    cmdkRenderSeed(hasDays);
  }).catch(() => {});
}
function closeCmdk() {
  cmdkEl.classList.remove('open');
  cmdkInput.blur();
}
document.getElementById('cmdk-backdrop').addEventListener('click', closeCmdk);

function cmdkRenderSeed(days) {
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  if (!days.length) return;
  const sec = h('div', { class: 'cmdk-section' });
  sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, 'Recent days'));
  for (const d of days.slice(-10).reverse()) {
    const row = h('div', { class: 'cmdk-row' },
      h('span', { class: 'cmdk-lbl' }, d.date),
      d.preview ? h('span', { class: 'cmdk-sub' }, d.preview.slice(0, 60)) : null,
      h('span', { class: 'cmdk-kind' }, 'day'),
    );
    row.addEventListener('click', () => { closeCmdk(); navigate('day', d.daily_log_id); });
    sec.appendChild(row);
    cmdkRows.push({ el: row, action: () => { closeCmdk(); navigate('day', d.daily_log_id); } });
  }
  cmdkList.appendChild(sec);
  cmdkHighlight();
}

async function cmdkQuery(q) {
  cmdkList.innerHTML = '';
  cmdkRows = [];
  cmdkActive = 0;
  if (!q) return;

  // Date shorthand: "apr 3", "3 apr", "2026-04-03", "apr", YYYY-MM
  const dateMatch = tryParseDate(q);
  if (dateMatch) {
    const row = h('div', { class: 'cmdk-row' },
      h('span', { class: 'cmdk-lbl' }, dateMatch.label),
      h('span', { class: 'cmdk-kind' }, 'day'),
    );
    const go = async () => {
      closeCmdk();
      const res = await api(`/api/logs/month/${dateMatch.ym}`);
      const day = (res.days || []).find(d => d.date === dateMatch.date);
      if (day?.daily_log_id) navigate('day', day.daily_log_id);
      else navigate('log', dateMatch.ym);
    };
    row.addEventListener('click', go);
    const sec = h('div', { class: 'cmdk-section' });
    sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, 'Date'));
    sec.appendChild(row);
    cmdkList.appendChild(sec);
    cmdkRows.push({ el: row, action: go });
    cmdkHighlight();
    return;
  }

  try {
    const safe = q.replace(/['"*]/g, ' ').trim();
    const res = await api(`/api/index/search?q=${encodeURIComponent(safe)}`);
    const results = res.results || [];
    if (!results.length) {
      cmdkList.appendChild(h('div', { class: 'cmdk-empty' }, 'No results.'));
      return;
    }
    // Group by kind
    const grouped = new Map();
    for (const r of results.slice(0, 30)) {
      const k = r.kind;
      if (!grouped.has(k)) grouped.set(k, []);
      grouped.get(k).push(r);
    }
    for (const [kind, items] of grouped) {
      const sec = h('div', { class: 'cmdk-section' });
      const kindLabel = { collection: 'Collections', person: 'People', topic: 'Topics', book: 'Books', artifact: 'Artifacts', reference: 'References', scripture: 'Scripture', user_index: 'Custom' }[kind] || kind;
      sec.appendChild(h('div', { class: 'cmdk-section-lbl' }, kindLabel));
      for (const r of items.slice(0, 8)) {
        const row = h('div', { class: 'cmdk-row' },
          h('span', { class: 'cmdk-lbl' }, r.label),
          h('span', { class: 'cmdk-kind' }, kind.replace('_', ' ')),
        );
        const go = () => { closeCmdk(); jumpToIndexNode(kind, r.id); };
        row.addEventListener('click', go);
        sec.appendChild(row);
        cmdkRows.push({ el: row, action: go });
      }
      cmdkList.appendChild(sec);
    }
    cmdkHighlight();
  } catch {}
}

function tryParseDate(q) {
  q = q.trim().toLowerCase();
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const fullMonths = ['january','february','march','april','may','june','july','august','september','october','november','december'];

  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(q)) {
    return { date: q, ym: q.slice(0,7), label: q };
  }
  // YYYY-MM
  if (/^\d{4}-\d{2}$/.test(q)) {
    const [y, m] = q.split('-').map(Number);
    const d = new Date(y, m-1, 1);
    return { date: q + '-01', ym: q, label: d.toLocaleString('en-US',{month:'long',year:'numeric'}) };
  }
  // "apr 3" or "3 apr" or "april 3" etc.
  const parts = q.split(/[\s,]+/).filter(Boolean);
  const now = new Date();
  if (parts.length === 2) {
    let monthIdx = -1, day = 0;
    for (const p of parts) {
      const mi = months.indexOf(p.slice(0,3));
      if (mi >= 0) { monthIdx = mi; continue; }
      const fi = fullMonths.indexOf(p);
      if (fi >= 0) { monthIdx = fi; continue; }
      if (/^\d{1,2}$/.test(p)) day = Number(p);
    }
    if (monthIdx >= 0 && day > 0) {
      const y = now.getFullYear();
      const date = `${y}-${String(monthIdx+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const ym = date.slice(0,7);
      const label = new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'});
      return { date, ym, label };
    }
  }
  // single month name → go to that month in current year
  if (parts.length === 1) {
    const mi = months.indexOf(parts[0].slice(0,3));
    const fi = fullMonths.indexOf(parts[0]);
    const idx = mi >= 0 ? mi : fi;
    if (idx >= 0) {
      const y = now.getFullYear();
      const ym = `${y}-${String(idx+1).padStart(2,'0')}`;
      const label = new Date(y, idx, 1).toLocaleString('en-US',{month:'long',year:'numeric'});
      return { date: ym+'-01', ym, label };
    }
  }
  return null;
}

function cmdkHighlight() {
  cmdkRows.forEach((r, i) => r.el.classList.toggle('active', i === cmdkActive));
}

cmdkInput.addEventListener('input', () => {
  clearTimeout(cmdkTimer);
  cmdkTimer = setTimeout(() => cmdkQuery(cmdkInput.value.trim()), 110);
});
cmdkInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCmdk(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdkActive = Math.min(cmdkActive+1, cmdkRows.length-1); cmdkHighlight(); cmdkRows[cmdkActive]?.el.scrollIntoView({block:'nearest'}); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); cmdkActive = Math.max(cmdkActive-1, 0); cmdkHighlight(); cmdkRows[cmdkActive]?.el.scrollIntoView({block:'nearest'}); }
  if (e.key === 'Enter') { cmdkRows[cmdkActive]?.action(); }
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    cmdkEl.classList.contains('open') ? closeCmdk() : openCmdk();
  }
});

// Suite-wide config (other app URLs for cross-app deep links). Fetched once
// at boot; rendering code reads SUITE_CONFIG synchronously. Missing values
// just mean the corresponding "View in X" button stays hidden.
let SUITE_CONFIG = {};
async function loadSuiteConfig() {
  try { SUITE_CONFIG = await fetch('/api/suite-config').then(r => r.json()); }
  catch { /* fine — cross-app links just won't render */ }
}

// ─── boot ──────────────────────────────────
if (!location.hash || location.hash === '#') location.hash = '#/log/' + ymNow();
loadSuiteConfig();  // fire-and-forget; usable by next render after it lands
route().finally(() => {
  // Reveal the app — remove the booting class so body content fades in,
  // then fade out the splash overlay. Use rAF so the paint is committed.
  requestAnimationFrame(() => {
    document.documentElement.classList.remove('booting');
    const splash = document.getElementById('boot-splash');
    if (splash) {
      splash.classList.add('done');
      setTimeout(() => splash.remove(), 380);
    }
    // Prefetch the other two primary routes so the second tap is instant.
    setTimeout(() => {
      try { api('/api/index/tree'); } catch {}
    }, 400);
  });
});
</script>
<script>
// Service worker registration — installs the offline fallback SW on capable
// browsers. Failures are swallowed; the app degrades to "online only" cleanly.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => {
      console.warn('[sw] register failed:', err);
    });
  });
}
</script>
</body>
