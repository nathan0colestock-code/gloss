<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloss</title>
<link rel="stylesheet" href="/fonts/foxed.css">
<style>
:root {
  --paper:       #FAF7F1;
  --paper-2:     #F3EEE3;
  --paper-3:     #ECE4D2;
  --paper-edge:  #E5DCC6;
  --ink:         #1F1B16;
  --ink-soft:    #5C5246;
  --ink-faint:   #9D907D;
  --rule:        #E5DCC6;
  --rule-soft:   #EFE9DC;
  --accent:      #8B3A1F;
  --accent-dim:  #6F2E18;
  --accent-soft: #E3C7BB;
  --danger:      #7A2E22;
  --ok:          #4C6B3F;

  --font-sans:   "Inter", system-ui, -apple-system, sans-serif;
  --font-mono:   "JetBrains Mono", ui-monospace, Menlo, monospace;

  --r-sm: 2px;
  --r:    3px;
  --r-lg: 5px;
  --shadow-card:  0 1px 2px rgba(0,0,0,.04);
  --shadow-lift:  0 8px 28px rgba(31,27,22,.12), 0 2px 8px rgba(31,27,22,.06);
  --t: 180ms ease-out;

  --rail-w: 220px;
  --detail-w: 0px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-dim); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }

/* ── Shell (split-pane) ────────────────── */
#shell { display: flex; min-height: 100vh; align-items: stretch; }

#rail {
  flex: 0 0 var(--rail-w);
  transition: flex-basis 200ms ease-out;
  background: var(--paper-2);
  border-right: 1px solid var(--rule);
  padding: 18px 14px;
  display: flex; flex-direction: column; gap: 2px;
  position: sticky; top: 0; align-self: flex-start;
  height: 100vh;
  overflow: hidden;
}
body.rail-collapsed { --rail-w: 58px; }
body.rail-collapsed #rail { padding: 18px 8px; }

.rail-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  padding: 2px 6px;
}
#brand {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0;
  white-space: nowrap;
  transition: opacity 160ms;
}
#brand .dot { color: var(--accent); }
body.rail-collapsed #brand { opacity: 0; width: 0; overflow: hidden; }
#rail-toggle {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  color: var(--ink-faint);
  transition: all var(--t);
  flex-shrink: 0;
}
#rail-toggle:hover { color: var(--ink); background: var(--paper-3); }
body.rail-collapsed #rail-toggle { transform: rotate(180deg); margin: 0 auto; }

.nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border-radius: var(--r);
  color: var(--ink-soft);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0;
  transition: color var(--t), background var(--t), border-color var(--t);
  text-align: left;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
}
.nav-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 2px;
  background: transparent;
  border-radius: 2px;
  transition: background var(--t);
}
.nav-btn:hover { color: var(--ink); background: var(--paper-3); }
.nav-btn.active { color: var(--ink); background: var(--paper); }
.nav-btn.active::before { background: var(--accent); }
.nav-btn .ico { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
.nav-btn.active .ico { opacity: 1; color: var(--accent); }
.nav-btn .lbl { transition: opacity 140ms; }
body.rail-collapsed .nav-btn { justify-content: center; padding: 8px 0; gap: 0; }
body.rail-collapsed .nav-btn .lbl { display: none; }

#rail-footer {
  margin-top: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  padding: 8px 10px;
  text-transform: uppercase;
  transition: opacity 160ms;
}
body.rail-collapsed #rail-footer { opacity: 0; }

/* Main */
#main { flex: 1; min-width: 0; }
#main-inner {
  max-width: 920px;
  margin: 0 auto;
  padding: 44px 48px 80px;
}
body.has-detail #main-inner {
  max-width: none;
  margin: 0;
  padding: 36px 32px 60px;
}

/* Detail pane */
#detail {
  flex: 0 0 var(--detail-w);
  transition: flex-basis 220ms ease-out;
  overflow: hidden;
  border-left: 1px solid var(--rule);
  background: var(--paper);
  position: sticky; top: 0; align-self: flex-start;
  max-height: 100vh;
}
body.has-detail { --detail-w: min(58vw, 900px); }
#detail-scroll { height: 100vh; overflow-y: auto; }
#detail-inner { padding: 20px 32px 60px; }

/* ── Shared primitives ───────────────── */
.surface-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
.surface-title {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.025em;
  margin: 0;
  color: var(--ink);
}
.surface-sub { color: var(--ink-soft); font-size: 13px; }
.mono { font-family: var(--font-mono); }
.faint { color: var(--ink-faint); }
.soft  { color: var(--ink-soft); }
.lbl-mono {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-soft);
  transition: all var(--t);
  line-height: 1.4;
  cursor: pointer;
}
.chip:hover { border-color: var(--ink-faint); color: var(--ink); background: var(--paper); }
.chip.accent { background: var(--accent-soft); border-color: var(--accent-soft); color: var(--accent-dim); }
.chip .x { margin-left: 2px; opacity: 0.5; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 2px; }
.chip .x:hover { opacity: 1; color: var(--danger); background: rgba(139,58,31,0.08); }
.chip.kind-scripture { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  background: var(--paper);
  color: var(--ink);
  font-size: 12.5px;
  font-weight: 500;
  transition: all var(--t);
}
.btn:hover { border-color: var(--ink-faint); background: var(--paper-2); }
.btn.primary { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.btn.ghost { border-color: transparent; background: transparent; color: var(--ink-soft); }
.btn.ghost:hover { color: var(--ink); background: var(--paper-2); }
.btn.sm { padding: 2px 7px; font-size: 11.5px; }

.icon-btn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  color: var(--ink-soft);
  transition: all var(--t);
}
.icon-btn:hover { background: var(--paper-2); color: var(--ink); }

.input, textarea.input, select.input {
  width: 100%;
  padding: 7px 10px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  transition: border-color var(--t), box-shadow var(--t);
  font-size: 13px;
}
.input:focus, textarea.input:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(31,27,22,0.08);
}
.input.mono { font-family: var(--font-mono); font-size: 12px; }

hr.rule { border: 0; border-top: 1px solid var(--rule); margin: 16px 0; }

.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
  border: 1px dashed var(--rule);
  border-radius: var(--r);
  font-size: 13px;
}

/* ── LOG — month spine ───────────────── */
.log-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.log-nav { display: flex; align-items: center; gap: 4px; color: var(--ink-soft); }
.log-nav button { padding: 4px 10px; border-radius: var(--r); transition: all var(--t); font-size: 14px; }
.log-nav button:hover { background: var(--paper-2); color: var(--ink); }
.log-month-label {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.015em;
  color: var(--ink);
  padding: 0 10px;
  line-height: 1;
}

.spine { border-top: 1px solid var(--rule); }
.spine-row {
  display: grid;
  grid-template-columns: 28px 42px 1fr auto;
  align-items: baseline;
  gap: 14px;
  padding: 11px 10px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background var(--t);
}
.spine-row:hover { background: var(--paper-2); }
.spine-row.today { background: linear-gradient(to right, var(--accent-soft) 0, var(--paper) 160px); }
.spine-row.today:hover { background: linear-gradient(to right, var(--accent-soft) 0, var(--paper-2) 160px); }
.spine-row.weekend .spine-dom, .spine-row.weekend .spine-wd { color: var(--ink-faint); }
.spine-dom {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-soft);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.spine-row.today .spine-dom { color: var(--accent); font-weight: 600; }
.spine-wd {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
}
.spine-sum {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--ink);
  min-height: 22px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.5;
}
.spine-sum.empty-dot { color: var(--ink-faint); font-family: var(--font-mono); font-size: 13px; }
.spine-sum.synth { color: var(--ink-soft); }
.spine-pc {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  padding: 2px 7px;
  background: var(--paper-2);
  border-radius: 999px;
  letter-spacing: 0.02em;
}
.spine-row.today .spine-pc { background: var(--accent-soft); color: var(--accent-dim); }

/* ── CAPTURE ─────────────────────────── */
.cap-grid { display: flex; flex-direction: column; gap: 18px; }
.cap-zone {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 22px 24px;
  background: var(--paper);
  transition: border-color var(--t);
}
.cap-zone h3 {
  margin: 0 0 4px;
  font-family: var(--font-sans);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.cap-zone .sub { color: var(--ink-soft); font-size: 12.5px; margin-bottom: 14px; }

.drop-zone {
  border: 1.5px dashed var(--rule);
  border-radius: var(--r);
  padding: 30px 20px;
  text-align: center;
  color: var(--ink-faint);
  transition: all var(--t);
  cursor: pointer;
}
.drop-zone:hover, .drop-zone.drag { border-color: var(--ink); background: var(--paper-2); color: var(--ink-soft); }
.drop-zone .big { font-size: 14px; color: var(--ink-soft); font-weight: 500; }
.drop-zone .kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: var(--r-sm);
}

.seg {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--paper-2);
}
.seg button {
  padding: 5px 12px;
  font-size: 11.5px;
  color: var(--ink-soft);
  font-weight: 500;
  transition: all var(--t);
  letter-spacing: 0.02em;
}
.seg button.active { background: var(--paper); color: var(--ink); box-shadow: inset 0 -1px 0 var(--accent); }
.seg button:hover:not(.active) { color: var(--ink); }

.ingest-stream { margin-top: 16px; border-top: 1px solid var(--rule); padding-top: 16px; }
.ingest-progress {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  margin-bottom: 12px;
  letter-spacing: 0.02em;
}
.ingest-tile {
  display: flex;
  gap: 14px;
  padding: 12px;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  margin-bottom: 8px;
  animation: fadeIn 220ms ease-out;
  background: var(--paper);
  cursor: pointer;
  transition: border-color var(--t);
}
.ingest-tile:hover { border-color: var(--ink-faint); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.ingest-tile img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--r-sm); background: var(--paper-3); }
.ingest-tile .meta { flex: 1; min-width: 0; }
.ingest-tile .vp { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.02em; }
.ingest-tile .sum { font-size: 13.5px; color: var(--ink); margin-top: 4px; line-height: 1.45; }

.backlog-card {
  border: 1px solid var(--rule);
  border-left: 2px solid var(--accent);
  border-radius: var(--r);
  padding: 14px 18px;
  background: var(--paper);
  margin-bottom: 12px;
}
.backlog-card .q { font-size: 14.5px; color: var(--ink); margin-bottom: 10px; font-weight: 500; }
.backlog-card .ctx { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
.backlog-actions { display: flex; gap: 8px; margin-top: 10px; }
.radio-list { display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
.radio-list label { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: var(--r-sm); cursor: pointer; }
.radio-list label:hover { background: var(--paper-2); }

/* ── INDEX ───────────────────────────── */
.index-kinds { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--rule); }
.tree-heading-row {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) auto;
  gap: 6px;
  align-items: center;
  padding: 4px 8px 2px;
  margin-top: 10px;
  border-bottom: 1px dashed var(--rule);
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-2);
  position: relative;
}
.tree-heading-row:first-child { margin-top: 0; }
.tree-heading-row .tree-heading-label { cursor: pointer; }
.tree-heading-row .tree-heading-label:hover { color: var(--accent); }
.tree-heading-row .tree-actions { opacity: 0; pointer-events: none; transition: opacity var(--t); }
.tree-heading-row:hover .tree-actions { opacity: 1; pointer-events: auto; }
.tree-heading-children { margin-left: 10px; padding-left: 6px; border-left: 1px solid var(--rule); }
.tree-heading-empty { font-style: italic; color: var(--ink-faint); padding: 1px 8px; font-size: 11px; }
.kind-block h3 {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin: 0 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; gap: 10px;
  font-weight: 500;
}
.kind-block h3 .count { color: var(--ink-faint); font-weight: 400; }

.tree-row {
  padding: 11px 10px;
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 14px;
  border-bottom: 1px solid var(--rule-soft);
  transition: background var(--t);
  overflow: hidden;
}
.tree-row:hover { background: var(--paper-2); }
.tree-row.expanded { background: var(--paper-2); }
.tree-chevron {
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint);
  transition: transform var(--t), color var(--t);
  cursor: pointer;
  font-size: 9px;
  line-height: 1;
}
.tree-chevron.open { transform: rotate(90deg); color: var(--accent); }
.tree-label {
  cursor: pointer;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tree-label:hover { color: var(--accent); }
.tree-label.repeat { color: var(--ink-faint); font-style: italic; }
.tree-counts {
  font-family: var(--font-mono);
  font-size: 10px;
  line-height: 1;
  color: var(--ink-faint);
  letter-spacing: 0.02em;
}
.tree-actions .btn { line-height: 1; }
.tree-row { position: relative; }
.tree-actions {
  position: absolute;
  right: 4px; top: 50%;
  transform: translateY(-50%);
  display: flex; gap: 2px; align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t);
  background: var(--paper-2);
  border-radius: var(--r);
  padding: 0 2px;
}
.tree-row:hover .tree-actions, .tree-row.expanded .tree-actions {
  opacity: 1;
  pointer-events: auto;
}
.tree-actions .btn { padding: 2px 7px; font-size: 11px; border-color: transparent; }
.tree-actions .btn:hover { border-color: var(--rule); }

.tree-children {
  margin-left: 10px;
  padding-left: 6px;
  border-left: 1px solid var(--rule);
}

.tree-panel {
  margin: 2px 0 8px 22px;
  padding: 8px 12px;
  border: 1px solid var(--rule);
  border-radius: var(--r);
  background: var(--paper);
  font-size: 13px;
}
.tree-panel .section-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin: 10px 0 6px;
  font-weight: 500;
}
.tree-panel .section-label:first-child { margin-top: 0; }
.tree-panel .conn-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tree-panel .meta-form { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; align-items: center; margin-top: 4px; margin-bottom: 8px; }
.tree-panel .meta-form > label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.tree-panel .pages-link {
  display: inline-flex;
  gap: 4px;
  padding: 4px 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  font-size: 12px;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--t);
}
.tree-panel .pages-link:hover { border-color: var(--accent); color: var(--accent); }

/* ── Index kind tabs ─────────────────── */
.kind-tabs {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 22px;
}
.kind-tab {
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color var(--t), border-color var(--t);
  font-weight: 500;
}
.kind-tab:hover { color: var(--ink-soft); }
.kind-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.kind-tab .tab-count { margin-left: 5px; opacity: 0.6; font-size: 9.5px; }

/* ── Detail pane ─────────────────────── */
.detail-head {
  position: sticky; top: 0;
  padding: 14px 28px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 2;
}
.detail-head .title {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.detail-head .sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; letter-spacing: 0.04em; }

.scan-frame {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--paper-3);
  position: relative;
  box-shadow: var(--shadow-card);
  max-width: 100%;
}
.scan-frame img { display: block; width: 100%; height: auto; cursor: zoom-in; transition: transform var(--t); }

<script type="module">
// ─── util ──────────────────────────────────
function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const k of Object.keys(attrs)) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'class' || k === 'className') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k === 'html') el.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'dataset') Object.assign(el.dataset, v);
      else if (k in el && typeof el[k] !== 'object') el[k] = v;
      else el.setAttribute(k, v);
    }
  }
  for (const kid of kids.flat(Infinity)) {
    if (kid == null || kid === false) continue;
    el.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return el;
}
const mainInner = document.getElementById('main-inner');
const detail = document.getElementById('detail');
const detailInner = document.getElementById('detail-inner');
const detailScroll = document.getElementById('detail-scroll');

function toast(msg, kind = '') {
  const t = h('div', { class: `toast ${kind}` }, msg);
  document.getElementById('toast-stack').appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 180ms';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 200);
  }, 2600);
}

function todayIso() { return new Date().toISOString().slice(0, 10); }
function ymNow() { return todayIso().slice(0, 7); }
function ymShift(ym, delta) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function monthLabel(ym) {
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function dateLabel(iso) {
  return new Date(iso + 'T00:00:00').toLocaleString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// ─── api ────────────────────────────────────
async function api(path, method = 'GET', body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg; try { const j = await res.json(); msg = j.detail ? `${j.error}: ${j.detail}` : j.error; } catch {}
    throw new Error(msg || `${res.status} ${res.statusText}`);
  }
  if (res.status === 204) return null;
  return res.json();
}
async function* ndjson(response) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.trim()) continue;
      try { yield JSON.parse(line); } catch {}
    }
  }
  if (buf.trim()) { try { yield JSON.parse(buf); } catch {} }
}

// ─── Sidebar toggle ─────────────────────────
const railToggle = document.getElementById('rail-toggle');
function applyRailState() {
  const collapsed = localStorage.getItem('gloss.railCollapsed') === '1';
  document.body.classList.toggle('rail-collapsed', collapsed);
}
railToggle.addEventListener('click', () => {
  const next = !document.body.classList.contains('rail-collapsed');
  localStorage.setItem('gloss.railCollapsed', next ? '1' : '0');
  applyRailState();
});
applyRailState();

// ─── Router ─────────────────────────────────
const routes = { capture: renderCapture, log: renderLog, index: renderIndex };
let currentLeftHash = '#/log';

function parseHash() {
  const raw = location.hash || '#/log';
  const body = raw.replace(/^#\//, '');
  const parts = body.split('/').filter(Boolean);
  return { nav: parts[0] || 'log', args: parts.slice(1) };
}

async function route() {
  const { nav, args } = parseHash();
  if (nav === 'page') {
    const id = args[0];
    if (id) await openPageDetail(id);
    return;
  }
  if (nav === 'day') {
    const id = args[0];
    if (id) await openDayDetail(id);
    return;
  }
  closeDetail(true);
  currentLeftHash = location.hash;
  for (const btn of document.querySelectorAll('.nav-btn')) {
    btn.classList.toggle('active', btn.dataset.nav === nav);
  }
  const view = routes[nav] || routes.log;
  mainInner.innerHTML = '';
  window.scrollTo(0, 0);
  try { await view(...args); }
  catch (err) { mainInner.appendChild(h('div', { class: 'empty' }, `Couldn't load: ${err.message}`)); }
}

function navigate(nav, ...args) {
  location.hash = '#/' + [nav, ...args].filter(x => x !== '').join('/');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const n = btn.dataset.nav;
    navigate(n, n === 'log' ? ymNow() : '');
  });
});
window.addEventListener('hashchange', route);

// ─── Detail pane open/close ─────────────────
function openDetail() {
  document.body.classList.add('has-detail');
  detail.setAttribute('aria-hidden', 'false');
  detailScroll.scrollTop = 0;
}
function closeDetail(silent = false) {
  document.body.classList.remove('has-detail');
  detail.setAttribute('aria-hidden', 'true');
  if (!silent && (location.hash.startsWith('#/page') || location.hash.startsWith('#/day'))) {
    history.replaceState(null, '', currentLeftHash || '#/log');
  }
  detailInner.innerHTML = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('open')) { closeLightbox(); return; }
    if (document.body.classList.contains('has-detail')) closeDetail();
  }
});

// ─── Lightbox ──────────────────────────────
const lb = document.getElementById('lightbox');
const lbImg = lb.querySelector('img');
function openLightbox(src, rotation = 0) {
  lbImg.src = src;
  lbImg.style.transform = `rotate(${rotation}deg)`;
  lb.classList.add('open');
  lb.classList.remove('zoomed');
}
function closeLightbox() { lb.classList.remove('open'); lb.classList.remove('zoomed'); lbImg.src = ''; }
lb.addEventListener('click', (e) => {
  if (e.target === lb || e.target.classList.contains('lb-close')) { closeLightbox(); return; }
  if (e.target === lbImg) {
    const zoomed = lb.classList.toggle('zoomed');
    lbImg.style.transform = (zoomed ? 'scale(1.8) ' : '') + `rotate(${lbImg.dataset.rotation || 0}deg)`;
  }
});

// ─── Editable helpers ──────────────────────
function editableField({ value, className = 'editable-text', placeholder = 'Click to edit…', multiline = true, onSave }) {
  const el = h(multiline ? 'div' : 'span', { class: className });
  const render = (v) => {
    el.classList.remove('editing');
    el.textContent = v || '';
    if (!v) { el.classList.add('faint'); el.textContent = placeholder; }
    else { el.classList.remove('faint'); }
  };
  render(value);
  el.addEventListener('click', () => {
    if (el.classList.contains('editing')) return;
    el.classList.add('editing');
    el.classList.remove('faint');
    const start = (el.textContent === placeholder) ? '' : (value || el.textContent || '');
    const input = multiline
      ? h('textarea', { class: 'input', rows: 3, value: start })
      : h('input', { class: 'input', value: start });
    el.replaceChildren(input);
    input.focus();
    input.select?.();
    const finish = async (commit) => {
      const next = input.value.trim();
      if (commit && next !== (value || '').trim()) {
        try { await onSave(next); value = next; render(next); toast('saved', 'ok'); }
        catch (err) { toast(err.message, 'err'); render(value); }
      } else { render(value); }
    };
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.preventDefault(); input.value = value || ''; finish(false); }
      if (e.key === 'Enter' && (!multiline || e.metaKey || e.ctrlKey)) { e.preventDefault(); finish(true); }
    });
  });
  return el;
}

function inlineInput({ value, onSave, placeholder = '—', mono = false, size = 6 }) {
  const cls = 'editable' + (mono ? ' mono' : '');
  const wrap = h('span', { class: cls, title: 'Click to edit' }, value || placeholder);
  wrap.addEventListener('click', () => {
    const input = h('input', { class: 'input' + (mono ? ' mono' : ''), value: value || '', style: { width: `${Math.max(size, (value || '').length + 2)}ch`, padding: '1px 5px', fontSize: '11.5px' } });
    wrap.replaceChildren(input);
    input.focus(); input.select();
    const finish = async (commit) => {
      const next = input.value.trim();
      if (commit && next !== (value || '')) {
        try { await onSave(next); value = next; wrap.textContent = next || placeholder; toast('saved', 'ok'); }
        catch (err) { toast(err.message, 'err'); wrap.textContent = value || placeholder; }
      } else { wrap.textContent = value || placeholder; }
    };
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') finish(false);
      if (e.key === 'Enter') finish(true);
    });
  });
  return wrap;
}

// ─── Typeahead ─────────────────────────────
function openTypeahead({ anchor, kinds = null, onPick, placeholder = 'Search…', allowCreate = false, createLabel = 'Create' }) {
  const rect = (anchor && anchor.getBoundingClientRect) ? anchor.getBoundingClientRect() : { left: 200, top: 200, bottom: 220 };
  const pop = h('div', { class: 'typeahead-pop' });
  const input = h('input', { class: 'input', placeholder });
  const list = h('div', { class: 'typeahead-list' });
  pop.append(input, list);
  document.body.appendChild(pop);
  // position relative to viewport (fixed)
  const top = Math.min(rect.bottom + 4, window.innerHeight - 400);
  const left = Math.min(rect.left, window.innerWidth - 360);
  Object.assign(pop.style, { top: `${top}px`, left: `${left}px` });
  input.focus();
  let active = 0;
  let rows = [];
  let timer = null;
  let lastQuery = '';
  const close = () => { pop.remove(); document.removeEventListener('mousedown', away); };
  const away = (e) => { if (!pop.contains(e.target) && e.target !== anchor) close(); };
  setTimeout(() => document.addEventListener('mousedown', away), 0);

  // Build the effective row list including an optional synthetic "+ create" row
  // when allowCreate is set and the typed label has no exact match.
  function effectiveRows() {
    const out = rows.slice();
    if (allowCreate && lastQuery.trim()) {
      const typed = lastQuery.trim();
      const exact = rows.some(r => (r.label || '').toLowerCase() === typed.toLowerCase());
      if (!exact) {
        out.push({ _create: true, label: typed, kind: (kinds && kinds[0]) || 'new' });
      }
    }
    return out;
  }

  async function query(q) {
    lastQuery = q || '';
    list.innerHTML = '';
    if (!q || q.length < 1) { rows = []; active = 0; renderList(); return; }
    const safe = q.replace(/['"*]/g, ' ').trim();
    try {
      const res = await api(`/api/index/search?q=${encodeURIComponent(safe)}`);
      const items = res.results || [];
      const filtered = kinds ? items.filter(r => kinds.includes(r.kind)) : items;
      rows = filtered.slice(0, 12);
      active = 0;
      renderList();
    } catch {}
  }
  function renderList() {
    list.innerHTML = '';
    const eff = effectiveRows();
    eff.forEach((r, i) => {
      const row = r._create
        ? h('div', { class: 'typeahead-row create' + (i === active ? ' active' : '') },
            h('span', null, `+ ${createLabel} "${r.label}"`),
            h('span', { class: 'kind' }, 'new'),
          )
        : h('div', { class: 'typeahead-row' + (i === active ? ' active' : '') },
            h('span', null, r.label),
            h('span', { class: 'kind' }, (r.kind || '').replace('_', ' ')),
          );
      row.addEventListener('click', () => { onPick(r); close(); });
      list.appendChild(row);
    });
    if (!eff.length) list.appendChild(h('div', { class: 'typeahead-row faint', style: { cursor: 'default' } }, 'No matches.'));
  }
  input.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => query(input.value), 140); });
  input.addEventListener('keydown', e => {
    const eff = effectiveRows();
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, eff.length - 1); renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); renderList(); }
    else if (e.key === 'Enter') { if (eff[active]) { onPick(eff[active]); close(); } }
  });
}

// ─── LOG ───────────────────────────────────
async function renderLog(ym) {
  const month = (ym && /^\d{4}-\d{2}$/.test(ym)) ? ym : ymNow();
  if (!ym || ym !== month) history.replaceState(null, '', `#/log/${month}`);

  mainInner.appendChild(h('div', { class: 'log-head' },
    h('h1', { class: 'surface-title' }, 'Log'),
    h('div', { class: 'log-nav' },
      h('button', { onclick: () => navigate('log', ymShift(month, -1)), title: 'Previous month' }, '←'),
      h('span', { class: 'log-month-label' }, monthLabel(month)),
      h('button', { onclick: () => navigate('log', ymShift(month, +1)), title: 'Next month' }, '→'),
      h('button', { onclick: () => navigate('log', ymNow()), class: 'mono', style: { marginLeft: '12px', fontSize: '11px', letterSpacing: '0.08em', textTransform: 'uppercase' } }, 'today'),
    ),
  ));

  const spine = h('div', { class: 'spine' });
  mainInner.appendChild(spine);
  const res = await api(`/api/logs/month/${month}`);
  const today = todayIso();
  for (const d of res.days) {
    const isToday = d.date === today;
    const wd = (d.weekday || '').toLowerCase();
    const isWeekend = wd === 'sat' || wd === 'sun';
    const text = d.summary || d.preview;
    const sumEl = text
      ? h('div', { class: 'spine-sum' + (d.preview_is_synthesized ? ' synth' : '') }, text)
      : h('div', { class: 'spine-sum empty-dot' }, '·');
    const row = h('div', { class: `spine-row${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}` },
      h('div', { class: 'spine-dom' }, String(d.dom)),
      h('div', { class: 'spine-wd' }, wd),
      sumEl,
      d.page_count > 0 ? h('div', { class: 'spine-pc' }, String(d.page_count)) : h('div'),
    );
    row.addEventListener('click', () => openDayByDate(d));
    spine.appendChild(row);
  }
}

async function openDayByDate(d) {

}

async function openDayDetail(id) {
  detailInner.innerHTML = '';
  detailInner.appendChild(h('div', { class: 'soft', style: { padding: '24px' } }, 'Loading…'));
  openDetail();

  const raw = await api(`/api/daily-logs/${id}`);
  const dl = raw.daily_log || raw;
  const date = dl.date;
  const ents = Array.isArray(raw.entities) ? raw.entities : [];
  const byKind = {
    person: ents.filter(e => e.kind === 'person'),
    topic: ents.filter(e => e.kind === 'topic'),
    scripture: ents.filter(e => e.kind === 'scripture'),
    book: ents.filter(e => e.kind === 'book'),
  };
  const collections = raw.collections || [];
  const pages = raw.pages || [];

  const groups = new Map();
  for (const p of pages) {
    const key = p.scan_path || `p:${p.id}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }

  detailInner.innerHTML = '';
  detailInner.append(
    h('div', { class: 'detail-head' },
      h('div', null,
        h('div', { class: 'title' }, dateLabel(date)),
        h('div', { class: 'sub' }, date),
      ),
      h('button', { class: 'icon-btn', onclick: () => closeDetail(), title: 'Close' }, '×'),
    ),
  );

  const body = h('div', { style: { padding: '20px 4px' } });

  body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '6px' } }, 'Summary'));
  body.appendChild(editableField({
    value: dl.summary || '',
    className: 'editable-text summary',
    placeholder: 'Write a short summary of the day…',
    onSave: async (v) => { await api(`/api/daily-logs/${id}`, 'PATCH', { summary: v }); },
  }));

  body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: '24px', marginBottom: '10px' } }, `Pages (${pages.length})`));
  if (!pages.length) {
    body.appendChild(h('div', { class: 'empty' }, 'No pages on this day.'));
  } else {
    for (const [scanPath, group] of groups) {
      const first = group[0];
      const isVoice = first.source_kind === 'voice_memo' || (first.scan_path || '').startsWith('voice:');
      const thumb = isVoice
        ? h('div', { class: 'thumb voice' }, '♪')
        : h('div', { class: 'thumb' }, h('img', { src: `/api/pages/${first.id}/scan`, alt: '', loading: 'lazy' }));
      const caps = group.map(p => p.summary || '').filter(Boolean).join(' · ') || '(no summary)';
      const meta = group.map(p => p.volume && p.page_number ? `v.${p.volume} p.${p.page_number}` : '').filter(Boolean).join(' · ');
      const tile = h('div', { class: 'day-tile' },
        thumb,
        h('div', { class: 'tile-body' },
          h('div', { class: 'captions' }, caps),
          h('div', { class: 'tile-meta' }, `${group.length} page${group.length > 1 ? 's' : ''}${isVoice ? ' · voice' : ''}${meta ? ' · ' + meta : ''}`),
        ),
      );
      tile.addEventListener('click', () => {
        detailBackContext = { label: dateLabel(date), action: () => openDayDetail(id) };
        openPageDetail(first.id);
      });
      body.appendChild(tile);
    }
  }

  const sectionHost = h('div', { class: 'links-section' });
  let hasLinks = false;
  const linkGroups = [
    [collections, 'Collections', 'collection', 'title'],
    [byKind.scripture, 'Scripture', 'scripture', 'label'],
    [byKind.person, 'People', 'person', 'label'],
    [byKind.topic, 'Topics', 'topic', 'label'],
    [byKind.book, 'Books', 'book', 'label'],
  ];
  for (const [items, label, kind, textKey] of linkGroups) {
    if (!items?.length) continue;
    hasLinks = true;
    const row = h('div', { class: 'links-group' },
      h('div', { class: 'links-group-lbl' }, label),
      h('div', { class: 'links-row' },
        ...items.map(it => makeChip(it, kind, textKey)),
      ),
    );
    sectionHost.appendChild(row);
  }
  if (hasLinks) body.appendChild(sectionHost);

  detailInner.appendChild(body);
}

function makeChip(it, kind, textKey = 'label') {
  const text = it[textKey] || it.label || it.title || it.canonical || it.date || '(untitled)';
  const chip = h('span', { class: `chip kind-${kind}` }, text);
  chip.addEventListener('click', (e) => {
    e.stopPropagation();
    if (kind === 'daily_log') navigate('day', it.id);
    else jumpToIndexNode(kind, it.id);
  });
  return chip;
}

// ─── PAGE detail ──────────────────────────
async function openPageDetail(id) {
  detailInner.innerHTML = '';
  detailInner.appendChild(h('div', { class: 'soft', style: { padding: '24px' } }, 'Loading…'));
  openDetail();
  const raw = await api(`/api/pages/${id}/detail`);
  renderPageDetail(unpackPageDetail(raw));
}

function unpackPageDetail(raw) {
  const p = { ...(raw.page || {}) };
  p._raw = raw;
  p.linked_people = raw.people || [];
  p.linked_topics = raw.topics || [];
  p.linked_collections = raw.collections || [];
  p.linked_scripture = raw.scripture || [];
  p.linked_books = raw.books || [];
  p.linked_artifacts = raw.artifacts || [];
  p.linked_references = raw.references || [];
  p.linked_daily_logs = raw.daily_logs || [];
  p.daily_log_date = raw.daily_logs?.[0]?.date || null;
  return p;
}

// back-navigation context for page detail
let detailBackContext = null; // { label, action }

function renderPageDetail(p) {
  detailInner.innerHTML = '';
  const title = p.volume && p.page_number ? `Vol ${p.volume} · p.${p.page_number}` : (p.source_kind === 'voice_memo' ? 'Voice memo' : 'Page');

  const headLeft = h('div', null,
    detailBackContext ? h('button', {
      class: 'btn ghost sm',
      style: { marginBottom: '6px', padding: '2px 0', fontSize: '11px', letterSpacing: '0.04em' },
      onclick: () => { const ctx = detailBackContext; detailBackContext = null; ctx.action(); },
    }, `← ${detailBackContext.label}`) : null,
    h('div', { class: 'title' }, title),
    h('div', { class: 'sub' }, p.captured_at ? new Date(p.captured_at).toLocaleString() : ''),
  );
  detailInner.append(
    h('div', { class: 'detail-head' },
      headLeft,
      h('button', { class: 'icon-btn', onclick: () => { detailBackContext = null; closeDetail(); }, title: 'Close' }, '×'),
    ),
  );

  const body = h('div', { style: { padding: '20px 4px' } });
  const isVoice = p.source_kind === 'voice_memo' || (p.scan_path || '').startsWith('voice:');

  if (isVoice) {
    if (p.summary) {
      body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '6px' } }, 'Summary'));
      body.appendChild(editableField({
        value: p.summary || '',
        className: 'editable-text summary',
        placeholder: 'Summary…',
        onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { summary: v }); },
      }));
    }
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: '20px', marginBottom: '6px' } }, 'Transcript'));
    const transcriptBox = h('div', { class: 'voice-frame soft' }, 'Loading transcript…');
    body.appendChild(transcriptBox);
    api(`/api/pages/${p.id}/transcript`).then(t => {
      const text = (t && (t.transcript || t.text)) || p.raw_ocr_text || '';
      transcriptBox.classList.remove('soft');
      transcriptBox.textContent = text || '(no transcript available)';
    }).catch(() => {
      const text = p.raw_ocr_text || '';
      transcriptBox.classList.remove('soft');
      transcriptBox.textContent = text || '(no transcript available)';
    });
  } else {
    const rotation = p.rotation || 0;
    const img = h('img', {
      src: `/api/pages/${p.id}/scan`,
      alt: '',
      style: { transform: `rotate(${rotation}deg)`, transformOrigin: 'center center' },
    });
    img.dataset.rotation = rotation;
    img.addEventListener('click', () => openLightbox(`/api/pages/${p.id}/scan`, p.rotation || 0));
    const frame = h('div', { class: 'scan-frame' },
      img,
      h('button', {
        class: 'rot-btn',
        onclick: async (e) => {
          e.stopPropagation();
          try {
            const res = await api(`/api/pages/${p.id}/rotate?dir=cw`, 'POST');
            const newRot = (res && typeof res.rotation === 'number') ? res.rotation : ((rotation + 90) % 360);
            p.rotation = newRot;
            img.style.transform = `rotate(${newRot}deg)`;
            img.dataset.rotation = newRot;
          } catch (e) { toast(e.message, 'err'); }
        },
      }, '⟳ rotate'),
    );
    body.appendChild(frame);
  }

  const metaRow = h('div', { class: 'meta-row' });
  const isNotebookScan = !isVoice && p.source_kind !== 'artifact' && p.source_kind !== 'reference';
  if (isNotebookScan) {
    metaRow.append(
      h('span', null, h('span', { class: 'k' }, 'vol'),
        inlineInput({
          value: p.volume || '', mono: true,
          onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { volume: v || null }); p.volume = v || null; },
        }),
      ),
      h('span', null, h('span', { class: 'k' }, 'p.'),
        inlineInput({
          value: p.page_number ? String(p.page_number) : '', mono: true,
          onSave: async (v) => { const n = v ? Number(v) : null; await api(`/api/pages/${p.id}`, 'PATCH', { page_number: n }); p.page_number = n; },
        }),
      ),
    );
  }
  if (p.daily_log_date) {
    const dayChip = h('span', null, h('span', { class: 'k' }, 'day'),
      h('span', { class: 'editable', style: { cursor: 'pointer' }, onclick: () => { if (p.linked_daily_logs?.[0]) navigate('day', p.linked_daily_logs[0].id); } }, p.daily_log_date),
    );
    metaRow.appendChild(dayChip);
  }
  if (metaRow.children.length) body.appendChild(metaRow);

  if (!isVoice) {
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: '6px', marginBottom: '4px' } }, 'Summary'));
    body.appendChild(editableField({
      value: p.summary || '',
      className: 'editable-text summary',
      placeholder: 'Summary…',
      onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { summary: v }); p.summary = v; },
    }));
  }

  const linkGroups = [
    ['linked_collections', 'Collections', 'collection', 'title'],
    ['linked_scripture', 'Scripture', 'scripture', 'label'],
    ['linked_people', 'People', 'person', 'label'],
    ['linked_topics', 'Topics', 'topic', 'label'],
    ['linked_books', 'Books', 'book', 'title'],
    ['linked_artifacts', 'Artifacts', 'artifact', 'title'],
    ['linked_references', 'References', 'reference', 'title'],
  ];
  const section = h('div', { class: 'links-section' });
  section.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, 'Linked'));

  let hasAny = false;
  for (const [key, label, chipKind, textKey] of linkGroups) {
    const items = p[key] || [];
    if (!items.length) continue;
    hasAny = true;
    const row = h('div', { class: 'links-group' });
    row.appendChild(h('div', { class: 'links-group-lbl' }, label));
    const chipRow = h('div', { class: 'links-row' });
    for (const it of items) {
      const chip = makeChip(it, chipKind, textKey);
      if (it.link_id) {
        const x = h('button', { class: 'x', title: 'Remove link' }, '×');
        x.addEventListener('click', async (e) => {
          e.stopPropagation();
          try { await api(`/api/links/${it.link_id}`, 'DELETE'); chip.remove(); toast('unlinked', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        chip.appendChild(x);
      }
      chipRow.appendChild(chip);
    }
    row.appendChild(chipRow);
    section.appendChild(row);
  }
  if (!hasAny) section.appendChild(h('div', { class: 'soft', style: { fontSize: '12.5px', marginLeft: '80px' } }, 'No links yet.'));

  const addBtn = h('button', { class: 'btn sm', style: { marginTop: '12px', marginLeft: '92px' } }, '+ link');
  addBtn.addEventListener('click', () => {
    openTypeahead({
      anchor: addBtn,
      onPick: async (r) => {
        const toTypeMap = { person: 'person', topic: 'topic', collection: 'collection', book: 'book', scripture: 'scripture', artifact: 'artifact', reference: 'reference' };
        const to_type = toTypeMap[r.kind];
        if (!to_type) { toast(`Can't link to ${r.kind}`, 'err'); return; }
        try {
          await api('/api/links', 'POST', { from_type: 'page', from_id: p.id, to_type, to_id: r.id });
          toast('linked', 'ok');
          const fresh = await api(`/api/pages/${p.id}/detail`);
          renderPageDetail(unpackPageDetail(fresh));
        } catch (err) { toast(err.message, 'err'); }
      },
    });
  });
  section.appendChild(addBtn);
  body.appendChild(section);
  detailInner.appendChild(body);
}
