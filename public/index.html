    const out = rows.slice();
    if (allowCreate && lastQuery.trim()) {
      const typed = lastQuery.trim();
      const exact = rows.some(r => (r.label || '').toLowerCase() === typed.toLowerCase());
      if (!exact) {
        out.push({ _create: true, label: typed, kind: (kinds && kinds[0]) || 'new' });
      }
    }
    return out;
  }

  async function query(q) {
    lastQuery = q || '';
    list.innerHTML = '';
    if (!q || q.length < 1) { rows = []; active = 0; renderList(); return; }
    const safe = q.replace(/['"*]/g, ' ').trim();
    try {
      const res = await api(`/api/index/search?q=${encodeURIComponent(safe)}`);
      const items = res.results || [];
      const filtered = kinds ? items.filter(r => kinds.includes(r.kind)) : items;
      rows = filtered.slice(0, 12);
      active = 0;
      renderList();
    } catch {}
  }
  function renderList() {
    list.innerHTML = '';
    const eff = effectiveRows();
    eff.forEach((r, i) => {
      const row = r._create
        ? h('div', { class: 'typeahead-row create' + (i === active ? ' active' : '') },
            h('span', null, `+ ${createLabel} "${r.label}"`),
            h('span', { class: 'kind' }, 'new'),
          )
        : h('div', { class: 'typeahead-row' + (i === active ? ' active' : '') },
            h('span', null, r.label),
            h('span', { class: 'kind' }, (r.kind || '').replace('_', ' ')),
          );
      row.addEventListener('click', () => { onPick(r); close(); });
      list.appendChild(row);
    });
    if (!eff.length) list.appendChild(h('div', { class: 'typeahead-row faint', style: { cursor: 'default' } }, 'No matches.'));
  }
  input.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => query(input.value), 140); });
  input.addEventListener('keydown', e => {
    const eff = effectiveRows();
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, eff.length - 1); renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); renderList(); }
    else if (e.key === 'Enter') { if (eff[active]) { onPick(eff[active]); close(); } }
  });
}

// ─── LOG ───────────────────────────────────
async function renderLog(ym) {
  const month = (ym && /^\d{4}-\d{2}$/.test(ym)) ? ym : ymNow();
  if (!ym || ym !== month) history.replaceState(null, '', `#/log/${month}`);

  mainInner.appendChild(h('div', { class: 'log-head' },
    h('h1', { class: 'surface-title' }, 'Log'),
    h('div', { class: 'log-nav' },
      h('button', { onclick: () => navigate('log', ymShift(month, -1)), title: 'Previous month' }, '←'),
      h('span', { class: 'log-month-label' }, monthLabel(month)),
      h('button', { onclick: () => navigate('log', ymShift(month, +1)), title: 'Next month' }, '→'),
      h('button', { onclick: () => navigate('log', ymNow()), class: 'mono', style: { marginLeft: '12px', fontSize: '11px', letterSpacing: '0.08em', textTransform: 'uppercase' } }, 'today'),
    ),
  ));

  const spine = h('div', { class: 'spine' });
  const skeleton = skSpineRows(22);
  mainInner.appendChild(skeleton);
  let res;
  try {
    res = await api(`/api/logs/month/${month}`);
  } catch (err) {
    skeleton.remove();
    mainInner.appendChild(emptyState({ title: "Couldn't load the log.", sub: err.message }));
    return;
  }
  skeleton.remove();
  spine.classList.add('stagger-in');
  mainInner.appendChild(spine);
  const today = todayIso();
  for (const d of res.days) {
    const isToday = d.date === today;
    const wd = (d.weekday || '').toLowerCase();
    const isWeekend = wd === 'sat' || wd === 'sun';
    const text = d.summary || d.preview;
    const sumEl = text
      ? h('div', { class: 'spine-sum' + (d.preview_is_synthesized ? ' synth' : '') }, text)
      : h('div', { class: 'spine-sum empty-dot' }, '·');
    const row = h('div', { class: `spine-row${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}` },
      h('div', { class: 'spine-dom' }, String(d.dom)),
      h('div', { class: 'spine-wd' }, wd),
      sumEl,
      d.page_count > 0 ? h('div', { class: 'spine-pc' }, String(d.page_count)) : h('div'),
    );
    // Prefetch the day on hover so the detail pane opens instantly.
    if (d.daily_log_id) {
      let prefetched = false;
      const prefetch = () => {
        if (prefetched) return; prefetched = true;
        api(`/api/daily-logs/${d.daily_log_id}`).catch(() => {});
      };
      row.addEventListener('mouseenter', prefetch);
      row.addEventListener('touchstart', prefetch, { passive: true });
    }
    row.addEventListener('click', () => openDayByDate(d));
    spine.appendChild(row);
  }
}

async function openDayByDate(d) {
  if (d.daily_log_id) navigate('day', d.daily_log_id);
  else openBlankDay(d.date);
}

function openBlankDay(date) {

async function openDayDetail(id, { skipRedirect = false } = {}) {
  const alreadyOpen = document.body.classList.contains('has-detail');
  if (!alreadyOpen) {
    detailInner.innerHTML = '';
    // Skeleton: header + a few tiles so the user sees structure immediately.
    const sk = h('div', null,
      h('div', { class: 'detail-head' },
        h('div', null,
          h('div', { class: 'sk sk-text', style: { width: '180px', height: '18px' } }),
          h('div', { class: 'sk sk-text', style: { width: '100px', height: '10px', marginTop: '6px' } }),
        ),
      ),
      h('div', { style: { padding: '18px 4px' } }, skDayTiles(3)),
    );
    detailInner.appendChild(sk);
  }
  openDetail();

  let raw;
  try { raw = await api(`/api/daily-logs/${id}`); }
  catch (err) {
    swapDetailPane(() => {
      detailInner.innerHTML = '';
      detailInner.appendChild(emptyState({ title: "Couldn't load this day.", sub: err.message }));
    });
    return;
  }
  const dl = raw.daily_log || raw;
  const date = dl.date;
  const ents = Array.isArray(raw.entities) ? raw.entities : [];
  const byKind = {
    person: ents.filter(e => e.kind === 'person'),
    topic: ents.filter(e => e.kind === 'topic'),
    scripture: ents.filter(e => e.kind === 'scripture'),
    book: ents.filter(e => e.kind === 'book'),
  };
  const collections = raw.collections || [];
  const pages = raw.pages || [];

  const groups = new Map();
  for (const p of pages) {
    const key = p.scan_path || `p:${p.id}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }

  if (groups.size === 1 && !skipRedirect) {
    const first = groups.values().next().value[0];
    detailBackContext = { label: dateLabel(date), action: () => openDayDetail(id, { skipRedirect: true }) };
    openPageDetail(first.id);
    return;
  }

  // Build new content off-tree so the skeleton→real swap is atomic.
  const newHead = h('div', { class: 'detail-head' },
    h('div', null,
      h('div', { class: 'title' }, dateLabel(date)),
      h('div', { class: 'sub' }, date),
    ),
    h('button', { class: 'icon-btn', onclick: () => closeDetail(), title: 'Close' }, '×'),
  );

  const body = h('div', { style: { padding: '20px 4px' } });

  body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '6px' } }, 'Summary'));
  body.appendChild(editableField({
    value: dl.summary || '',
    className: 'editable-text summary',
    placeholder: 'Write a short summary of the day…',
    onSave: async (v) => { await api(`/api/daily-logs/${id}`, 'PATCH', { summary: v }); },
  }));

  body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: '24px', marginBottom: '10px' } }, `Pages (${pages.length})`));
  const tilesHost = h('div');
  body.appendChild(tilesHost);
  if (!pages.length) {
    tilesHost.appendChild(emptyState({ title: 'No pages on this day.' }));
  } else {
    let _tileIdx = 0;
    for (const [scanPath, group] of groups) {
      const first = group[0];
      const isVoice = first.source_kind === 'voice_memo' || (first.scan_path || '').startsWith('voice:');
      const isMarkdown = first.source_kind === 'markdown' || (first.scan_path || '').startsWith('markdown:');
      // First few tiles eager-load their thumbnails so they're painted by the
      // time the skeleton swap completes — no image pop-in on common-case lists.
      const imgLoading = _tileIdx++ < 4 ? 'eager' : 'lazy';
      const thumb = isVoice
        ? h('div', { class: 'thumb voice' }, '♪')
        : isMarkdown
          ? h('div', { class: 'thumb md' }, '{ }')
          : h('div', { class: 'thumb' }, h('img', { src: `/api/pages/${first.id}/scan`, alt: '', loading: imgLoading, decoding: 'async', fetchpriority: imgLoading === 'eager' ? 'high' : 'auto' }));
      const caps = group.map(p => p.summary || '').filter(Boolean).join(' · ') || '(no summary)';
      const meta = group.map(p => p.volume && p.page_number ? `v.${p.volume} p.${p.page_number}` : '').filter(Boolean).join(' · ');
      const tag = isVoice ? ' · voice' : (isMarkdown ? ' · markdown' : '');
      const delBtn = h('button', { class: 'tile-del-btn', title: 'Delete' }, '×');
      const tile = h('div', { class: 'day-tile' },
        thumb,
        h('div', { class: 'tile-body' },
          h('div', { class: 'captions' }, caps),
          h('div', { class: 'tile-meta' }, `${group.length} page${group.length > 1 ? 's' : ''}${tag}${meta ? ' · ' + meta : ''}`),
        ),
        delBtn,
      );
      delBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm('Delete this page? It will be hidden but not permanently removed.')) return;
        try {
          await Promise.all(group.map(p => api(`/api/pages/${p.id}`, 'DELETE')));
          tile.remove();
        } catch (err) { toast(err.message, 'err'); }
      });
      // Prefetch on hover/touchstart so the page-detail API is warm when
      // the user clicks — the zoom-in feels instant because the cache is
      // already populated. api() dedupes so the actual click won't refetch.
      let prefetched = false;
      const prefetch = () => {
        if (prefetched) return; prefetched = true;
        api(`/api/pages/${first.id}/detail`).catch(() => {});
      };
      tile.addEventListener('mouseenter', prefetch);
      tile.addEventListener('touchstart', prefetch, { passive: true });
      tile.addEventListener('click', () => {
        detailBackContext = { label: dateLabel(date), action: () => openDayDetail(id) };
        openPageDetail(first.id);
      });
      tilesHost.appendChild(tile);
    }
  }

  const sectionHost = h('div', { class: 'links-section' });
  let hasLinks = false;
  const linkGroups = [
    [collections, 'Collections', 'collection', 'title'],
    [byKind.scripture, 'Scripture', 'scripture', 'label'],
    [byKind.person, 'People', 'person', 'label'],
    [byKind.topic, 'Topics', 'topic', 'label'],
    [byKind.book, 'Books', 'book', 'label'],
  ];
  for (const [items, label, kind, textKey] of linkGroups) {
    if (!items?.length) continue;
    hasLinks = true;
    const row = h('div', { class: 'links-group' },
      h('div', { class: 'links-group-lbl' }, label),
      h('div', { class: 'links-row' },
        ...items.map(it => makeChip(it, kind, textKey)),
      ),
    );
    sectionHost.appendChild(row);
  }
  if (hasLinks) body.appendChild(sectionHost);

  // Atomic swap: skeleton out, real content in, as a single View Transition.
  // Keeps the pane from double-animating (fade skeleton out while new content
  // staggers in). Falls back to an instant replace on Firefox etc.
  swapDetailPane(() => {
    detailInner.innerHTML = '';
    detailInner.append(newHead, body);
  });
}

function makeChip(it, kind, textKey = 'label') {
  const text = it[textKey] || it.label || it.title || it.canonical || it.date || '(untitled)';
  const chip = h('span', { class: `chip kind-${kind}` }, text);
  chip.addEventListener('click', (e) => {
    e.stopPropagation();
    if (kind === 'daily_log') navigate('day', it.id);
    else jumpToIndexNode(kind, it.id);
  });
  return chip;
}

// Swap the detail pane content from skeleton to real content with a native
// cross-fade via the View Transitions API. The skeleton is already visible;
// the browser captures it, runs fn() to swap in real content, then fades
// between the two snapshots. Without VT, the swap is instant (feels fast
// but abrupt on Firefox). Prefer this over manually stacking cascade +
// stagger-in animations on skeleton-to-real swaps — those overlap and feel
// jerky. VT cross-fade is one smooth motion.
function swapDetailPane(fn) {
  if (document.startViewTransition) {
    try { document.startViewTransition(fn); return; } catch {}
  }
  fn();
}

// ─── PAGE detail ──────────────────────────
async function openPageDetail(id) {
  const alreadyOpen = document.body.classList.contains('has-detail');
  if (!alreadyOpen) {
    detailInner.innerHTML = '';
    detailInner.appendChild(skPageDetail());
  }
  openDetail();
  try {
    const raw = await api(`/api/pages/${id}/detail`);
    swapDetailPane(() => renderPageDetail(unpackPageDetail(raw)));
  } catch (err) {
    swapDetailPane(() => {
      detailInner.innerHTML = '';
      detailInner.appendChild(emptyState({ title: "Couldn't load this page.", sub: err.message }));
    });
  }
}

function unpackPageDetail(raw) {
  const p = { ...(raw.page || {}) };
  p._raw = raw;
  p.linked_people = raw.people || [];
  p.linked_topics = raw.topics || [];
  p.linked_collections = raw.collections || [];
  p.linked_scripture = raw.scripture || [];
  p.linked_books = raw.books || [];
  p.linked_artifacts = raw.artifacts || [];
  p.linked_references = raw.references || [];
  p.linked_daily_logs = raw.daily_logs || [];
  p.daily_log_date = raw.daily_logs?.[0]?.date || null;
  return p;
}

// back-navigation context for page detail
let detailBackContext = null; // { label, action }

function renderPageDetail(p) {
  detailInner.innerHTML = '';
  // Cascade inner blocks in so the scan, summary, and links arrive in sequence.
  detailInner.classList.add('cascade');
  setTimeout(() => detailInner.classList.remove('cascade'), 600);
  const _isVoice = p.source_kind === 'voice_memo' || (p.scan_path || '').startsWith('voice:');
  const _isMarkdown = p.source_kind === 'markdown' || (p.scan_path || '').startsWith('markdown:');
  const isNotebookScan = !_isVoice && !_isMarkdown && p.source_kind !== 'artifact' && p.source_kind !== 'reference';

  // Title: for notebook scans, vol + page are inline-editable right in the
  // heading — this is the single source of truth for that metadata (no
  // duplicated editable row below). For voice / markdown, a static label.
  const titleEl = h('div', { class: 'title' });
  if (isNotebookScan) {
    titleEl.append(
      'Vol ',
      inlineInput({
        value: p.volume || '', mono: false, size: 2, placeholder: '—',
        onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { volume: v || null }); p.volume = v || null; },
      }),
      ' · p.',
      inlineInput({
        value: p.page_number ? String(p.page_number) : '', mono: false, size: 3, placeholder: '—',
        onSave: async (v) => { const n = v ? Number(v) : null; await api(`/api/pages/${p.id}`, 'PATCH', { page_number: n }); p.page_number = n; },
      }),
    );
  } else {
    titleEl.textContent = _isVoice ? 'Voice memo' : (_isMarkdown ? 'Markdown note' : 'Page');
  }

  // Sub line: timestamp + day. The day is a dotted-underlined pill that
  // opens the day when clicked AND exposes an edit pencil on hover so the
  // user can refile the page to a different date (common after ingest
  // misclassifies a backdated page). Saves via /api/pages/:id/refile.
  const subBits = [];
  if (p.captured_at) subBits.push(h('span', null, new Date(p.captured_at).toLocaleString()));
  subBits.push(h('span', { class: 'sub-sep' }, '·'));
  const dayHost = h('span', { class: 'sub-day' });
  subBits.push(dayHost);
  const renderDayHost = () => {
    dayHost.innerHTML = '';
    if (p.daily_log_date) {
      const link = h('a', {
        class: 'sub-link',
        href: '#',
        onclick: (e) => {
          e.preventDefault();
          const dl = p.linked_daily_logs?.[0];
          if (dl) navigate('day', dl.id);
        },
      }, p.daily_log_date);
      const edit = h('button', {
        class: 'sub-edit-btn',
        title: 'Change day (refile)',
        onclick: (e) => { e.stopPropagation(); startDayEdit(); },
      }, '✎');
      dayHost.append(link, edit);
    } else {
      const addBtn = h('button', {
        class: 'sub-link sub-link-add',
        title: 'File this page to a day',
        onclick: (e) => { e.preventDefault(); startDayEdit(); },
      }, '+ add day');
      dayHost.append(addBtn);
    }
  };
  const startDayEdit = () => {
    dayHost.innerHTML = '';
    const input = h('input', {
      type: 'date',
      class: 'input sub-date-input',
      value: p.daily_log_date || todayIso(),
    });
    const clear = h('button', { class: 'sub-edit-btn', title: 'Clear day' }, '×');
    dayHost.append(input, clear);
    input.focus();
    let done = false;
    const finish = async (commit, clearDay = false) => {
      if (done) return; done = true;
      if (!commit) { renderDayHost(); return; }
      const nextDate = clearDay ? null : input.value.trim();
      if (nextDate === (p.daily_log_date || null)) { renderDayHost(); return; }
      try {
        if (nextDate) {
          const res = await api(`/api/pages/${p.id}/refile`, 'POST', { action: 'set-daily-log', date: nextDate });
          p.daily_log_date = nextDate;
          p.linked_daily_logs = res?.daily_log ? [res.daily_log] : [];
        } else {
          await api(`/api/pages/${p.id}/refile`, 'POST', { action: 'clear-daily-log' });
          p.daily_log_date = null;
          p.linked_daily_logs = [];
        }
        toast('refiled', 'ok');
      } catch (err) {
        toast(err.message, 'err');
      }
      renderDayHost();
    };
    clear.addEventListener('click', (e) => { e.stopPropagation(); finish(true, true); });
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { done = false; finish(true); }
      if (e.key === 'Escape') { done = false; finish(false); }
    });
  };
  renderDayHost();
  const subEl = h('div', { class: 'sub' }, ...subBits);

  const headLeft = h('div', null,
    detailBackContext ? h('button', {
      class: 'btn ghost sm',
      style: { marginBottom: '6px', padding: '2px 0', fontSize: '11px', letterSpacing: '0.04em' },
      onclick: () => { const ctx = detailBackContext; detailBackContext = null; ctx.action(); },
    }, `← ${detailBackContext.label}`) : null,
    titleEl,
    subEl,
  );
  const deletePage = async () => {
    if (!confirm('Delete this page? It will be hidden but not permanently removed.')) return;
    try {
      await api(`/api/pages/${p.id}`, 'DELETE');
      const ctx = detailBackContext;
      detailBackContext = null;
      closeDetail();
      if (ctx) ctx.action();
    } catch (err) { toast(err.message, 'err'); }
  };
  detailInner.append(
    h('div', { class: 'detail-head' },
      headLeft,
      h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
        h('button', { class: 'btn ghost sm', onclick: deletePage, title: 'Delete page' }, 'Delete'),
        h('button', { class: 'icon-btn', onclick: () => { detailBackContext = null; closeDetail(); }, title: 'Close' }, '×'),
      ),
    ),
  );

  const body = h('div', { style: { padding: '20px 4px' } });
  const isVoice = _isVoice;
  const isMarkdown = _isMarkdown;

  if (isVoice) {
    if (p.summary) {
      body.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '6px' } }, 'Summary'));
      body.appendChild(editableField({
        value: p.summary || '',
        className: 'editable-text summary',
        placeholder: 'Summary…',
        onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { summary: v }); },
      }));
    }
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: '20px', marginBottom: '6px' } }, 'Transcript'));
    const transcriptBox = h('div', { class: 'voice-frame soft' }, 'Loading transcript…');
    body.appendChild(transcriptBox);
    api(`/api/pages/${p.id}/transcript`).then(t => {
      const text = (t && (t.transcript || t.text)) || p.raw_ocr_text || '';
      transcriptBox.classList.remove('soft');
      transcriptBox.textContent = text || '(no transcript available)';
    }).catch(() => {
      const text = p.raw_ocr_text || '';
      transcriptBox.classList.remove('soft');
      transcriptBox.textContent = text || '(no transcript available)';
    });
  } else if (isMarkdown) {
    // Rendered markdown (mono/retro look). Source is shown read-only — recreate
    // the note if you want to change it.
    const frame = h('div', { class: 'md-frame' }, 'Loading…');
    body.appendChild(frame);
    const renderInto = (raw) => {
      frame.innerHTML = renderMarkdown(raw || '') || '<p class="soft">(empty note)</p>';
    };
    const cached = p.raw_ocr_text || '';
    if (cached) renderInto(cached);
    api(`/api/pages/${p.id}/transcript`).then(t => {
      const text = (t && (t.transcript || t.text)) || cached;
      renderInto(text);
    }).catch(() => { if (!cached) renderInto(''); });
  } else {
    const rotation = p.rotation || 0;
    const img = h('img', {
      src: `/api/pages/${p.id}/scan`,
      alt: '',
      decoding: 'async',
      dataset: { loaded: '0' },
      style: { transform: `rotate(${rotation}deg)`, transformOrigin: 'center center' },
    });
    img.dataset.rotation = rotation;
    img.addEventListener('load', () => { img.dataset.loaded = '1'; });
    img.addEventListener('click', () => openLightbox(`/api/pages/${p.id}/scan`, p.rotation || 0));
    const frame = h('div', { class: 'scan-frame' },
      img,
      h('button', {
        class: 'rot-btn',
        onclick: async (e) => {
          e.stopPropagation();
          try {
            const res = await api(`/api/pages/${p.id}/rotate?dir=cw`, 'POST');
            const newRot = (res && typeof res.rotation === 'number') ? res.rotation : ((rotation + 90) % 360);
            p.rotation = newRot;
            img.style.transform = `rotate(${newRot}deg)`;
            img.dataset.rotation = newRot;
          } catch (e) { toast(e.message, 'err'); }
        },
      }, '⟳ rotate'),
    );
    body.appendChild(frame);
  }

  // Meta-row used to mirror the vol/page from the title and show the day
  // link. Both are now in the detail-head (editable title + sub line), so
  // this row is only rendered if we have other meta to surface — empty for
  // now, leave the hook in case future data needs a home here.

  if (!isVoice) {
    body.appendChild(h('div', { class: 'lbl-mono', style: { marginTop: isMarkdown ? '20px' : '6px', marginBottom: '4px' } }, 'Summary'));
    body.appendChild(editableField({
      value: p.summary || '',
      className: 'editable-text summary',
      placeholder: 'Summary…',
      onSave: async (v) => { await api(`/api/pages/${p.id}`, 'PATCH', { summary: v }); p.summary = v; },
    }));
  }

  const linkGroups = [
    ['linked_collections', 'Collections', 'collection', 'title'],
    ['linked_scripture', 'Scripture', 'scripture', 'label'],
    ['linked_people', 'People', 'person', 'label'],
    ['linked_topics', 'Topics', 'topic', 'label'],
    ['linked_books', 'Books', 'book', 'title'],
    ['linked_artifacts', 'Artifacts', 'artifact', 'title'],
    ['linked_references', 'References', 'reference', 'title'],
  ];
  const section = h('div', { class: 'links-section' });
  section.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, 'Linked'));

  let hasAny = false;
  for (const [key, label, chipKind, textKey] of linkGroups) {
    const items = p[key] || [];
    if (!items.length) continue;
    hasAny = true;
    const row = h('div', { class: 'links-group' });
    row.appendChild(h('div', { class: 'links-group-lbl' }, label));
    const chipRow = h('div', { class: 'links-row' });
    for (const it of items) {
      const chip = makeChip(it, chipKind, textKey);
      if (it.link_id) {
        const x = h('button', { class: 'x', title: 'Remove link' }, '×');
        x.addEventListener('click', async (e) => {
          e.stopPropagation();
          try { await api(`/api/links/${it.link_id}`, 'DELETE'); chip.remove(); toast('unlinked', 'ok'); }
          catch (err) { toast(err.message, 'err'); }
        });
        chip.appendChild(x);
      }
      chipRow.appendChild(chip);
    }
    row.appendChild(chipRow);
    section.appendChild(row);
  }
  if (!hasAny) section.appendChild(h('div', { class: 'soft', style: { fontSize: '12.5px', marginLeft: '80px' } }, 'No links yet.'));

  const addBtn = h('button', { class: 'btn sm', style: { marginTop: '12px', marginLeft: '92px' } }, '+ link');
  addBtn.addEventListener('click', () => {
    openTypeahead({
      anchor: addBtn,
      onPick: async (r) => {
        const toTypeMap = { person: 'person', topic: 'topic', collection: 'collection', book: 'book', scripture: 'scripture', artifact: 'artifact', reference: 'reference' };
        const to_type = toTypeMap[r.kind];
        if (!to_type) { toast(`Can't link to ${r.kind}`, 'err'); return; }
        try {
          await api('/api/links', 'POST', { from_type: 'page', from_id: p.id, to_type, to_id: r.id });
          toast('linked', 'ok');
          const fresh = await api(`/api/pages/${p.id}/detail`);
          renderPageDetail(unpackPageDetail(fresh));
        } catch (err) { toast(err.message, 'err'); }
      },
    });
  });
  section.appendChild(addBtn);
  body.appendChild(section);

  // ── Scribe promotion ──────────────────────────────────────────────────────
  // Create a versioned Scribe doc from this gloss page. Each click creates a
  // new version (v1, v2, …) — existing versions are listed with links.
  body.appendChild(renderScribePromotion(p));

  detailInner.appendChild(body);
}

// Render the "→ New Scribe version" button + the list of existing versions
// for this page, populated from p._raw.scribe_versions (surfaced by the
// /api/pages/:id/detail response).
function renderScribePromotion(p) {
  const section = h('div', { class: 'links-section', style: { marginTop: '22px' } });
  section.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, 'Scribe'));

  const versions = (p._raw && Array.isArray(p._raw.scribe_versions)) ? p._raw.scribe_versions.slice() : [];
  const list = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '10px' } });

  const renderVersions = (scribeBase) => {
    list.innerHTML = '';
    if (!versions.length) {
      list.appendChild(h('span', { class: 'soft', style: { fontSize: '12.5px' } }, 'No versions yet.'));
      return;
    }
    versions.forEach((v, i) => {
      const label = `v${i + 1}`;
      const href = scribeBase ? `${scribeBase.replace(/\/$/, '')}/d/${v.doc_id}` : null;
      const chip = href
        ? h('a', { class: 'chip', href, target: '_blank', rel: 'noopener', title: v.title || '' }, label)
        : h('span', { class: 'chip', title: v.title || '' }, label);
      list.appendChild(chip);
    });
  };
  renderVersions(null);

  const promoteBtn = h('button', { class: 'btn' }, '→ New Scribe version');
  const status = h('span', { class: 'mono soft', style: { marginLeft: '10px', fontSize: '12px' } }, '');
  promoteBtn.addEventListener('click', async () => {
    promoteBtn.disabled = true;
    status.textContent = 'Promoting…';
    try {
      const res = await api('/api/promote-to-scribe', 'POST', { page_id: p.id });
      versions.length = 0;
      (res.scribe_versions || []).forEach(v => versions.push(v));
      // Re-render chips now that we know the scribe base (it's embedded in scribe_url).
      const base = res.scribe_url ? res.scribe_url.replace(/\/d\/[^/]+$/, '') : null;
      renderVersions(base);
      status.textContent = `Opened ${res.title || 'new version'}`;
      if (res.scribe_url) window.open(res.scribe_url, '_blank', 'noopener');
      toast('Promoted to Scribe', 'ok');
    } catch (err) {
      status.textContent = '';
      toast(err.message, 'err');
    } finally {
      promoteBtn.disabled = false;
    }
  });

  // If suite-config exposes scribe_url, pre-wire the existing version chips so
  // they're clickable without requiring the user to trigger a promotion first.
  api('/api/suite-config').then(cfg => {
    if (cfg && cfg.scribe_url) renderVersions(cfg.scribe_url);
  }).catch(() => {});

  section.append(list, h('div', { style: { display: 'flex', alignItems: 'center', flexWrap: 'wrap' } }, promoteBtn, status));
  return section;
}

// ─── CAPTURE ──────────────────────────────
let backlogState = { queue: [], idx: 0, container: null };

async function renderCapture() {
  let googleOpen = localStorage.getItem('gloss.cap.googleOpen') === 'true';

  const googleToggleBtn = h('button', { class: 'btn ghost', style: { fontSize: '12px', padding: '3px 9px', flexShrink: 0 } },
    googleOpen ? '⚙ Google ▲' : '⚙ Google');
  // Standalone page: opens in a new tab so the user can keep the notebook
  // they're working from in the main tab and the briefing in a second tab
  // for printing.
  const briefingBtn = h('a', {
    href: '/research.html', target: '_blank', rel: 'noopener',
    class: 'btn ghost', style: { fontSize: '12px', padding: '3px 9px', flexShrink: 0, marginRight: '8px', textDecoration: 'none' },
    title: 'Pull a research briefing from gloss + comms + black',
  }, '✎ Briefing');
  mainInner.appendChild(h('div', { class: 'surface-head', style: { alignItems: 'flex-start' } },
    h('div', null,
      h('h1', { class: 'surface-title' }, 'Capture'),

    ),
    h('div', { style: { display: 'flex', alignItems: 'center' } }, briefingBtn, googleToggleBtn),
  ));

  const typeLabels = ['Notebook', 'Artifact', 'Reference'];
  const typeBar    = h('div', { class: 'seg cap-type-bar', style: { marginBottom: '14px' } });
  const inputZone  = h('div', { class: 'cap-zone' });
  const streamHost = h('div');

  typeLabels.forEach(label => {
    const btn = h('button', { class: label === 'Notebook' ? 'active' : '' }, label);
    btn.addEventListener('click', () => switchType(label));
    typeBar.appendChild(btn);
  });

  function switchType(t) {
    typeBar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.textContent === t));
    inputZone.innerHTML = '';
    if (t === 'Notebook') renderNotebookPanel();
    else renderFilePanel(t.toLowerCase());
  }

  function renderNotebookPanel() {
    const volumeIn  = h('input', { class: 'input', placeholder: 'e.g. D or 4', style: { maxWidth: '120px' } });
    // No `capture="environment"`: on Android Chrome it forces the camera and
    // blocks picking existing photos from the library, which is the 90% flow
    // (take photo with Files app → upload to Gloss later). Without capture,
    // iOS/Android file pickers still offer "Take Photo" alongside the library.
    // Broaden accept to tolerate mobile share-sheet uploads that arrive as
    // application/octet-stream or with a HEIC/HEIF mime.
    const fileInput = h('input', {
      type: 'file',
      accept: 'image/*,application/pdf,.pdf,.heic,.heif',
      style: { display: 'none' },
    });
    const drop = h('div', { class: 'drop-zone' },
      h('div', { class: 'big' }, 'Drop a scan here'),
      h('div', { style: { marginTop: '6px', fontSize: '12px' } }, 'or ', h('span', { class: 'kbd' }, 'tap'), ' to choose'),
    );
    const doIngest = f => {
      if (!f) { toast('No file selected', 'err'); return; }
      // Surface a clearer error than "upload failed" when the file object is
      // malformed (empty blob from a share-sheet race, 0-byte PDF, etc.).
      if (f.size === 0) { toast('File is empty — try again', 'err'); return; }
      startScanIngest(f, 'page', streamHost, { volume: volumeIn.value.trim() });
    };
    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); const f = e.dataTransfer.files?.[0]; if (f) doIngest(f); });
    fileInput.addEventListener('change', () => { const f = fileInput.files?.[0]; if (f) doIngest(f); });
    inputZone.append(
      h('div', { class: 'lbl-mono', style: { marginBottom: '4px' } }, 'Volume (optional)'),
      volumeIn,
      h('div', { style: { marginTop: '12px' } }, drop, fileInput),
      renderVoiceRecorder(streamHost),
    );
  }

  function makeCollectionPicker() {
    let selected = null;
    const btn  = h('button', { class: 'btn ghost', style: { fontSize: '12px' } }, '+ Link to collection');
    const chip = h('div', { style: { display: 'none', marginTop: '4px' } });
    btn.addEventListener('click', () => {
      openTypeahead({ anchor: btn, kinds: ['collection'], placeholder: 'Search collections…', allowCreate: false,
        onPick: item => {
          selected = item; btn.style.display = 'none'; chip.style.display = '';
          chip.innerHTML = '';
          chip.appendChild(h('span', { class: 'chip' }, item.label,
            Object.assign(h('span', { class: 'x' }, '×'), { onclick: () => { selected = null; chip.style.display = 'none'; btn.style.display = ''; } })
          ));
        },
      });
    });
    return { btn, chip, get: () => selected };
  }

  function makeDayPicker() {
    const wrap  = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
    const input = h('input', { type: 'date', class: 'input', style: { maxWidth: '160px' } });
    const clear = h('button', { class: 'btn ghost', style: { fontSize: '11px', padding: '2px 6px' } }, '×');
    clear.addEventListener('click', () => { input.value = ''; });
    wrap.append(input, clear);
    return { wrap, get: () => input.value || null };
  }

  function renderFilePanel(kind) {
    const titleIn = h('input', { class: 'input', placeholder: 'Title' });
    const urlIn   = h('input', { class: 'input', placeholder: 'https://…', style: { marginTop: '8px' } });
    const fileIn  = h('input', { type: 'file', style: { marginTop: '8px' } });
    const coll    = makeCollectionPicker();
    const day     = makeDayPicker();
    const saveBtn = h('button', { class: 'btn primary', style: { marginTop: '14px' } }, 'Save');

    saveBtn.addEventListener('click', async () => {
      const t = titleIn.value.trim();
      if (!t) { toast('Title required', 'err'); return; }
      const endpoint = kind === 'artifact' ? '/api/artifacts' : '/api/references';
      saveBtn.disabled = true;
      try {
        let result;
        if (fileIn.files?.[0]) {
          const fd = new FormData();
          fd.append('file', fileIn.files[0]);
          fd.append('title', t);
          if (urlIn.value.trim()) fd.append('external_url', urlIn.value.trim());
          const res = await fetch(endpoint, { method: 'POST', body: fd });
          if (!res.ok) throw new Error((await res.json()).error || 'upload failed');
          result = await res.json();
        } else {
          result = await api(endpoint, 'POST', { title: t, external_url: urlIn.value.trim() || null });
        }
        const sel = coll.get();
        if (sel && result?.id) {
          await api(`/api/${kind}s/${result.id}/links`, 'POST', { to_type: 'collection', to_id: sel.id });
        }
        const date = day.get();
        if (date && result?.id) {
          const dl = await api('/api/daily-logs', 'POST', { date });
          await api('/api/links', 'POST', { from_type: kind, from_id: result.id, to_type: 'daily_log', to_id: dl.id });
        }
        toast(`${kind} saved`, 'ok');
        titleIn.value = ''; urlIn.value = ''; fileIn.value = '';
      } catch (err) { toast(err.message, 'err'); }
      finally { saveBtn.disabled = false; }
    });

    inputZone.append(
      h('div', { class: 'lbl-mono', style: { marginBottom: '4px' } }, 'Title'),
      titleIn,
      h('div', { class: 'lbl-mono', style: { marginTop: '10px', marginBottom: '4px' } }, 'URL (optional)'),
      urlIn,
      h('div', { class: 'lbl-mono', style: { marginTop: '10px', marginBottom: '4px' } }, 'File (optional)'),
      fileIn,
      h('div', { style: { marginTop: '12px' } }, coll.btn, coll.chip),
      h('div', { style: { marginTop: '10px' } },
        h('div', { class: 'lbl-mono', style: { marginBottom: '4px' } }, 'Day (optional)'),
        day.wrap,
      ),
      saveBtn,
    );
  }

  mainInner.append(typeBar, inputZone, streamHost);
  switchType('Notebook');

  // Notes — permanent section below the main input
  mainInner.appendChild(h('div', { style: { borderTop: '1px solid var(--rule)', margin: '28px 0 0' } }));
  const notesHead = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', margin: '14px 0 6px' } },
    h('span', { class: 'lbl-mono', style: { fontSize: '11px', letterSpacing: '0.06em' } }, 'NOTES'),
    h('button', { class: 'btn' }, '+ New note'),
  );
  const draftListEl = h('div', { class: 'md-draft-list' });
  notesHead.querySelector('button').addEventListener('click', async () => {
    const draft = await api('/api/markdown-drafts', 'POST', { content: '', date: todayIso() });
    await refreshDraftList(draftListEl, streamHost);
    openDraftDetail(draft.id, draftListEl, streamHost);
  });
  mainInner.append(notesHead, draftListEl);
  refreshDraftList(draftListEl, streamHost);

  // Google — collapsible, toggled by the ⚙ button in the header
  let gStatus = null;
  try { gStatus = await api('/api/google/status'); } catch {}
  const gConnected = !!(gStatus && gStatus.connected);
  const googleSection = h('div', { style: { marginTop: '16px' } });
  mainInner.appendChild(googleSection);

  const renderGoogleSection = async () => {
    googleSection.innerHTML = '';
    if (!googleOpen) return;

    if (gConnected) {
      const { items: pendingCaptures } = await api('/api/google/captures');
      if (pendingCaptures.length > 0) {
        const gcZone = h('div', { class: 'cap-zone', style: { marginBottom: '12px' } });
        const checkBtn = h('button', { class: 'btn ghost', style: { fontSize: '12px', padding: '3px 10px' } }, 'Check now');
        checkBtn.addEventListener('click', async () => {
          checkBtn.disabled = true; checkBtn.textContent = 'Checking…';
          try { await api('/api/google/poll', 'POST'); mainInner.innerHTML = ''; await renderCapture(); }
          catch (e) { toast(e.message, 'err'); checkBtn.disabled = false; checkBtn.textContent = 'Check now'; }
        });
        gcZone.appendChild(h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '4px' } },
          h('h3', null, 'New from Google'), checkBtn));
        gcZone.appendChild(h('div', { class: 'sub' }, 'Recently created Docs and Sheets — classify each to save it.'));
        const captureList = h('div');
        for (const item of pendingCaptures) {
          const isSheet = item.mime_type.includes('spreadsheet');
          const row = h('div', { class: 'gc-row' });
          const badge    = h('span', { class: `gc-type ${isSheet ? 'sheet' : 'doc'}` }, isSheet ? 'Sheet' : 'Doc');
          const titleLink = h('a', { class: 'gc-title', href: item.file_url, target: '_blank', rel: 'noopener' }, item.title);
          const refBtn   = h('button', { class: 'btn', style: { fontSize: '12px', padding: '3px 10px' } }, 'Reference');
          const artBtn   = h('button', { class: 'btn', style: { fontSize: '12px', padding: '3px 10px' } }, 'Artifact');
          const dimBtn   = h('button', { class: 'btn ghost', style: { fontSize: '12px', padding: '3px 8px' } }, '✕');
          const doAccept = async (k) => {
            refBtn.disabled = artBtn.disabled = dimBtn.disabled = true;
            try { await api(`/api/google/captures/${item.id}/accept`, 'POST', { kind: k }); toast(`${k} saved`, 'ok'); mainInner.innerHTML = ''; await renderCapture(); }
            catch (e) { toast(e.message, 'err'); refBtn.disabled = artBtn.disabled = dimBtn.disabled = false; }
          };
          refBtn.addEventListener('click', () => doAccept('reference'));
          artBtn.addEventListener('click', () => doAccept('artifact'));
          dimBtn.addEventListener('click', async () => {
            refBtn.disabled = artBtn.disabled = dimBtn.disabled = true;
            try { await api(`/api/google/captures/${item.id}/dismiss`, 'POST'); mainInner.innerHTML = ''; await renderCapture(); }
            catch (e) { toast(e.message, 'err'); refBtn.disabled = artBtn.disabled = dimBtn.disabled = false; }
          });
          row.append(badge, titleLink, refBtn, artBtn, dimBtn);
          captureList.appendChild(row);
        }
        gcZone.appendChild(captureList);
        googleSection.appendChild(gcZone);
      }
    }

    const driveConfig = gConnected ? await api('/api/google/drive-config') : {};
    const settingsZone = h('div', { class: 'cap-zone' });
    settingsZone.appendChild(h('h3', null, 'Google auto-capture'));
    if (!gConnected) {
      settingsZone.appendChild(h('div', { class: 'sub' }, 'Connect your Google account to auto-capture new Docs, Sheets, and Drive folder scans.'));
      settingsZone.appendChild(h('a', { class: 'btn primary', href: '/api/google/connect', style: { display: 'inline-block', marginTop: '8px' } }, 'Connect Google'));
    } else {
      settingsZone.appendChild(h('div', { class: 'sub' }, 'Images and PDFs dropped in these Drive folders are ingested automatically.'));
      const parseFolderId = v => { if (!v) return null; const m = v.match(/\/folders\/([a-zA-Z0-9_-]{10,})/); return m ? m[1] : v.trim() || null; };
      const scanFolderIn = h('input', { class: 'input', placeholder: 'Notebook scans folder URL or ID', value: driveConfig.scan_folder_id || '' });
      const refFolderIn  = h('input', { class: 'input', placeholder: 'Reference scans folder URL or ID', value: driveConfig.reference_folder_id || '' });
      const pollNowBtn   = h('button', { class: 'btn ghost', style: { fontSize: '12px', padding: '3px 10px' } }, 'Check now');
      const folderSave   = h('button', { class: 'btn primary' }, 'Save');
      pollNowBtn.addEventListener('click', async () => {
        pollNowBtn.disabled = true; pollNowBtn.textContent = 'Checking…';
        try { await api('/api/google/poll', 'POST'); toast('Polled', 'ok'); mainInner.innerHTML = ''; await renderCapture(); }
        catch (e) { toast(e.message, 'err'); pollNowBtn.disabled = false; pollNowBtn.textContent = 'Check now'; }
      });
      folderSave.addEventListener('click', async () => {
        try { await api('/api/google/drive-config', 'PATCH', { scan_folder_id: parseFolderId(scanFolderIn.value), reference_folder_id: parseFolderId(refFolderIn.value) }); toast('Saved', 'ok'); }
        catch (e) { toast(e.message, 'err'); }
      });
      settingsZone.append(
        h('div', { class: 'lbl-mono', style: { marginBottom: '4px' } }, 'Notebook scans folder'), scanFolderIn,
        h('div', { class: 'lbl-mono', style: { margin: '10px 0 4px' } }, 'Reference scans folder'), refFolderIn,
        h('div', { style: { display: 'flex', gap: '8px', marginTop: '12px' } }, folderSave, pollNowBtn),
      );
    }
    googleSection.appendChild(settingsZone);
  };

  googleToggleBtn.addEventListener('click', () => {
    googleOpen = !googleOpen;
    localStorage.setItem('gloss.cap.googleOpen', String(googleOpen));
    googleToggleBtn.textContent = googleOpen ? '⚙ Google ▲' : '⚙ Google';
    renderGoogleSection();
  });

  renderGoogleSection();
}

async function refreshDraftList(listEl, backlogHost) {
  const drafts = await api('/api/markdown-drafts');
  listEl.innerHTML = '';
  if (drafts.length === 0) {
    listEl.appendChild(h('div', { class: 'md-draft-empty' }, 'No drafts yet.'));
    return;
  }
  drafts.forEach(d => {
    const lines = (d.content || '').split('\n').filter(l => l.trim());
    const firstLine = lines[0] || '';
    const title = firstLine.replace(/^#+\s*/, '').trim() || '(empty)';
    const preview = lines.slice(1).join(' ').replace(/^[-*>]+\s*/gm, '').trim();
    const tile = h('div', { class: 'day-tile draft-tile' },
      h('div', { class: 'tile-body' },
        h('div', { class: 'draft-tile-title' }, title),
        preview ? h('div', { class: 'draft-tile-preview' }, preview) : null,
        h('div', { class: 'tile-meta' }, d.date + ' · draft'),
      ),
    );
    tile.addEventListener('click', () => openDraftDetail(d.id, listEl, backlogHost));
    listEl.appendChild(tile);
  });
}

// Opens a draft in the right-side detail panel for editing.
// listEl and backlogHost are refs so we can refresh the list after commit/discard.
function openDraftDetail(draftId, listEl, backlogHost) {
  openDetail();
  detailInner.innerHTML = '';
  detailInner.appendChild(skPageDetail());

  api('/api/markdown-drafts/' + draftId).then(draft => {
    if (!draft) { detailInner.innerHTML = ''; detailInner.appendChild(h('div', { class: 'soft', style: { padding: '24px' } }, 'Draft not found.')); return; }

    detailInner.innerHTML = '';
    const body = h('div', { style: { padding: '20px 24px' } });

    body.appendChild(h('div', { class: 'detail-label', style: { marginBottom: '14px' } }, 'Draft'));

    const dateIn = h('input', { type: 'date', class: 'input', value: draft.date, style: { maxWidth: '180px' } });
    const ta = h('textarea', {
      class: 'input md-editor',
      rows: 20,
      placeholder: '# On catechesis\n\nScaffolding, not cage. Three notes:\n\n- formation moves slow\n- repetition is not rote\n- the liturgy teaches',
      // Note: font-size is set via CSS (.md-editor) so the mobile media query
      // can override it to 16px and avoid iOS auto-zoom on focus. Inline
      // fontSize here would defeat that.
      style: { fontFamily: 'var(--font-mono)', width: '100%', boxSizing: 'border-box', marginTop: '10px', resize: 'vertical' },
    });
    ta.value = draft.content;

    let saveTimer;
    const save = () => {
      clearTimeout(saveTimer);
      return api('/api/markdown-drafts/' + draft.id, 'PATCH', { content: ta.value, date: dateIn.value }).catch(() => {});
    };
    // Debounce on input; save immediately on blur so closing the panel never loses content
    ta.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(save, 600);
    });
    ta.addEventListener('blur', save);
    dateIn.addEventListener('change', save);

    // Filing mode: daily log (default) or create a new collection from the note title
    let filingMode = 'daily_log';
    const extractNoteTitle = () => {
      const lines = (ta.value || '').split('\n').filter(l => l.trim());
      return (lines[0] || '').replace(/^#+\s*/, '').trim() || 'Untitled note';
    };

    const fileModeBar = h('div', { class: 'seg', style: { marginTop: '14px' } });
    const dlBtn  = h('button', { class: 'active' }, 'Daily log');
    const colBtn = h('button', {}, 'New collection');
    fileModeBar.append(dlBtn, colBtn);

    const filingDetail = h('div', { style: { marginTop: '8px' } });
    const renderFilingDetail = () => {
      filingDetail.innerHTML = '';
      if (filingMode === 'daily_log') {
        filingDetail.appendChild(h('div', { style: { fontSize: '11.5px', color: 'var(--ink-soft)', fontFamily: 'var(--font-mono)' } }, 'Filed under the date above.'));
      } else {
        const titleIn = h('input', { class: 'input', value: extractNoteTitle(), placeholder: 'Collection title' });
        filingDetail.append(
          h('div', { class: 'lbl-mono', style: { marginBottom: '4px', fontSize: '11px' } }, 'Collection title'),
          titleIn,
        );
      }
    };

    dlBtn.addEventListener('click', () => {
      filingMode = 'daily_log';
      dlBtn.classList.add('active'); colBtn.classList.remove('active');
      renderFilingDetail();
    });
    colBtn.addEventListener('click', () => {
      filingMode = 'collection';
      colBtn.classList.add('active'); dlBtn.classList.remove('active');
      renderFilingDetail();
    });
    renderFilingDetail();

    const commitBtn = h('button', { class: 'btn primary' }, 'Commit');
    const discardBtn = h('button', { class: 'btn' }, 'Discard');

    commitBtn.addEventListener('click', async () => {
      clearTimeout(saveTimer);
      if (!ta.value.trim()) { toast('Draft is empty', 'err'); return; }
      commitBtn.disabled = true; commitBtn.textContent = 'Parsing…';
      try {
        await save();
        let collectionId = null;
        if (filingMode === 'collection') {
          const titleIn = filingDetail.querySelector('input');
          const collTitle = titleIn ? titleIn.value.trim() : extractNoteTitle();
          if (!collTitle) { toast('Collection title required', 'err'); commitBtn.disabled = false; commitBtn.textContent = 'Commit'; return; }
          const newColl = await api('/api/collections', 'POST', { title: collTitle, kind: 'topical' });
          collectionId = newColl.id;
        }
        const res = await api('/api/markdown-drafts/' + draft.id + '/commit', 'POST', { collection_id: collectionId });
        toast(filingMode === 'collection' ? 'Filed as collection' : `Filed to ${dateIn.value}`, 'ok');
        closeDetail();
        if (listEl) await refreshDraftList(listEl, backlogHost);
        if (backlogHost) await loadBacklog(backlogHost);
        if (res && res.page_id) openPageDetail(res.page_id);
      } catch (err) {
        toast(err.message, 'err');
        commitBtn.disabled = false; commitBtn.textContent = 'Commit';
      }
    });

    discardBtn.addEventListener('click', async () => {
      if (!confirm('Discard this draft?')) return;
      await api('/api/markdown-drafts/' + draft.id, 'DELETE');
      closeDetail();
      if (listEl) await refreshDraftList(listEl, backlogHost);
    });

    // Mobile-only sticky formatting toolbar. Hidden on desktop via CSS; on
    // mobile, shown only while the textarea has focus. Tapping a button wraps
    // the current selection in the corresponding markdown syntax, or inserts
    // a placeholder at the cursor if there's no selection. Uses execCommand
    // so the browser's undo stack stays intact.
    const toolbar = attachMarkdownToolbar(ta);

    body.append(
      h('div', { class: 'draft-detail-header' }, h('span', { class: 'lbl-mono' }, 'Date'), dateIn),
      ta,
      toolbar,
      h('div', { class: 'lbl-mono', style: { marginTop: '14px', marginBottom: '4px' } }, 'File as'),
      fileModeBar,
      filingDetail,
      h('div', { class: 'draft-detail-actions' }, discardBtn, commitBtn),
    );
    detailInner.appendChild(body);
    setTimeout(() => ta.focus(), 50);
  });
}

// Build a sticky bottom formatting toolbar bound to a <textarea>. The toolbar
// itself is always rendered; CSS scopes it to mobile viewports (≤640px) and
// JS toggles `body.md-toolbar-show` while the textarea has focus so it only
// appears above the on-screen keyboard when the user is actually typing.
// Each button wraps the current selection (or inserts a template at the
// cursor) using document.execCommand('insertText') so the native undo stack
// stays intact — no dependency on contentEditable/TipTap/etc.
function attachMarkdownToolbar(ta) {
  const toolbar = h('div', { class: 'md-toolbar', role: 'toolbar' });
  const apply = (before, after, placeholder) => {
    const start = ta.selectionStart, end = ta.selectionEnd;
    const selected = ta.value.slice(start, end);
    const inner = selected || placeholder || '';
    const insert = `${before}${inner}${after}`;
    ta.focus();
    ta.setSelectionRange(start, end);
    if (!document.execCommand('insertText', false, insert)) {
      ta.setRangeText(insert, start, end, 'end');
    }
    // Place the caret at the inner text so the user can immediately overtype.
    const innerStart = start + before.length;
    ta.setSelectionRange(innerStart, innerStart + inner.length);
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  };
  const linePrefix = (prefix) => {
    const start = ta.selectionStart;
    const value = ta.value;
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    ta.focus();
    ta.setSelectionRange(lineStart, lineStart);
    if (!document.execCommand('insertText', false, prefix)) {
      ta.setRangeText(prefix, lineStart, lineStart, 'end');
    }
    const newPos = start + prefix.length;
    ta.setSelectionRange(newPos, newPos);
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  };
  const buttons = [
    ['B',   () => apply('**', '**', 'bold'),           'Bold'],
    ['I',   () => apply('*',  '*',  'italic'),         'Italic'],
    ['H1',  () => linePrefix('# '),                    'Heading 1'],
    ['H2',  () => linePrefix('## '),                   'Heading 2'],
    ['•',   () => linePrefix('- '),                    'Bullet list'],
    ['☐',   () => linePrefix('- [ ] '),                'Checklist'],
    ['🔗',  () => apply('[', '](url)', 'link text'),   'Link'],
  ];
  for (const [label, handler, title] of buttons) {
    const btn = h('button', { type: 'button', title, onmousedown: (e) => e.preventDefault() }, label);
    btn.addEventListener('click', (e) => { e.preventDefault(); handler(); });
    toolbar.appendChild(btn);
  }
  ta.addEventListener('focus', () => document.body.classList.add('md-toolbar-show'));
  ta.addEventListener('blur',  () => {
    // Delay so a toolbar-button tap (which briefly blurs the textarea) doesn't
    // flicker the toolbar away between mousedown and click.
    setTimeout(() => {
      if (document.activeElement !== ta) document.body.classList.remove('md-toolbar-show');
    }, 100);
  });
  return toolbar;
}

// Voice-memo recorder. Renders a [🎙 Record] button; on tap, requests mic
// access, streams to MediaRecorder, and on stop uploads the blob to
// /api/ingest/voice-audio. The server handles transcription via Gemini and
// runs the transcript through the existing parseVoiceMemo pipeline — same
// entity extraction / backlog / index classification as the typed-transcript
// path. Graceful fallback: if MediaRecorder is unsupported (old browsers),
// the button is hidden and a console log notes why.
function renderVoiceRecorder(streamHost) {
  const wrap = h('div', { style: { marginTop: '16px', paddingTop: '14px', borderTop: '1px dashed var(--rule)' } });
  if (!window.MediaRecorder || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.log('[voice] MediaRecorder unavailable — recording UI hidden');
    wrap.style.display = 'none';
    return wrap;
  }
  const label = h('div', { class: 'lbl-mono', style: { marginBottom: '6px' } }, 'Voice memo');
  const recBtn = h('button', { class: 'btn', style: { minWidth: '140px' } }, '🎙 Record');
  const status = h('span', { class: 'mono soft', style: { marginLeft: '10px', fontSize: '12px' } }, '');
  const row = h('div', { style: { display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '8px' } }, recBtn, status);
  wrap.append(label, row);

  let recorder = null;
  let chunks = [];
  let stream = null;
  let startedAt = 0;
  let timerId = null;
  let mimeType = '';

  const stopTimer = () => { if (timerId) { clearInterval(timerId); timerId = null; } };
  const cleanupStream = () => {
    try { stream && stream.getTracks().forEach(t => t.stop()); } catch {}
    stream = null;
  };
  // iOS Safari only reliably supports mp4/aac for MediaRecorder; desktop +
  // Android Chrome prefer webm/opus. Pick the first the browser accepts.
  const pickMimeType = () => {
    const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4;codecs=mp4a.40.2', 'audio/mp4', 'audio/aac'];
    for (const m of candidates) {
      if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m;
    }
    return ''; // let the browser pick
  };

  const stopRecording = () => {
    if (!recorder || recorder.state !== 'recording') return;
    try { recorder.stop(); } catch {}
  };

  recBtn.addEventListener('click', async () => {
    if (recorder && recorder.state === 'recording') { stopRecording(); return; }
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      toast(`Mic access denied: ${err.message}`, 'err');
      return;
    }
    mimeType = pickMimeType();
    try {
      recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
    } catch (err) {
      toast(`Can't start recorder: ${err.message}`, 'err');
      cleanupStream();
      return;
    }
    chunks = [];
    recorder.addEventListener('dataavailable', e => { if (e.data && e.data.size) chunks.push(e.data); });
    recorder.addEventListener('stop', async () => {
      stopTimer();
      cleanupStream();
      recBtn.textContent = '🎙 Record';
      recBtn.classList.remove('primary');
      const blob = new Blob(chunks, { type: recorder.mimeType || mimeType || 'audio/webm' });
      const ext = /mp4|aac/.test(blob.type) ? 'm4a' : (/ogg/.test(blob.type) ? 'ogg' : 'webm');
      if (!blob.size) { status.textContent = 'No audio captured'; return; }
      status.textContent = `Uploading (${Math.round(blob.size/1024)}KB)…`;
      recBtn.disabled = true;
      // Live-entity chip host — entity chips appear here as Gemini streams
      // them back. Falls back gracefully if the browser can't stream.
      let chipHost = null;
      try {
        const fd = new FormData();
        fd.append('audio', blob, `memo.${ext}`);
        fd.append('date', todayIso());
        // Request NDJSON streaming. If the browser's fetch doesn't support
        // streamed bodies, the server still writes the full payload and the
        // non-streaming parse runs server-side — the client just reads it all
        // at once and gets the final 'done' frame.
        const supportsStream = typeof ReadableStream !== 'undefined' && typeof TextDecoder !== 'undefined';
        const res = await fetch('/api/ingest/voice-audio', {
          method: 'POST',
          body: fd,
          headers: supportsStream ? { 'Accept': 'application/x-ndjson' } : {},
        });
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          throw new Error(`upload failed (${res.status}) ${body.slice(0, 160)}`);
        }
        const contentType = res.headers.get('content-type') || '';
        let result = null;
        if (/x-ndjson/i.test(contentType) && supportsStream) {
          // Streaming: consume ndjson frames and render chips as they arrive.
          chipHost = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginTop: '8px' } });
          row.appendChild(chipHost);
          for await (const frame of ndjson(res)) {
            if (frame.type === 'transcript') {
              status.textContent = `Transcribed ${frame.transcript.length} chars · parsing…`;
            } else if (frame.type === 'delta') {
              for (const e of (frame.entities || [])) {
                const label = e.label || e.canonical || '(entity)';
                chipHost.appendChild(h('span', { class: 'chip soft', title: e.role_summary || e.kind || '' }, `${e.kind === 'scripture' ? '✝' : e.kind === 'person' ? '◉' : '#'} ${label}`));
              }
              if (frame.summary) status.textContent = 'Parsing · ' + frame.summary.slice(0, 60);
            } else if (frame.type === 'done') {
              result = frame;
            } else if (frame.type === 'error' && frame.fatal) {
              throw new Error(frame.error || 'parse failed');
            }
          }
          if (!result) throw new Error('stream ended without save confirmation');
        } else {
          result = await res.json();
        }
        status.textContent = `Saved · ${result.items_count || 0} items`;
        // Confirmation tile — tap to open the detail.
        const tile = h('div', { class: 'ingest-tile' },
          h('div', { class: 'meta' },
            h('div', { class: 'vp' }, '🎙 voice memo'),
            h('div', { class: 'sum' }, result.summary || '(no summary)'),
          ),
        );
        if (result.page_id) tile.addEventListener('click', () => navigate('page', result.page_id));
        if (streamHost) {
          const prev = streamHost.querySelector('.ingest-stream');
          if (!prev) {
            const stream = h('div', { class: 'ingest-stream' }, tile);
            streamHost.appendChild(stream);
          } else {
            prev.appendChild(tile);
          }
        }
        toast('Voice memo saved', 'ok');
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        toast(err.message, 'err');
      } finally {
        recBtn.disabled = false;
      }
    });
    try {
      recorder.start();
    } catch (err) {
      toast(`Recorder refused to start: ${err.message}`, 'err');
      cleanupStream();
      return;
    }
    startedAt = Date.now();
    recBtn.textContent = '⏹ Stop';
    recBtn.classList.add('primary');
    const updateTimer = () => {
      const secs = Math.floor((Date.now() - startedAt) / 1000);
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      status.textContent = `● recording ${m}:${s}`;
    };
    updateTimer();
    timerId = setInterval(updateTimer, 500);
  });

  return wrap;
}

async function startScanIngest(file, kindHint, host, opts = {}) {
  host.innerHTML = '';
  const stream = h('div', { class: 'ingest-stream' });
  const progress = h('div', { class: 'ingest-progress' }, `Uploading ${file.name}…`);
  const tiles = h('div');
  stream.append(progress, tiles);
  host.appendChild(stream);

  try {
    const fd = new FormData();
    fd.append('file', file);
    if (kindHint && kindHint !== 'page') fd.append('kind', kindHint);
    if (opts.volume) fd.append('volume', opts.volume);
    const res = await fetch('/api/ingest/stream', { method: 'POST', body: fd });
    if (!res.ok) {
      // Surface HTTP status + server message — mobile uploads fail in ways
      // ("upload failed") that are undiagnosable without this.
      let body = '';
      try { body = (await res.text()).slice(0, 200); } catch {}
      throw new Error(`upload failed (${res.status})${body ? ': ' + body : ''}`);
    }
    let total = 1, count = 0;
    for await (const evt of ndjson(res)) {
      if (evt.type === 'start') {
        total = evt.page_count || 1;
        progress.textContent = total > 1 ? `0 of ${total} pages…` : 'parsing…';
      } else if (evt.type === 'page') {
        count++;
        const p = evt.page || evt;
        const tile = h('div', { class: 'ingest-tile' },
          h('img', { src: p.id ? `/api/pages/${p.id}/scan` : '', loading: 'lazy', decoding: 'async' }),
          h('div', { class: 'meta' },
            h('div', { class: 'vp' }, `${p.volume ? 'v.' + p.volume + ' ' : ''}${p.page_number ? 'p.' + p.page_number : ''}`),
            h('div', { class: 'sum' }, p.summary || '(no summary)'),
          ),
        );
        tile.addEventListener('click', () => navigate('page', p.id));
        tiles.appendChild(tile);
        progress.textContent = total > 1 ? `${count} of ${total} pages…` : `${count} parsed`;
      } else if (evt.type === 'done') {
        progress.textContent = `Done · ${count} page${count > 1 ? 's' : ''} parsed.`;
        await loadBacklog(host);
      } else if (evt.type === 'error') {
        progress.textContent = `Error: ${evt.error || 'parse failed'}`;
      }
    }
  } catch (err) {
    progress.textContent = `Error: ${err.message}`;
  }
}

async function loadBacklog(host) {
  try {
    const res = await api('/api/backlog');
    const items = res.items || res;
    const pending = items.filter(b => b.status === 'pending' || b.status === 'open');
    if (!pending.length) return;
    const zone = h('div', { class: 'ingest-stream' });
    zone.appendChild(h('div', { class: 'lbl-mono', style: { marginBottom: '10px' } }, `Backlog · ${pending.length} question${pending.length > 1 ? 's' : ''}`));
    backlogState = { queue: pending, idx: 0, container: zone };
    showBacklogCard();
    host.appendChild(zone);
  } catch {}
}

function showBacklogCard() {
  const { queue, idx, container } = backlogState;
  if (!container) return;
  container.querySelectorAll('.backlog-card').forEach(c => c.remove());
  if (idx >= queue.length) {
    container.appendChild(h('div', { class: 'soft mono', style: { fontSize: '11.5px' } }, 'All caught up.'));
    return;
  }
  const b = queue[idx];
  const card = h('div', { class: 'backlog-card' });
  card.append(
    h('div', { class: 'ctx' }, `${idx + 1} of ${queue.length}${b.kind ? ' · ' + b.kind : ''}`),
    h('div', { class: 'q' }, b.question || b.subject || 'Question'),
  );
  let inputEl;
  const fmt = b.answer_format || 'short';
  let selectedOption = null;
  if (fmt === 'choice') {
    const opts = b.answer_options || [];
    const list = h('div', { class: 'radio-list' });
    opts.forEach((opt, i) => {
      list.appendChild(h('label', null,
        h('input', { type: 'radio', name: `b-${b.id}`, value: opt, onchange: () => selectedOption = opt }),
        opt,
      ));
    });
    card.appendChild(list);
    inputEl = { get value() { return selectedOption; } };
  } else if (fmt === 'long') {
    inputEl = h('textarea', { class: 'input', rows: 3, placeholder: 'Answer…' });
    card.appendChild(inputEl);
  } else {
    inputEl = h('input', { class: 'input', placeholder: 'Answer…' });
    card.appendChild(inputEl);
  }
  const actions = h('div', { class: 'backlog-actions' });
  const submit = h('button', { class: 'btn primary' }, 'Answer');
  const skip = h('button', { class: 'btn ghost' }, 'Skip');
  submit.addEventListener('click', async () => {
    const v = (inputEl.value || '').trim();
    if (!v) { toast('Answer required', 'err'); return; }
    try {
      await api(`/api/backlog/${b.id}`, 'PATCH', { status: 'answered', answer: v });
      toast('saved', 'ok');
      backlogState.idx++;
      showBacklogCard();
    } catch (err) { toast(err.message, 'err'); }
  });
  skip.addEventListener('click', () => { backlogState.idx++; showBacklogCard(); });
  actions.append(submit, skip);
  card.appendChild(actions);
  container.appendChild(card);
}

// ─── INDEX ─────────────────────────────────
// Two sections: "Contents" (front-of-book — collections & artifacts, grouped
// by heading when one is set) and "Indexes" (back-of-book, alphabetical).
// Headings themselves don't get their own tab: they act like sub-sections
// inside the Collections and Artifacts tabs, same way a notebook's TOC just
// indents items under a heading rather than storing headings separately.
const KIND_ORDER = [
  // Front-of-book (Table of Contents):
  ['collection', 'Collections'],
  ['artifact', 'Artifacts'],
  // Back-of-book (Indexes):
  ['person', 'People'],
  ['topic', 'Topics'],
  ['scripture', 'Scripture'],
  ['book', 'Books'],
  ['reference', 'References'],
  ['user_index', 'Indexes'],
];
const TOC_KINDS = new Set(['collection', 'artifact']);

// Canonical order of the books of the Bible (Protestant canon). Scripture rows
// carry a `meta.book` field (e.g. "Nehemiah", "1 Corinthians"); auto-headings
// in the Scripture index group rows by book, ordered by this list.
const BIBLE_BOOK_ORDER = [
  'Genesis','Exodus','Leviticus','Numbers','Deuteronomy',
  'Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings',
  '1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther',
  'Job','Psalms','Psalm','Proverbs','Ecclesiastes','Song of Solomon','Song of Songs',
  'Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel',
  'Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi',
  'Matthew','Mark','Luke','John','Acts',
  'Romans','1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians','Colossians',
  '1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy','Titus','Philemon',
  'Hebrews','James','1 Peter','2 Peter','1 John','2 John','3 John','Jude','Revelation',
];
const BIBLE_BOOK_INDEX = new Map(BIBLE_BOOK_ORDER.map((b, i) => [b.toLowerCase(), i]));

// Derive the book name for a scripture row. Prefer the server-provided
// `meta.book`; fall back to parsing the leading words of the canonical label
// (everything before the first chapter/verse digit).
function scriptureBookOf(node) {
  const m = node.meta?.book;
  if (m && m.trim()) return m.trim();
  const label = node.label || '';
  const match = label.match(/^([1-3]\s+)?[A-Za-z][A-Za-z\s]*?(?=\s+\d)/);
  return (match ? match[0] : label).trim() || 'Unknown';
}

const indexNodeRefs = new Map(); // `${kind}:${id}` -> { row, expand }
let activeIndexKind = null;
let cachedIndexTree = null;

async function renderIndex(focusKind, focusId) {
  indexNodeRefs.clear();

  mainInner.appendChild(h('div', { class: 'surface-head' },
    h('h1', { class: 'surface-title' }, 'Index'),
  ));

  // Fetch tree once; cache so tab-switches don't re-fetch. Show a skeleton
  // tree while the first load is in flight so the surface has structure.
  if (!cachedIndexTree) {
    const sk = h('div', null,
      h('div', { style: { display: 'flex', gap: '10px', marginBottom: '22px', borderBottom: '1px solid var(--rule)', paddingBottom: '8px' } },
        h('div', { class: 'sk', style: { width: '72px', height: '18px' } }),
        h('div', { class: 'sk', style: { width: '64px', height: '18px' } }),
        h('div', { class: 'sk', style: { width: '56px', height: '18px' } }),
        h('div', { class: 'sk', style: { width: '80px', height: '18px' } }),
      ),
      skTreeRows(12),
    );
    mainInner.appendChild(sk);
    try { cachedIndexTree = await api('/api/index/tree'); }
    catch (err) {
      sk.remove();
      mainInner.appendChild(emptyState({ title: "Couldn't load the index.", sub: err.message }));
      return;
    }
    sk.remove();
  }
  const byKind = {};
  for (const group of (cachedIndexTree.kinds || [])) byKind[group.kind] = group.active || [];

  // Build available tabs
  const availableTabs = KIND_ORDER.filter(([kind]) => (byKind[kind] || []).length > 0);
  if (!availableTabs.length) {
    mainInner.appendChild(emptyState({
      icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h16"/></svg>',
      title: 'Nothing indexed yet.',
      sub: 'Capture a scan to begin building your index.',
    }));
    return;
  }

  if (!activeIndexKind || !availableTabs.find(([k]) => k === activeIndexKind)) {
    activeIndexKind = availableTabs[0][0];
  }
  if (focusKind && availableTabs.find(([k]) => k === focusKind)) activeIndexKind = focusKind;

  // Tabs
  const tabsEl = h('div', { class: 'kind-tabs' });
  mainInner.appendChild(tabsEl);
  const host = h('div', { class: 'index-kinds' });
  mainInner.appendChild(host);

  const renderTab = (kind) => {
    indexNodeRefs.clear();
    host.innerHTML = '';
    activeIndexKind = kind;
    tabsEl.querySelectorAll('.kind-tab').forEach(t => t.classList.toggle('active', t.dataset.kind === kind));

    // Per-tab toolbar: collections / artifacts get "+ New heading" so the user
    // can drop a new TOC heading inline without leaving the tab.
    const toolbar = h('div', { style: { display: 'flex', gap: '6px', margin: '4px 0 6px' } });
    if (TOC_KINDS.has(kind)) {
      const btn = h('button', { class: 'btn sm' }, '+ New heading');
      btn.addEventListener('click', async () => {
        const label = prompt('Heading label?');
        if (!label || !label.trim()) return;
        try {
          await api('/api/headings', 'POST', { label: label.trim(), scope: kind });
          invalidateIndexCache();
          mainInner.innerHTML = '';
          renderIndex(kind);
        } catch (err) { toast(err.message, 'err'); }
      });
      toolbar.appendChild(btn);
    }
    if (toolbar.children.length) host.appendChild(toolbar);

    // TOC rendering (collections / artifacts): headings become indented sub-
    // sections at the top of the tab, each with its own children beneath. Any
    // row without a heading parent falls back into the "Unfiled" list below —
    // so every collection/artifact is reachable in one place, and grouping
    // feels like indenting a notebook TOC, not like switching tabs.
    if (TOC_KINDS.has(kind)) {
      const rows = byKind[kind] || [];
      const allHeadings = (byKind['heading'] || cachedIndexTree.kinds.find(k => k.kind === 'heading')?.active || []);
      // Only show headings that belong to this tab's scope.
      const headings = allHeadings.filter(h => (h.meta?.scope || 'collection') === kind);

      const inHeading = new Set();
      let anyHeadingRendered = false;
      for (const heading of headings) {
        // From the heading tree, take only children matching the current kind.
        const kids = (heading.children || []).filter(c => c.kind === kind);
        kids.forEach(c => inHeading.add(c.id));
        if (!kids.length && heading.archivedAt) continue;
        anyHeadingRendered = true;
        renderHeadingGroup(host, heading, kind, kids);
      }

      // Unfiled — collections / artifacts that don't live under any heading.
      const unfiled = rows.filter(r => !inHeading.has(r.id));
      if (unfiled.length) {
        if (anyHeadingRendered) {
          host.appendChild(h('div', { class: 'tree-heading-row' },
            h('span', null, ''),
            h('span', { class: 'tree-heading-label', style: { cursor: 'default' } }, 'Unfiled'),
            h('span', null, ''),
          ));
        }
        for (const node of unfiled) host.appendChild(renderTreeRow(kind, node, 0));
      }
      if (!anyHeadingRendered && !unfiled.length) {
        host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.'));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    // Back-of-book kinds render alphabetically, flat.
    const roots = byKind[kind] || [];
    const topLevel = roots.filter(r => !r.parents || r.parents.length === 0);
    let display = topLevel.length ? topLevel : roots;

    // Scripture → auto-group by Bible book in canonical order, rows within
    // each book ordered by chapter, then verse_start.
    if (kind === 'scripture') {
      if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
      const byBook = new Map();
      for (const node of display) {
        const book = scriptureBookOf(node);
        if (!byBook.has(book)) byBook.set(book, []);
        byBook.get(book).push(node);
      }
      const sortedBooks = [...byBook.keys()].sort((a, b) => {
        const ai = BIBLE_BOOK_INDEX.get(a.toLowerCase());
        const bi = BIBLE_BOOK_INDEX.get(b.toLowerCase());
        if (ai != null && bi != null) return ai - bi;
        if (ai != null) return -1;
        if (bi != null) return 1;
        return a.localeCompare(b, undefined, { sensitivity: 'base' });
      });
      for (const book of sortedBooks) {
        renderAutoHeadingGroup(host, book, kind, byBook.get(book).sort((a, b) => {
          const ac = a.meta?.chapter ?? 0, bc = b.meta?.chapter ?? 0;
          if (ac !== bc) return ac - bc;
          const av = a.meta?.verse_start ?? 0, bv = b.meta?.verse_start ?? 0;
          return av - bv;
        }));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    // Books → auto-group by author (alphabetical by author, alphabetical by
    // title within). Books without an author land in "Unknown author".
    if (kind === 'book') {
      if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
      const byAuthor = new Map();
      for (const node of display) {
        const author = (node.meta?.author_label || '').trim() || 'Unknown author';
        if (!byAuthor.has(author)) byAuthor.set(author, []);
        byAuthor.get(author).push(node);
      }
      const sortedAuthors = [...byAuthor.keys()].sort((a, b) => {
        if (a === 'Unknown author') return 1;
        if (b === 'Unknown author') return -1;
        return a.localeCompare(b, undefined, { sensitivity: 'base' });
      });
      for (const author of sortedAuthors) {
        renderAutoHeadingGroup(host, author, kind, byAuthor.get(author).sort((a, b) =>
          (a.label || '').localeCompare(b.label || '', undefined, { sensitivity: 'base' })
        ));
      }
      if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
      return;
    }

    display = [...display].sort((a, b) =>
      (a.label || a.title || a.canonical || '').localeCompare(b.label || b.title || b.canonical || '', undefined, { sensitivity: 'base' })
    );
    if (!display.length) { host.appendChild(h('div', { class: 'empty' }, 'Nothing here yet.')); return; }
    for (const node of display) host.appendChild(renderTreeRow(kind, node, 0));

    if (focusId && kind === focusKind) setTimeout(() => jumpToIndexNode(focusKind, focusId, true), 50);
  };

  // Auto-generated heading (scripture → Bible book, book → author). Reuses the
  // .tree-heading-row styling from the TOC headings, minus the row-level edit
  // actions (the heading is derived, not a user-editable entity).
  function renderAutoHeadingGroup(host, label, kind, kids) {
    const row = h('div', { class: 'tree-heading-row' });
    row.appendChild(h('span', null, ''));
    row.appendChild(h('span', { class: 'tree-heading-label', style: { cursor: 'default' } }, label));
    row.appendChild(h('span', null, ''));
    host.appendChild(row);
    const kidsHost = h('div', { class: 'tree-heading-children' });
    for (const c of kids) kidsHost.appendChild(renderTreeRow(kind, c, 1));
    host.appendChild(kidsHost);
  }

  // Renders one heading as a section label with its children (of the current
  // kind) indented beneath. Heading label itself has inline rename/merge/delete
  // actions that appear on hover.
  function renderHeadingGroup(host, heading, kind, kids) {
    const label = heading.label || '(untitled)';
    const row = h('div', { class: 'tree-heading-row' });
    row.appendChild(h('span', null, ''));
    const labelEl = h('span', { class: 'tree-heading-label' }, label);
    labelEl.addEventListener('click', () => openEntityDetail('heading', heading));
    row.appendChild(labelEl);

    const actions = h('div', { class: 'tree-actions' });
    actions.appendChild(buildActionBtn('Rename', () => renameNode('heading', heading)));
    actions.appendChild(buildActionBtn('Merge',  () => mergeNode('heading', heading)));
    actions.appendChild(buildActionBtn('×',      () => archiveOrDeleteHeading(heading)));
    row.appendChild(actions);
    host.appendChild(row);

    const kidsHost = h('div', { class: 'tree-heading-children' });
    if (!kids.length) {
      kidsHost.appendChild(h('div', { class: 'tree-heading-empty' }, 'empty'));
    } else {
      // Alphabetical inside the heading, matching notebook TOC convention.
      const sorted = [...kids].sort((a, b) =>
        (a.label || '').localeCompare(b.label || '', undefined, { sensitivity: 'base' })
      );
      for (const c of sorted) kidsHost.appendChild(renderTreeRow(kind, c, 1));
    }
    host.appendChild(kidsHost);
  }

  async function archiveOrDeleteHeading(heading) {
    if (!confirm(`Delete heading "${heading.label}"? Items filed under it keep their other parents and fall back to Unfiled.`)) return;
    try {
      await api(`/api/index/heading/${heading.id}/delete`, 'POST', {});
      toast('deleted', 'ok');
      invalidateIndexCache();
      mainInner.innerHTML = '';
      renderIndex(activeIndexKind);
